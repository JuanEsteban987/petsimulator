<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ragdoll Fighters '26</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; margin: auto; border: 4px solid #555; }
        #ui {
            position: absolute; top: 20px; width: 100%; display: flex;
            justify-content: space-around; pointer-events: none;
        }
        .health-bar {
            width: 400px; height: 30px; background: #444; border: 2px solid #fff;
            position: relative; overflow: hidden;
        }
        .health-fill {
            width: 100%; height: 100%; background: linear-gradient(to bottom, #ff0, #f00);
            transition: width 0.2s;
        }
        .name { color: white; font-weight: bold; text-shadow: 2px 2px #000; margin-bottom: 5px; }
        #timer { color: #fff; font-size: 40px; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <div>
        <div class="name">P1: KYO RAGDOLL</div>
        <div class="health-bar"><div id="p1-health" class="health-fill"></div></div>
    </div>
    <div id="timer">99</div>
    <div>
        <div class="name" style="text-align: right;">P2: IORI DOLL</div>
        <div class="health-bar"><div id="p2-health" class="health-fill"></div></div>
    </div>
</div>

<script>
const { Engine, Render, Runner, Bodies, Composite, Constraint, Vector, Body } = Matter;

// --- Configuración ---
const engine = Engine.create();
const world = engine.world;
const canvasWidth = 1000;
const canvasHeight = 600;

const render = Render.create({
    element: document.body,
    engine: engine,
    options: {
        width: canvasWidth,
        height: canvasHeight,
        wireframes: false,
        background: '#222'
    }
});

// --- Escenario ---
const ground = Bodies.rectangle(canvasWidth/2, canvasHeight - 20, canvasWidth, 40, { isStatic: true, render: { fillStyle: '#333' } });
const wallL = Bodies.rectangle(-10, 300, 20, 600, { isStatic: true });
const wallR = Bodies.rectangle(canvasWidth+10, 300, 20, 600, { isStatic: true });
Composite.add(world, [ground, wallL, wallR]);

// --- Constructor de Ragdoll ---
function createRagdoll(x, y, color, label) {
    const group = Body.nextGroup(true);
    
    // Partes del cuerpo
    const head = Bodies.circle(x, y - 80, 15, { collisionFilter: { group: group }, render: { fillStyle: color } });
    const torso = Bodies.rectangle(x, y - 40, 30, 50, { collisionFilter: { group: group }, render: { fillStyle: color } });
    const armL = Bodies.rectangle(x - 25, y - 40, 10, 40, { collisionFilter: { group: group }, render: { fillStyle: color } });
    const armR = Bodies.rectangle(x + 25, y - 40, 10, 40, { collisionFilter: { group: group }, render: { fillStyle: color } });
    const legL = Bodies.rectangle(x - 10, y + 10, 12, 45, { collisionFilter: { group: group }, render: { fillStyle: color } });
    const legR = Bodies.rectangle(x + 10, y + 10, 12, 45, { collisionFilter: { group: group }, render: { fillStyle: color } });

    // Restricciones (Uniones)
    const neck = Constraint.create({ bodyA: head, bodyB: torso, pointA: { x: 0, y: 15 }, pointB: { x: 0, y: -25 }, stiffness: 0.6, length: 2 });
    const shoulderL = Constraint.create({ bodyA: torso, bodyB: armL, pointA: { x: -15, y: -20 }, pointB: { x: 0, y: -15 }, stiffness: 0.6 });
    const shoulderR = Constraint.create({ bodyA: torso, bodyB: armR, pointA: { x: 15, y: -20 }, pointB: { x: 0, y: -15 }, stiffness: 0.6 });
    const hipL = Constraint.create({ bodyA: torso, bodyB: legL, pointA: { x: -10, y: 25 }, pointB: { x: 0, y: -20 }, stiffness: 0.6 });
    const hipR = Constraint.create({ bodyA: torso, bodyB: legR, pointA: { x: 10, y: 25 }, pointB: { x: 0, y: -20 }, stiffness: 0.6 });

    const player = Composite.create({ label: label });
    Composite.add(player, [head, torso, armL, armR, legL, legR, neck, shoulderL, shoulderR, hipL, hipR]);
    
    return { composite: player, torso: torso, head: head, armR: armR, armL: armL, health: 100 };
}

const p1 = createRagdoll(300, 400, '#3498db', 'p1');
const p2 = createRagdoll(700, 400, '#e74c3c', 'p2');
Composite.add(world, [p1.composite, p2.composite]);

// --- Lógica de Control ---
const keys = {};
document.addEventListener('keydown', e => keys[e.code] = true);
document.addEventListener('keyup', e => keys[e.code] = false);

function applyMovement(p, left, right, up, punch, kick, isP1) {
    const force = 0.015;
    if (keys[left]) Body.applyForce(p.torso, p.torso.position, { x: -force, y: 0 });
    if (keys[right]) Body.applyForce(p.torso, p.torso.position, { x: force, y: 0 });
    if (keys[up] && Math.abs(p.torso.velocity.y) < 0.1) Body.applyForce(p.torso, p.torso.position, { x: 0, y: -0.15 });

    // Ataques (Fuerza hacia el oponente)
    const direction = isP1 ? 1 : -1;
    if (keys[punch]) {
        Body.applyForce(p.armR, p.armR.position, { x: 0.05 * direction, y: -0.02 });
    }
    if (keys[kick]) {
        Body.applyForce(p.torso, p.torso.position, { x: 0.02 * direction, y: -0.05 });
    }
}

// --- Daño y Colisiones ---
Matter.Events.on(engine, 'collisionStart', event => {
    event.pairs.forEach(pair => {
        const labels = [pair.bodyA.parent.label, pair.bodyB.parent.label];
        if (labels.includes('p1') && labels.includes('p2')) {
            // Verificar velocidad de impacto para daño
            const impact = Math.abs(pair.bodyA.velocity.x) + Math.abs(pair.bodyB.velocity.x);
            if (impact > 5) {
                if (pair.bodyA.parent.label === 'p1') p1.health -= 2;
                else p2.health -= 2;
            }
        }
    });
});

// --- Game Loop ---
let timeLeft = 99;
setInterval(() => { if(timeLeft > 0) timeLeft--; document.getElementById('timer').innerText = timeLeft; }, 1000);

(function update() {
    applyMovement(p1, 'KeyA', 'KeyD', 'KeyW', 'KeyF', 'KeyG', true);
    applyMovement(p2, 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'KeyK', 'KeyL', false);

    // Actualizar UI
    document.getElementById('p1-health').style.width = Math.max(0, p1.health) + '%';
    document.getElementById('p2-health').style.width = Math.max(0, p2.health) + '%';

    // Mantener los cuerpos erguidos (Torque correctivo)
    [p1, p2].forEach(p => {
        Body.setAngle(p.torso, p.torso.angle * 0.9);
    });

    Engine.update(engine);
    requestAnimationFrame(update);
})();

Render.run(render);
Runner.run(Runner.create(), engine);
</script>

</body>
</html>
