<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Doom Loader - GitHub Edition</title>
    <script src="https://js-dos.com/v7/build/releases/latest/js-dos.js"></script>
    <style>
        body { background: #1a1a1a; color: #eee; font-family: 'Courier New', Courier, monospace; text-align: center; }
        #dos-container { width: 640px; height: 400px; margin: 20px auto; border: 2px solid #ff0000; display: none; }
        .upload-zone { border: 2px dashed #555; padding: 40px; width: 500px; margin: 50px auto; cursor: pointer; }
        .upload-zone:hover { border-color: #ff0000; background: #222; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <h1>DOOM WAD PLAYER</h1>
    
    <div id="setup">
        <div class="upload-zone" onclick="document.getElementById('wadInput').click()">
            <p>Selecciona o arrastra tu archivo <b>.WAD</b> aquí</p>
            <input type="file" id="wadInput" accept=".wad">
        </div>
        <p><small>El motor (Doom Shareware) se cargará automáticamente.</small></p>
    </div>

    <div id="dos-container"></div>

    <script>
        const wadInput = document.getElementById('wadInput');
        const setupDiv = document.getElementById('setup');
        const container = document.getElementById('dos-container');

        wadInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Ocultar interfaz de subida y mostrar juego
            setupDiv.style.display = 'none';
            container.style.display = 'block';

            const runtime = await Dos(container);
            
            // 1. Descargamos el motor básico (shareware) desde un bundle público
            const bundle = await runtime.download("https://js-dos.com/v7/build/archive/doom.zip");

            // 2. "Montamos" el archivo WAD del usuario dentro del sistema de archivos virtual
            const reader = new FileReader();
            reader.onload = async (event) => {
                const wadData = new Uint8Array(event.target.result);
                
                // Escribimos el archivo en el disco virtual de DOS
                await runtime.fs.extract(bundle);
                await runtime.fs.writeFile("DOOM1.WAD", wadData); 

                // Ejecutamos el juego
                // Nota: Si el usuario sube "DOOM2.WAD", deberías ajustar el comando
                runtime.main(["DOOM.EXE"]);
            };
            reader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
