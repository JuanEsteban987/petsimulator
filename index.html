<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Pet Simulator</title>
    <style>
        :root {
            --primary: #ffcf33;
            --secondary: #4a90e2;
            --bg: #282c34;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; }
        
        #hud { font-size: 2rem; margin-top: 20px; font-weight: bold; color: var(--primary); text-shadow: 2px 2px #000; }
        
        #game-area { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; }
        
        #main-coin { font-size: 100px; cursor: pointer; transition: transform 0.1s; user-select: none; }
        #main-coin:active { transform: scale(0.9); }

        #shop { background: #333; padding: 20px; border-radius: 15px; width: 80%; max-width: 400px; text-align: center; border: 3px solid var(--secondary); }
        
        button { background: var(--secondary); border: none; padding: 10px 20px; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #357abd; }
        button:disabled { background: #777; cursor: not-allowed; }

        #inventory { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .pet-card { background: #444; padding: 10px; border-radius: 8px; border: 1px solid var(--primary); font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="hud">Monedas: <span id="coin-count">0</span></div>
    <div id="multiplier-info">Poder por clic: <span id="multiplier">1</span></div>

    <div id="game-area">
        <div id="main-coin">💰</div>
        <p>¡Haz clic en la moneda!</p>
    </div>

    <div id="shop">
        <h3>Huevo de Mascota</h3>
        <p>Costo: 50 Monedas</p>
        <button id="buy-egg">Comprar Huevo (Gacha)</button>
    </div>

    <h3>Mis Mascotas</h3>
    <div id="inventory"></div>

    <script>
        // --- Estado del Juego ---
        let coins = 0;
        let power = 1;
        let pets = [];

        const petTypes = [
            { name: "Perro", emoji: "🐶", power: 2, chance: 0.5 },    // 50%
            { name: "Gato", emoji: "🐱", power: 5, chance: 0.3 },     // 30%
            { name: "Dragón", emoji: "🐉", power: 20, chance: 0.15 }, // 15%
            { name: "Unicornio", emoji: "🦄", power: 100, chance: 0.05 } // 5%
        ];

        // --- Elementos del DOM ---
        const coinDisplay = document.getElementById('coin-count');
        const multiplierDisplay = document.getElementById('multiplier');
        const mainCoin = document.getElementById('main-coin');
        const buyBtn = document.getElementById('buy-egg');
        const inventoryDiv = document.getElementById('inventory');

        // --- Lógica ---

        // 1. Ganar monedas
        mainCoin.addEventListener('click', () => {
            coins += power;
            updateUI();
        });

        // 2. Comprar huevo
        buyBtn.addEventListener('click', () => {
            if (coins >= 50) {
                coins -= 50;
                hatchPet();
            } else {
                alert("¡No tienes suficientes monedas!");
            }
        });

        function hatchPet() {
            const roll = Math.random();
            let cumulativeChance = 0;
            let selectedPet = petTypes[0];

            for (let pet of petTypes) {
                cumulativeChance += pet.chance;
                if (roll <= cumulativeChance) {
                    selectedPet = pet;
                    break;
                }
            }

            pets.push(selectedPet);
            // El poder total es la suma de todas las mascotas + 1 inicial
            power = 1 + pets.reduce((sum, p) => sum + p.power, 0);
            
            updateUI();
            renderInventory();
        }

        function updateUI() {
            coinDisplay.innerText = Math.floor(coins);
            multiplierDisplay.innerText = power;
            buyBtn.disabled = coins < 50;
        }

        function renderInventory() {
            inventoryDiv.innerHTML = "";
            pets.forEach(pet => {
                const card = document.createElement('div');
                card.className = "pet-card";
                card.innerHTML = `${pet.emoji} <br> +${pet.power}`;
                inventoryDiv.appendChild(card);
            });
        }
    </script>
</body>
</html>
