<!DOCTYPE html>
<html>
<head>
    <title>CUSTOM_CPP_DOOM_ENGINE</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        #screen { border: 2px solid #333; background: #111; cursor: none; }
        .hud { width: 640px; background: #222; padding: 10px; border: 2px solid #555; display: flex; justify-content: space-around; }
        .pixel-font { text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

    <h2 class="pixel-font">ENGINE_STATUS: RUNNING_3D</h2>
    
    <canvas id="screen" width="640" height="320"></canvas>

    <div class="hud">
        <div class="pixel-font">LIFE: <span id="hp" style="color: red;">100</span>%</div>
        <div class="pixel-font">AMMO: 20/--</div>
        <div class="pixel-font">WEAPON: <span style="color: yellow;">MELEE/RANGE</span></div>
    </div>

<script>
const canvas = document.getElementById('screen');
const ctx = canvas.getContext('2d');

// --- 1. TU ESCENA (MAPA) ---
const map = [
    ['O', 'O', 'O', 'O', 'O'],
    ['O', ' ', ' ', ' ', 'O'],
    ['O', ' ', 'E', ' ', 'O'],
    ['O', ' ', ' ', ' ', 'O'],
    ['O', 'O', 'O', 'O', 'O']
];
const mapSize = 5;

// --- 2. CONFIGURACIÓN DEL JUGADOR ---
let player = { x: 2.5, y: 1.5, dir: 0, fov: 60 * (Math.PI / 180) };

// --- 3. TU TEXTURA "O" (Convertida a colores reales) ---
const textureData = [
    "########", "##R##R##", "#RYRRYR#", "#RRRRRR#",
    "###RR###", "###RR###", "##R##R##", "########"
];
const colors = { 'R': '#cc0000', 'Y': '#ffff00', '#': '#444' };

// --- 4. MOTOR DE RAYCASTING (Lógica DOOM) ---
function frame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Dibujar Suelo y Techo
    ctx.fillStyle = "#222"; ctx.fillRect(0, 160, 640, 160); // Suelo
    ctx.fillStyle = "#111"; ctx.fillRect(0, 0, 640, 160);   // Techo

    const numRays = 160; // Resolución horizontal
    const rayStep = player.fov / numRays;

    for (let i = 0; i < numRays; i++) {
        let rayAngle = (player.dir - player.fov / 2) + (i * rayStep);
        let distance = 0;
        let hitWall = false;
        let textureX = 0;

        // Lanzar rayo
        while (!hitWall && distance < 10) {
            distance += 0.05;
            let testX = Math.floor(player.x + Math.cos(rayAngle) * distance);
            let testY = Math.floor(player.y + Math.sin(rayAngle) * distance);

            if (testX < 0 || testX >= mapSize || testY < 0 || testY >= mapSize) {
                hitWall = true; distance = 10;
            } else if (map[testY][testX] === 'O') {
                hitWall = true;
                // Calcular qué columna de la textura "O" golpear
                let hitX = player.x + Math.cos(rayAngle) * distance;
                let hitY = player.y + Math.sin(rayAngle) * distance;
                textureX = Math.floor(((hitX % 1) + (hitY % 1)) * 8) % 8;
            }
        }

        // Dibujar pared proyectada
        let ceiling = 160 - (160 / distance);
        let floor = 320 - ceiling;
        let wallHeight = floor - ceiling;

        // Dibujar la textura "O" píxel por píxel en la vertical
        for (let py = 0; py < 8; py++) {
            let colorChar = textureData[py][textureX];
            ctx.fillStyle = colors[colorChar];
            let segmentH = wallHeight / 8;
            ctx.fillRect(i * 4, ceiling + (py * segmentH), 4, segmentH + 1);
        }
    }

    // Movimiento automático de cámara para efecto de juego
    player.dir += 0.01;
    requestAnimationFrame(frame);
}

// Iniciar motor
frame();
</script>
</body>
</html>
