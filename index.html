<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JS-CRAFT: ULTIMATE ENGINE</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; }
        canvas { display: block; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; pointer-events: none; z-index: 10; }
        
        /* HUD & INVENTORY */
        #hud { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; background: rgba(0,0,0,0.6); padding: 8px; border: 3px solid #333; pointer-events: none; }
        .slot { width: 45px; height: 45px; border: 2px solid #555; background: #8b8b8b; display: flex; justify-content: center; align-items: center; color: white; position: relative; }
        .slot.active { border-color: #fff; box-shadow: 0 0 10px #fff; background: #aaa; }
        .count { position: absolute; bottom: 2px; right: 4px; font-size: 12px; }

        /* MULTIPLAYER UI */
        #mp-ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: #0f0; padding: 10px; border: 2px solid #444; font-size: 12px; z-index: 100; }
        input { background: #222; border: 1px solid #555; color: white; width: 80px; font-size: 10px; }

        /* MOBILE UI */
        #mobile-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        .joystick { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; pointer-events: all; }
        .m-btn { position: absolute; bottom: 40px; right: 40px; width: 70px; height: 70px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; pointer-events: all; font-weight: bold; }
        #jump-btn { bottom: 120px; }
    </style>
</head>
<body>

<div id="mp-ui">
    ID: <span id="my-id">...</span><br>
    <input type="text" id="peer-id" placeholder="ID Amigo">
    <button onclick="connectP2P()">CONECTAR</button>
</div>

<div id="crosshair">+</div>
<div id="hud"></div>

<div id="mobile-overlay">
    <div class="joystick" id="joy"></div>
    <div class="m-btn" id="action-btn">PONER</div>
    <div class="m-btn" id="jump-btn">SALTAR</div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js';

// --- CONFIGURACIÓN ---
const world = new Map();
const players = new Map();
let peerConn = null;
const inventory = Array(9).fill(null).map((_, i) => ({ 
    type: i === 0 ? 'grass' : (i === 1 ? 'wood' : (i === 2 ? 'stone' : null)), 
    count: 64 
}));
let selectedSlot = 0;
const isMobile = 'ontouchstart' in window;

// --- MOTOR GRÁFICO & TEXTURAS ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new PointerLockControls(camera, document.body);
scene.add(new THREE.AmbientLight(0xffffff, 0.8));

function createPixelMat(c1, c2) {
    const canvas = document.createElement('canvas');
    canvas.width = 8; canvas.height = 8;
    const ctx = canvas.getContext('2d');
    for(let x=0; x<8; x++) for(let y=0; y<8; y++) {
        ctx.fillStyle = Math.random() > 0.4 ? c1 : c2;
        ctx.fillRect(x,y,1,1);
    }
    const tex = new THREE.CanvasTexture(canvas);
    tex.magFilter = THREE.NearestFilter;
    return new THREE.MeshLambertMaterial({ map: tex });
}

const mats = {
    grass: createPixelMat('#5d994d', '#4a7a3d'),
    dirt: createPixelMat('#795548', '#60443a'),
    stone: createPixelMat('#888888', '#777777'),
    wood: createPixelMat('#5d4037', '#453028'),
    leaves: createPixelMat('#3d6e35', '#2d5027')
};

// --- GENERACIÓN DE MUNDO (CUEVAS + FACE CULLING) ---
const geo = new THREE.BoxGeometry(1, 1, 1);
function setBlock(x, y, z, type, render = true) {
    const key = `${x},${y},${z}`;
    if (world.has(key)) return;
    const mesh = new THREE.Mesh(geo, mats[type]);
    mesh.position.set(x, y, z);
    mesh.name = type;
    if (render) scene.add(mesh);
    world.set(key, mesh);
}

// Generar terreno con cuevas
for(let x=-15; x<15; x++) {
    for(let z=-15; z<15; z++) {
        const ground = Math.floor(Math.sin(x/5)*3 + Math.cos(z/5)*2);
        for(let y=-8; y<=ground; y++) {
            const cave = Math.sin(x/2) * Math.cos(y/2) * Math.sin(z/2);
            if (y < ground - 1 && cave > 0.6) continue; // Cueva
            
            let type = 'stone';
            if (y === ground) type = 'grass';
            else if (y > ground - 3) type = 'dirt';
            
            // Face Culling: Solo renderizamos si está expuesto
            const isExposed = (y === ground);
            setBlock(x, y, z, type, isExposed);
        }
        // Árboles
        if (x%8===0 && z%8===0 && Math.random()>0.5) {
            for(let ty=1; ty<5; ty++) setBlock(x, ground+ty, z, 'wood', true);
            for(let lx=-1; lx<=1; lx++) for(let lz=-1; lz<=1; lz++) setBlock(x+lx, ground+5, z+lz, 'leaves', true);
        }
    }
}

// --- FÍSICA DE COLISIÓN (AABB) ---
let velocity = new THREE.Vector3(), canJump = false;
let move = { f:0, b:0, l:0, r:0 };

function getBlockAt(x, y, z) {
    return world.has(`${Math.round(x)},${Math.round(y)},${Math.round(z)}`);
}

function updatePhysics(dt) {
    if (!controls.isLocked && !isMobile) return;

    velocity.y -= 22 * dt; // Gravedad
    const pos = camera.position;

    // Colisión Vertical (Y)
    const nextY = pos.y + velocity.y * dt;
    if (getBlockAt(pos.x, nextY - 1.6, pos.z)) {
        velocity.y = 0; canJump = true;
    } else {
        pos.y = nextY;
    }

    // Movimiento Horizontal (X, Z) con colisión
    const dir = new THREE.Vector3();
    dir.z = move.f - move.b;
    dir.x = move.r - move.l;
    dir.normalize();

    const speed = 5 * dt;
    if (dir.length() > 0) {
        const oldX = pos.x, oldZ = pos.z;
        controls.moveRight(dir.x * speed);
        if (getBlockAt(pos.x, pos.y - 1, pos.z)) pos.x = oldX;
        controls.moveForward(dir.z * speed);
        if (getBlockAt(pos.x, pos.y - 1, pos.z)) pos.z = oldZ;
    }
}

// --- MULTIPLAYER P2P (PEERJS) ---
const peer = new Peer();
peer.on('open', id => document.getElementById('my-id').innerText = id);
peer.on('connection', c => handleConn(c));

window.connectP2P = () => handleConn(peer.connect(document.getElementById('peer-id').value));

function handleConn(c) {
    peerConn = c;
    c.on('data', data => {
        if (data.type === 'move') {
            if (!players.has(data.id)) {
                const m = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.8, 0.6), mats.wood);
                scene.add(m); players.set(data.id, m);
            }
            players.get(data.id).position.set(data.x, data.y - 0.9, data.z);
        }
        if (data.type === 'place') setBlock(data.x, data.y, data.z, data.block, true);
    });
}

// --- INTERACCIÓN & UI ---
const hud = document.getElementById('hud');
const drawUI = () => {
    hud.innerHTML = inventory.map((s, i) => `
        <div class="slot ${i === selectedSlot ? 'active' : ''}">
            ${s.type ? {grass:'🌿', wood:'🪵', stone:'🧱'}[s.type] || '' : ''}
            <span class="count">${s.count || ''}</span>
        </div>`).join('');
};

function interact(isBreak) {
    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(0,0), camera);
    const intersects = ray.intersectObjects(scene.children);
    if (intersects.length > 0) {
        const obj = intersects[0].object;
        if (isBreak) {
            scene.remove(obj); world.delete(`${obj.position.x},${obj.position.y},${obj.position.z}`);
        } else {
            const n = obj.position.clone().add(intersects[0].face.normal);
            // Validación de no asfixia
            if (Math.round(camera.position.x) === n.x && Math.round(camera.position.z) === n.z) return;
            const s = inventory[selectedSlot];
            if (s.type && s.count > 0) {
                setBlock(n.x, n.y, n.z, s.type, true);
                if (peerConn) peerConn.send({ type: 'place', x: n.x, y: n.y, z: n.z, block: s.type });
                s.count--; if(s.count === 0) s.type = null; drawUI();
            }
        }
    }
}

// --- INPUTS ---
window.onkeydown = (e) => {
    if (e.code === 'KeyW') move.f = 1; if (e.code === 'KeyS') move.b = 1;
    if (e.code === 'KeyA') move.l = 1; if (e.code === 'KeyD') move.r = 1;
    if (e.code === 'Space' && canJump) { velocity.y = 8; canJump = false; }
    if (e.key >= 1 && e.key <= 9) { selectedSlot = e.key - 1; drawUI(); }
};
window.onkeyup = (e) => {
    if (e.code === 'KeyW') move.f = 0; if (e.code === 'KeyS') move.b = 0;
    if (e.code === 'KeyA') move.l = 0; if (e.code === 'KeyD') move.r = 0;
};
window.onmousedown = (e) => { if(controls.isLocked) interact(e.button === 0); };

// --- SOPORTE MÓVIL ---
if (isMobile) {
    document.getElementById('mobile-overlay').style.display = 'block';
    document.getElementById('jump-btn').onclick = () => { if(canJump) velocity.y = 8; canJump = false; };
    document.getElementById('action-btn').onclick = () => interact(false);
    
    // Cámara táctil
    let touchStart = null;
    window.ontouchstart = (e) => touchStart = { x: e.touches[0].pageX, y: e.touches[0].pageY };
    window.ontouchmove = (e) => {
        if (!touchStart || e.target.className.includes('m-btn')) return;
        const dx = e.touches[0].pageX - touchStart.x;
        const dy = e.touches[0].pageY - touchStart.y;
        camera.rotation.y -= dx * 0.005;
        camera.rotation.x -= dy * 0.005;
        touchStart = { x: e.touches[0].pageX, y: e.touches[0].pageY };
    };
}

// --- BUCLE PRINCIPAL ---
let last = performance.now();
function loop() {
    requestAnimationFrame(loop);
    const now = performance.now();
    const dt = Math.min((now - last) / 1000, 0.1);
    updatePhysics(dt);
    
    if (peerConn && now % 100 < 20) {
        peerConn.send({ type:'move', id:peer.id, x:camera.position.x, y:camera.position.y, z:camera.position.z });
    }
    
    renderer.render(scene, camera);
    last = now;
}

document.body.onclick = () => { if(!isMobile) controls.lock(); };
camera.position.set(0, 10, 0);
drawUI();
loop();
</script>
</body>
</html>
