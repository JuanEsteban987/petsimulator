<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GMod 2D Sandbox</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1e1e1e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
            background: #2c3e50;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            border: 1px solid #555;
        }
        #menu {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(40, 40, 40, 0.9);
            padding: 10px;
            border-radius: 10px;
            display: flex;
            gap: 10px;
            border: 2px solid #3498db;
        }
        .tool-btn {
            background: #34495e;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        .tool-btn:hover {
            background: #3498db;
        }
        .tool-btn.active {
            background: #e74c3c;
        }
        #instructions {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #bdc3c7;
            text-align: right;
            font-size: 0.8em;
        }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-size: 1.2em; color: #3498db; margin-bottom: 5px;">GMod HTML 2D</div>
    <div>Herramienta: <span id="current-tool">Physics Gun</span></div>
    <div>Entidades: <span id="entity-count">0</span></div>
</div>

<div id="instructions">
    [WASD] Moverse | [Espacio] Saltar<br>
    [Click Izquierdo] Usar Herramienta<br>
    [Q] Menú de Spawn (Próximamente)<br>
    [R] Limpiar todo
</div>

<div id="menu" style="pointer-events: auto;">
    <button class="tool-btn active" onclick="setTool('physgun', this)">Physics Gun</button>
    <button class="tool-btn" onclick="setTool('spawner', this)">Spawn Box</button>
    <button class="tool-btn" onclick="setTool('remover', this)">Remover</button>
    <button class="tool-btn" onclick="spawnNPC()">Spawn NPC</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const countDisplay = document.getElementById('entity-count');
    const toolDisplay = document.getElementById('current-tool');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Configuración
    let gravity = 0.5;
    let friction = 0.98;
    let currentTool = 'physgun';
    let entities = [];
    let keys = {};
    let mouse = { x: 0, y: 0, down: false, grabbedEntity: null };

    // Jugador (GMod Style)
    const player = {
        x: 100,
        y: 100,
        width: 30,
        height: 60,
        velX: 0,
        velY: 0,
        speed: 5,
        jumpForce: 12,
        grounded: false,
        color: '#3498db'
    };

    class Entity {
        constructor(x, y, width, height, type = 'prop', color = '#95a5a6') {
            this.x = x;
            this.y = y;
            this.width = width;
            this.height = height;
            this.velX = 0;
            this.velY = 0;
            this.type = type;
            this.color = color;
            this.isStatic = false;
            this.grabbed = false;
        }

        update() {
            if (this.isStatic || this.grabbed) return;

            this.velY += gravity;
            this.x += this.velX;
            this.y += this.velY;

            // Colisión con el suelo
            if (this.y + this.height > canvas.height - 20) {
                this.y = canvas.height - 20 - this.height;
                this.velY *= -0.4; // Rebote
                this.velX *= friction;
            }

            // Límites laterales
            if (this.x < 0 || this.x + this.width > canvas.width) {
                this.velX *= -1;
            }
        }

        draw() {
            ctx.fillStyle = this.grabbed ? '#00ff00' : this.color;
            ctx.fillRect(this.x, this.y, this.width, this.height);
            
            // Efecto de borde para parecerse a props de Source
            ctx.strokeStyle = 'rgba(0,0,0,0.5)';
            ctx.strokeRect(this.x, this.y, this.width, this.height);

            if (this.type === 'npc') {
                // Dibujar ojos simples para los NPCs
                ctx.fillStyle = 'white';
                ctx.fillRect(this.x + 5, this.y + 10, 5, 5);
                ctx.fillRect(this.x + this.width - 10, this.y + 10, 5, 5);
            }
        }
    }

    // Funciones de Herramientas
    function setTool(tool, btn) {
        currentTool = tool;
        toolDisplay.innerText = tool.charAt(0).toUpperCase() + tool.slice(1);
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function spawnBox(x, y) {
        const size = Math.random() * 30 + 20;
        const colors = ['#95a5a6', '#7f8c8d', '#d35400', '#27ae60'];
        entities.push(new Entity(x - size/2, y - size/2, size, size, 'prop', colors[Math.floor(Math.random() * colors.length)]));
    }

    function spawnNPC() {
        const npc = new Entity(Math.random() * canvas.width, 50, 30, 60, 'npc', '#e74c3c');
        entities.push(npc);
    }

    // Input Events
    window.addEventListener('keydown', e => {
        keys[e.code] = true;
        if(e.code === 'KeyR') entities = [];
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    canvas.addEventListener('mousedown', e => {
        mouse.down = true;
        const rect = canvas.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;

        if (currentTool === 'spawner') {
            spawnBox(mouse.x, mouse.y);
        } else if (currentTool === 'remover') {
            entities = entities.filter(ent => 
                !(mouse.x > ent.x && mouse.x < ent.x + ent.width && 
                  mouse.y > ent.y && mouse.y < ent.y + ent.height)
            );
        } else if (currentTool === 'physgun') {
            entities.forEach(ent => {
                if (mouse.x > ent.x && mouse.x < ent.x + ent.width && 
                    mouse.y > ent.y && mouse.y < ent.y + ent.height) {
                    mouse.grabbedEntity = ent;
                    ent.grabbed = true;
                }
            });
        }
    });

    window.addEventListener('mouseup', () => {
        mouse.down = false;
        if (mouse.grabbedEntity) {
            mouse.grabbedEntity.grabbed = false;
            mouse.grabbedEntity = null;
        }
    });

    canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;

        if (mouse.grabbedEntity) {
            mouse.grabbedEntity.x = mouse.x - mouse.grabbedEntity.width / 2;
            mouse.grabbedEntity.y = mouse.y - mouse.grabbedEntity.height / 2;
            mouse.grabbedEntity.velX = 0;
            mouse.grabbedEntity.velY = 0;
        }
    });

    function update() {
        // Movimiento Jugador
        if (keys['KeyA']) player.velX = -player.speed;
        else if (keys['KeyD']) player.velX = player.speed;
        else player.velX *= 0.8;

        if (keys['Space'] && player.grounded) {
            player.velY = -player.jumpForce;
            player.grounded = false;
        }

        player.velY += gravity;
        player.x += player.velX;
        player.y += player.velY;

        // Suelo para Jugador
        if (player.y + player.height > canvas.height - 20) {
            player.y = canvas.height - 20 - player.height;
            player.velY = 0;
            player.grounded = true;
        }

        // Actualizar Entidades
        entities.forEach(ent => ent.update());
        countDisplay.innerText = entities.length;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Dibujar Suelo
        ctx.fillStyle = '#34495e';
        ctx.fillRect(0, canvas.height - 20, canvas.width, 20);

        // Dibujar Props/NPCs
        entities.forEach(ent => ent.draw());

        // Dibujar Rayo de Physgun si está agarrando algo
        if (mouse.grabbedEntity) {
            ctx.beginPath();
            ctx.moveTo(player.x + player.width/2, player.y + 20);
            ctx.lineTo(mouse.x, mouse.y);
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Glow effect
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00ffff';
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // Dibujar Jugador
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.width, player.height);
        ctx.strokeStyle = 'white';
        ctx.strokeRect(player.x, player.y, player.width, player.height);
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    loop();
</script>

</body>
</html>
