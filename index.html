<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Minecraft JS - Colisiones y Construcción Total</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background: #87CEEB; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 16px; height: 16px; border: 2px solid white; transform: translate(-50%, -50%); pointer-events: none; mix-blend-mode: difference; z-index: 10; }
        #ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.7); padding: 8px; border: 4px solid #333; gap: 10px; }
        .slot { width: 50px; height: 50px; border: 3px solid #888; background: #555; display: flex; justify-content: center; align-items: center; color: white; position: relative; }
        .slot.selected { border-color: white; background: #777; }
        .count { position: absolute; bottom: 2px; right: 5px; font-size: 12px; color: yellow; }
        #debug { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 5px; font-size: 12px; }
    </style>
</head>
<body>

<div id="crosshair"></div>
<div id="debug">WASD: Mover | CLICK: Romper | R-CLICK: Poner | 1-3: Bloques</div>
<div id="ui">
    <div class="slot selected" id="slot-1">🌿<div class="count" id="cnt-1">0</div></div>
    <div class="slot" id="slot-2">🟫<div class="count" id="cnt-2">0</div></div>
    <div class="slot" id="slot-3">🧱<div class="count" id="cnt-3">0</div></div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// --- CONFIG ---
const CHUNK_SIZE = 16;
const WORLD = new Map();
let selectedSlot = 1;
const inventory = { 1: 5, 2: 5, 3: 5 }; // Iniciamos con 5 de cada para probar
let velocity = new THREE.Vector3();
let playerPos = new THREE.Vector3(8, 10, 8);

// --- MOTOR ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.AmbientLight(0xffffff, 1);
scene.add(light);

// Materiales
function createTex(color) {
    const canvas = document.createElement('canvas');
    canvas.width = 16; canvas.height = 16;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = color; ctx.fillRect(0,0,16,16);
    ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.strokeRect(0,0,16,16);
    const t = new THREE.CanvasTexture(canvas);
    t.magFilter = THREE.NearestFilter;
    return new THREE.MeshLambertMaterial({ map: t });
}
const mats = [null, createTex('#5da437'), createTex('#79553a'), createTex('#828282')];
const boxGeo = new THREE.BoxGeometry(1, 1, 1);

// Highlight
const highlight = new THREE.Mesh(new THREE.BoxGeometry(1.01, 1.01, 1.01), new THREE.MeshBasicMaterial({color: 0xffffff, wireframe: true}));
scene.add(highlight);

// --- LÓGICA DE COLISIONES Y MUNDO ---
function getVoxel(x, y, z) {
    const cx = Math.floor(x / CHUNK_SIZE);
    const cz = Math.floor(z / CHUNK_SIZE);
    const chunk = WORLD.get(`${cx},${cz}`);
    if (!chunk) return 0;
    const lx = Math.floor(x) - cx * CHUNK_SIZE;
    const ly = Math.floor(y);
    const lz = Math.floor(z) - cz * CHUNK_SIZE;
    if (ly < 0 || ly >= 16) return 0;
    return chunk.data[lx + ly*CHUNK_SIZE + lz*CHUNK_SIZE*16] || 0;
}

function setVoxel(x, y, z, type) {
    const cx = Math.floor(x / CHUNK_SIZE);
    const cz = Math.floor(z / CHUNK_SIZE);
    const key = `${cx},${cz}`;
    const chunk = WORLD.get(key);
    if (!chunk) return;

    const lx = Math.floor(x) - cx * CHUNK_SIZE;
    const ly = Math.floor(y);
    const lz = Math.floor(z) - cz * CHUNK_SIZE;
    const idx = lx + ly*CHUNK_SIZE + lz*CHUNK_SIZE*16;

    if (type === 0 && chunk.data[idx] > 0) inventory[chunk.data[idx]]++;
    chunk.data[idx] = type;

    const blockName = `b_${Math.floor(x)}_${ly}_${Math.floor(z)}`;
    const old = chunk.mesh.getObjectByName(blockName);
    if (old) chunk.mesh.remove(old);

    if (type > 0) {
        const cube = new THREE.Mesh(boxGeo, mats[type]);
        cube.position.set(Math.floor(x)+0.5, ly+0.5, Math.floor(z)+0.5);
        cube.name = blockName;
        chunk.mesh.add(cube);
    }
    updateUI();
}

class Chunk {
    constructor(cx, cz) {
        this.data = new Uint8Array(CHUNK_SIZE * 16 * CHUNK_SIZE);
        this.mesh = new THREE.Group();
        scene.add(this.mesh);
        for(let i=0; i<this.data.length; i++) {
            const x = i % CHUNK_SIZE, y = Math.floor(i / CHUNK_SIZE) % 16, z = Math.floor(i / (CHUNK_SIZE * 16));
            if (y < 4) {
                const type = y === 3 ? 1 : 2;
                this.data[i] = type;
                const cube = new THREE.Mesh(boxGeo, mats[type]);
                cube.position.set(cx*CHUNK_SIZE+x+0.5, y+0.5, cz*CHUNK_SIZE+z+0.5);
                cube.name = `b_${cx*CHUNK_SIZE+x}_${y}_${cz*CHUNK_SIZE+z}`;
                this.mesh.add(cube);
            }
        }
    }
}

// --- FÍSICAS DE COLISIÓN ---
function checkCollision(pos) {
    // Revisar caja de colisión simple alrededor de la posición
    const playerRadius = 0.3;
    for(let x = -playerRadius; x <= playerRadius; x += playerRadius*2) {
        for(let z = -playerRadius; z <= playerRadius; z += playerRadius*2) {
            for(let y = -1.5; y <= 0.1; y += 0.8) {
                if (getVoxel(pos.x + x, pos.y + y, pos.z + z) > 0) return true;
            }
        }
    }
    return false;
}

// --- INTERACCIÓN ---
window.addEventListener('mousedown', (e) => {
    if (document.pointerLockElement !== renderer.domElement) {
        renderer.domElement.requestPointerLock();
        return;
    }
    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(0,0), camera);
    const intersects = ray.intersectObjects(scene.children, true);
    
    // Filtrar para no chocar con el propio highlight
    const hit = intersects.find(i => i.object !== highlight);

    if (hit) {
        const pos = hit.point.clone();
        if (e.button === 0) { // Romper
            pos.add(hit.face.normal.clone().multiplyScalar(-0.1));
            setVoxel(pos.x, pos.y, pos.z, 0);
        } else if (e.button === 2 && inventory[selectedSlot] > 0) { // Poner
            pos.add(hit.face.normal.clone().multiplyScalar(0.1));
            // No poner bloque si el jugador está ahí
            if (Math.abs(pos.x - camera.position.x) > 0.6 || Math.abs(pos.z - camera.position.z) > 0.6) {
                setVoxel(pos.x, pos.y, pos.z, selectedSlot);
                inventory[selectedSlot]--;
                updateUI();
            }
        }
    }
});

function updateUI() {
    for(let i=1; i<=3; i++) document.getElementById('cnt-'+i).innerText = inventory[i];
}

// --- BUCLE ---
camera.position.set(8, 10, 8);
const keys = {};
document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.key >= 1 && e.key <= 3) {
        selectedSlot = parseInt(e.key);
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
        document.getElementById('slot-'+e.key).classList.add('selected');
    }
});
document.addEventListener('keyup', e => keys[e.code] = false);

let yaw = 0, pitch = 0;
document.addEventListener('mousemove', e => {
    if (document.pointerLockElement === renderer.domElement) {
        yaw -= e.movementX * 0.002;
        pitch -= e.movementY * 0.002;
        pitch = Math.max(-1.5, Math.min(1.5, pitch));
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
    }
});

function animate() {
    requestAnimationFrame(animate);
    
    // Gravedad
    velocity.y -= 0.01;
    let nextPos = camera.position.clone();
    nextPos.y += velocity.y;
    
    if (checkCollision(nextPos)) {
        if (velocity.y < 0) velocity.y = 0; // Toca suelo
        nextPos.y = camera.position.y;
    }
    camera.position.y = nextPos.y;

    // Movimiento con colisión X/Z
    const move = new THREE.Vector3();
    if (keys['KeyW']) move.z -= 1; if (keys['KeyS']) move.z += 1;
    if (keys['KeyA']) move.x -= 1; if (keys['KeyD']) move.x += 1;
    move.applyQuaternion(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), yaw)).normalize();

    const speed = 0.1;
    ['x', 'z'].forEach(axis => {
        let tempPos = camera.position.clone();
        tempPos[axis] += move[axis] * speed;
        if (!checkCollision(tempPos)) {
            camera.position[axis] = tempPos[axis];
        }
    });

    if (keys['Space'] && checkCollision(camera.position.clone().add(new THREE.Vector3(0,-0.1,0)))) {
        velocity.y = 0.15;
    }

    // Update Chunks 3x3
    const cx = Math.floor(camera.position.x / CHUNK_SIZE);
    const cz = Math.floor(camera.position.z / CHUNK_SIZE);
    for(let x=-1; x<=1; x++) for(let z=-1; z<=1; z++) {
        if (!WORLD.has(`${cx+x},${cz+z}`)) WORLD.set(`${cx+x},${cz+z}`, new Chunk(cx+x, cz+z));
    }

    // Update Highlight
    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(0,0), camera);
    const hit = ray.intersectObjects(scene.children, true).find(i => i.object !== highlight);
    if (hit) {
        const p = hit.point.clone().add(hit.face.normal.clone().multiplyScalar(-0.1));
        highlight.position.set(Math.floor(p.x)+0.5, Math.floor(p.y)+0.5, Math.floor(p.z)+0.5);
        highlight.visible = true;
    } else { highlight.visible = false; }

    renderer.render(scene, camera);
}
updateUI();
animate();
</script>
</body>
</html>
