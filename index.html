<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GMod 2D Sandbox Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Tahoma', sans-serif; }
        canvas { display: block; background: #3d4d5d; cursor: crosshair; }

        /* Interfaz estilo Source / GMod */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-left: 4px solid #3498db;
            color: #fff;
            pointer-events: none;
            text-shadow: 1px 1px 2px #000;
        }

        #toolbar {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(30, 30, 30, 0.8);
            padding: 10px;
            border: 1px solid #555;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-radius: 4px;
        }

        .tool-btn {
            background: #444;
            color: #ddd;
            border: 1px solid #222;
            padding: 12px;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .tool-btn:hover { background: #555; border-color: #3498db; }
        .tool-btn.active { background: #3498db; color: white; border-color: #fff; }

        #controls-tip {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="hud">
    <div style="font-weight: bold; font-size: 18px; margin-bottom: 5px;">Garry's Mod 2D</div>
    <div>Herramienta: <span id="tool-name" style="color: #3498db;">Physics Gun</span></div>
    <div style="margin-top: 5px; font-size: 13px;">Objetos: <span id="obj-count">0</span></div>
</div>

<div id="toolbar">
    <button class="tool-btn active" onclick="setTool('physgun', this)">Physics Gun</button>
    <button class="tool-btn" onclick="spawnEntity('prop')">Spawn Caja</button>
    <button class="tool-btn" onclick="spawnEntity('npc')">Spawn NPC</button>
    <button class="tool-btn" onclick="setTool('remover', this)">Remover</button>
    <button class="tool-btn" style="margin-top: 10px; background: #c0392b;" onclick="clearAll()">Limpiar Mapa</button>
</div>

<div id="controls-tip">
    WASD: Mover | CLICK IZQ: Usar Tool | CLICK DER (con Physgun): Congelar/Descongelar | R: Reiniciar
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let entities = [];
    let gravity = 0.4;
    let friction = 0.9;
    let currentTool = 'physgun';
    const keys = {};
    const mouse = { x: 0, y: 0, left: false, right: false, target: null };

    class Entity {
        constructor(x, y, w, h, type) {
            this.x = x; this.y = y;
            this.w = w; this.h = h;
            this.vx = 0; this.vy = 0;
            this.type = type;
            this.isFrozen = false;
            this.isGrabbed = false;
            this.color = type === 'npc' ? '#e74c3c' : '#95a5a6';
            this.grounded = false;
        }

        update() {
            if (this.isFrozen || this.isGrabbed) return;

            this.vy += gravity;
            this.vy *= 0.99; // Aire
            this.vx *= friction;

            // Integración de movimiento
            this.x += this.vx;
            this.y += this.vy;

            // Colisión Suelo
            if (this.y + this.h > canvas.height - 30) {
                this.y = canvas.height - 30 - this.h;
                this.vy = 0;
                this.vx *= friction;
                this.grounded = true;
            }

            // Colisión Paredes
            if (this.x < 0) { this.x = 0; this.vx *= -0.5; }
            if (this.x + this.w > canvas.width) { this.x = canvas.width - this.w; this.vx *= -0.5; }
        }

        draw() {
            ctx.fillStyle = this.isFrozen ? '#2980b9' : (this.isGrabbed ? '#2ecc71' : this.color);
            ctx.fillRect(this.x, this.y, this.w, this.h);
            
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.lineWidth = 2;
            ctx.strokeRect(this.x, this.y, this.w, this.h);

            if (this.type === 'npc') {
                ctx.fillStyle = 'white';
                ctx.fillRect(this.x + 5, this.y + 10, 6, 6);
                ctx.fillRect(this.x + this.w - 11, this.y + 10, 6, 6);
            }
        }
    }

    const player = {
        x: 100, y: 100, w: 30, h: 55, vx: 0, vy: 0,
        speed: 5, jump: 10, grounded: false
    };

    function checkCollision(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function resolveCollisions() {
        const all = [...entities, player];

        for (let i = 0; i < all.length; i++) {
            for (let j = i + 1; j < all.length; j++) {
                let e1 = all[i];
                let e2 = all[j];

                if (checkCollision(e1, e2)) {
                    // Empuje básico (Simple AABB Resolve)
                    let midX1 = e1.x + e1.w / 2;
                    let midX2 = e2.x + e2.w / 2;
                    let midY1 = e1.y + e1.h / 2;
                    let midY2 = e2.y + e2.h / 2;

                    let dx = midX1 - midX2;
                    let dy = midY1 - midY2;

                    if (Math.abs(dx) > Math.abs(dy)) {
                        if (dx > 0) e1.x = e2.x + e2.w; else e1.x = e2.x - e1.w;
                        e1.vx *= 0.5;
                    } else {
                        if (dy > 0) e1.y = e2.y + e2.h; else {
                            e1.y = e2.y - e1.h;
                            e1.grounded = true;
                            if(e1 === player) player.vy = 0;
                        }
                    }
                }
            }
        }
    }

    function spawnEntity(type) {
        const size = type === 'npc' ? {w:30, h:60} : {w:40, h:40};
        entities.push(new Entity(mouse.x || 100, 50, size.w, size.h, type));
    }

    function setTool(tool, btn) {
        currentTool = tool;
        document.getElementById('tool-name').innerText = btn.innerText;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function clearAll() { entities = []; }

    // Loop de Control
    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    canvas.onmousedown = e => {
        if (e.button === 0) mouse.left = true;
        if (e.button === 2) mouse.right = true;

        if (currentTool === 'remover' && mouse.left) {
            entities = entities.filter(ent => !checkCollision({x:mouse.x, y:mouse.y, w:1, h:1}, ent));
        }

        if (currentTool === 'physgun') {
            entities.forEach(ent => {
                if (mouse.x > ent.x && mouse.x < ent.x + ent.w && mouse.y > ent.y && mouse.y < ent.y + ent.h) {
                    if (mouse.left) {
                        mouse.target = ent;
                        ent.isGrabbed = true;
                        ent.isFrozen = false;
                    }
                    if (mouse.right && !mouse.left) {
                        ent.isFrozen = !ent.isFrozen;
                    }
                }
            });
        }
    };

    window.onmouseup = e => {
        if (e.button === 0) {
            mouse.left = false;
            if (mouse.target) {
                mouse.target.isGrabbed = false;
                mouse.target = null;
            }
        }
        if (e.button === 2) mouse.right = false;
    };

    window.onmousemove = e => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
        if (mouse.target && mouse.left) {
            mouse.target.x = mouse.x - mouse.target.w / 2;
            mouse.target.y = mouse.y - mouse.target.h / 2;
            mouse.target.vx = 0; mouse.target.vy = 0;
        }
    };

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Movimiento Jugador
        if (keys['KeyA']) player.vx = -player.speed;
        else if (keys['KeyD']) player.vx = player.speed;
        else player.vx *= friction;

        player.vy += gravity;
        player.x += player.vx;
        player.y += player.vy;

        if (player.y + player.h > canvas.height - 30) {
            player.y = canvas.height - 30 - player.h;
            player.vy = 0;
            player.grounded = true;
        }

        if (keys['Space'] && player.grounded) {
            player.vy = -player.jump;
            player.grounded = false;
        }

        // Colisiones y Updates
        entities.forEach(ent => ent.update());
        resolveCollisions();

        // Dibujo
        // Suelo
        ctx.fillStyle = '#2c3e50';
        ctx.fillRect(0, canvas.height - 30, canvas.width, 30);

        entities.forEach(ent => ent.draw());

        // Rayo Physgun
        if (mouse.target) {
            ctx.beginPath();
            ctx.moveTo(player.x + player.w/2, player.y + 15);
            ctx.lineTo(mouse.x, mouse.y);
            ctx.strokeStyle = '#3498db';
            ctx.lineWidth = 3;
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Dibujar Player
        ctx.fillStyle = '#3498db';
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.strokeStyle = '#fff';
        ctx.strokeRect(player.x, player.y, player.w, player.h);

        document.getElementById('obj-count').innerText = entities.length;
        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
