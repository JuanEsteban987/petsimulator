<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Garry's Mod HTML5 - Hardcoded Edition</title>
    <style>
        :root { --hl2-orange: #ffb400; --ui-bg: rgba(0, 0, 0, 0.8); }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Tahoma', sans-serif; color: white; }
        
        /* HUD UI */
        #hud { position: fixed; bottom: 40px; left: 40px; display: flex; gap: 60px; pointer-events: none; z-index: 100; }
        .hud-vitals { display: flex; flex-direction: column; }
        .hud-val { font-size: 72px; font-weight: 900; color: var(--hl2-orange); line-height: 1; text-shadow: 4px 4px 0px #000; }
        .hud-lbl { font-size: 14px; text-transform: uppercase; color: var(--hl2-orange); font-weight: bold; }

        #crosshair { 
            position: fixed; top: 50%; left: 50%; width: 20px; height: 20px; 
            border: 1px solid var(--hl2-orange); transform: translate(-50%, -50%); border-radius: 50%;
        }

        /* MENUS */
        #q-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; z-index: 1000;
            justify-content: center; align-items: center;
        }
        .spawn-window {
            width: 80%; height: 80%; background: var(--ui-bg); border: 2px solid #555;
            padding: 30px; display: flex; flex-direction: column;
        }
        .prop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; overflow-y: auto; }
        .prop-item { 
            background: #222; border: 1px solid #444; padding: 20px; text-align: center; cursor: pointer;
            transition: 0.2s; border-radius: 4px;
        }
        .prop-item:hover { background: var(--hl2-orange); color: black; font-weight: bold; }

        #debug-info { position: fixed; top: 10px; left: 10px; font-family: monospace; font-size: 12px; color: #0f0; }
    </style>
</head>
<body>

    <div id="debug-info">GMOD_WEB_BUILD_2026 | FPS: <span id="fps">60</span> | P2P: <span id="p2p-id">---</span></div>
    <div id="crosshair"></div>

    <div id="hud">
        <div class="hud-vitals">
            <span class="hud-lbl">Health</span>
            <span class="hud-val" id="hp-val">100</span>
        </div>
        <div class="hud-vitals">
            <span class="hud-lbl">Armor</span>
            <span class="hud-val" id="ap-val">0</span>
        </div>
    </div>

    <div id="q-menu">
        <div class="spawn-window">
            <h1>Spawn Menu (Q)</h1>
            <div class="prop-grid" id="prop-grid">
                </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <script>
    /**
     * GMOD WEB CORE - COMPLETO
     */
    class GmodEngine {
        constructor() {
            this.initGraphics();
            this.initPhysics();
            this.initPlayer();
            this.initInput();
            this.initNetworking();
            
            this.props = [];
            this.meshes = [];
            this.zombies = [];
            this.noclip = false;
            this.activeWeapon = 'physgun';
            
            // PhysGun State
            this.pickedBody = null;
            this.pickDistance = 10;
            this.beam = this.createPhysBeam();

            this.setupMap();
            this.render();
        }

        initGraphics() {
            this.scene = new THREE.Scene();
            this.scene.background = new THREE.Color(0x87ceeb);
            this.scene.fog = new THREE.Fog(0x87ceeb, 20, 500);

            this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            this.renderer = new THREE.WebGLRenderer({ antialias: true });
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.shadowMap.enabled = true;
            this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(this.renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.5);
            this.scene.add(ambient);

            this.sun = new THREE.DirectionalLight(0xffffff, 1.2);
            this.sun.position.set(100, 200, 100);
            this.sun.castShadow = true;
            this.sun.shadow.camera.left = -100;
            this.sun.shadow.camera.right = 100;
            this.sun.shadow.camera.top = 100;
            this.sun.shadow.camera.bottom = -100;
            this.scene.add(this.sun);
        }

        initPhysics() {
            this.world = new CANNON.World();
            this.world.gravity.set(0, -19.6, 0);
            this.world.broadphase = new CANNON.SAPBroadphase(this.world);
            this.world.solver.iterations = 10;
            this.clock = new THREE.Clock();
        }

        initPlayer() {
            const shape = new CANNON.Box(new CANNON.Vec3(0.6, 1.8, 0.6));
            this.playerBody = new CANNON.Body({ mass: 85, fixedRotation: true });
            this.playerBody.addShape(shape);
            this.playerBody.position.set(0, 10, 0);
            this.world.addBody(this.playerBody);
            
            this.moveState = { f: 0, b: 0, l: 0, r: 0, jump: false };
            this.canJump = false;

            this.playerBody.addEventListener("collide", (e) => {
                if(Math.abs(e.contact.ni.y) > 0.5) this.canJump = true;
            });
        }

        createPhysBeam() {
            const material = new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 2 });
            const geometry = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
            const line = new THREE.Line(geometry, material);
            line.visible = false;
            this.scene.add(line);
            return line;
        }

        setupMap() {
            // Ground
            const floorGeo = new THREE.PlaneGeometry(1000, 1000);
            const floorMat = new THREE.MeshPhongMaterial({ color: 0x555555 });
            const floorMesh = new THREE.Mesh(floorGeo, floorMat);
            floorMesh.rotation.x = -Math.PI / 2;
            floorMesh.receiveShadow = true;
            this.scene.add(floorMesh);

            const groundBody = new CANNON.Body({ mass: 0 });
            groundBody.addShape(new CANNON.Plane());
            groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2);
            this.world.addBody(groundBody);

            // Spawn Menu Items
            const items = ['Crate', 'Barrel', 'Sphere', 'Wall', 'Zombie NPC', 'Explosive'];
            const grid = document.getElementById('prop-grid');
            items.forEach(type => {
                const div = document.createElement('div');
                div.className = 'prop-item';
                div.innerText = type;
                div.onclick = () => this.spawn(type);
                grid.appendChild(div);
            });
        }

        spawn(type) {
            let shape, geo, color = Math.random() * 0xffffff;
            let mass = 20;

            switch(type) {
                case 'Crate': 
                    geo = new THREE.BoxGeometry(2, 2, 2); 
                    shape = new CANNON.Box(new CANNON.Vec3(1, 1, 1)); 
                    break;
                case 'Barrel': 
                    geo = new THREE.CylinderGeometry(0.7, 0.7, 2, 16); 
                    shape = new CANNON.Cylinder(0.7, 0.7, 2, 16); 
                    break;
                case 'Zombie NPC':
                    geo = new THREE.BoxGeometry(1.2, 3, 1.2);
                    shape = new CANNON.Box(new CANNON.Vec3(0.6, 1.5, 0.6));
                    color = 0xff0000;
                    mass = 75;
                    break;
                default:
                    geo = new THREE.SphereGeometry(1.5, 24, 24);
                    shape = new CANNON.Sphere(1.5);
            }

            const mesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color }));
            mesh.castShadow = true;
            const body = new CANNON.Body({ mass });
            body.addShape(shape);

            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(this.camera.quaternion);
            body.position.set(this.camera.position.x + dir.x * 10, this.camera.position.y + dir.y * 10, this.camera.position.z + dir.z * 10);

            this.world.addBody(body);
            this.scene.add(mesh);
            this.props.push(body);
            this.meshes.push(mesh);
            if(type === 'Zombie NPC') this.zombies.push(body);

            this.toggleMenu(false);
        }

        initInput() {
            document.addEventListener('keydown', (e) => {
                if(e.code === 'KeyW') this.moveState.f = 1;
                if(e.code === 'KeyS') this.moveState.b = 1;
                if(e.code === 'KeyA') this.moveState.l = 1;
                if(e.code === 'KeyD') this.moveState.r = 1;
                if(e.code === 'KeyV') this.noclip = !this.noclip;
                if(e.code === 'Space' && this.canJump) { this.playerBody.velocity.y = 12; this.canJump = false; }
                if(e.code === 'KeyQ') this.toggleMenu();
            });

            document.addEventListener('keyup', (e) => {
                if(e.code === 'KeyW') this.moveState.f = 0;
                if(e.code === 'KeyS') this.moveState.b = 0;
                if(e.code === 'KeyA') this.moveState.l = 0;
                if(e.code === 'KeyD') this.moveState.r = 0;
            });

            window.addEventListener('mousedown', (e) => {
                if(document.pointerLockElement !== this.renderer.domElement) {
                    this.renderer.domElement.requestPointerLock();
                } else {
                    this.pickObject();
                }
            });

            window.addEventListener('mouseup', () => {
                this.pickedBody = null;
                this.beam.visible = false;
            });

            window.addEventListener('mousemove', (e) => {
                if(document.pointerLockElement === this.renderer.domElement) {
                    this.camera.rotation.y -= e.movementX * 0.002;
                    this.camera.rotation.x -= e.movementY * 0.002;
                    this.camera.rotation.x = Math.max(-1.5, Math.min(1.5, this.camera.rotation.x));
                }
            });
        }

        pickObject() {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), this.camera);
            const intersects = ray.intersectObjects(this.meshes);
            if(intersects.length > 0) {
                const index = this.meshes.indexOf(intersects[0].object);
                this.pickedBody = this.props[index];
                this.pickDistance = intersects[0].distance;
            }
        }

        toggleMenu(force) {
            const menu = document.getElementById('q-menu');
            const show = force !== undefined ? force : menu.style.display !== 'flex';
            menu.style.display = show ? 'flex' : 'none';
            if(show) document.exitPointerLock();
        }

        initNetworking() {
            this.peer = new Peer();
            this.peer.on('open', (id) => document.getElementById('p2p-id').innerText = id);
        }

        updatePlayer(dt) {
            if(this.noclip) {
                this.playerBody.velocity.set(0,0,0);
                const dir = new THREE.Vector3(this.moveState.r - this.moveState.l, 0, this.moveState.b - this.moveState.f).applyQuaternion(this.camera.quaternion);
                this.playerBody.position.x += dir.x * 0.8;
                this.playerBody.position.y += dir.y * 0.8;
                this.playerBody.position.z += dir.z * 0.8;
            } else {
                const speed = 20;
                const quat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), this.camera.rotation.y);
                const moveVec = new THREE.Vector3(this.moveState.r - this.moveState.l, 0, this.moveState.b - this.moveState.f).normalize().applyQuaternion(quat);
                this.playerBody.velocity.x = moveVec.x * speed;
                this.playerBody.velocity.z = moveVec.z * speed;
            }
            this.camera.position.set(this.playerBody.position.x, this.playerBody.position.y + 1, this.playerBody.position.z);
        }

        updatePhysGun() {
            if(this.pickedBody) {
                const target = new THREE.Vector3(0,0, -this.pickDistance).applyQuaternion(this.camera.quaternion).add(this.camera.position);
                this.pickedBody.velocity.set(
                    (target.x - this.pickedBody.position.x) * 15,
                    (target.y - this.pickedBody.position.y) * 15,
                    (target.z - this.pickedBody.position.z) * 15
                );
                this.pickedBody.angularVelocity.scale(0.9); // Amortiguar rotación
                
                this.beam.visible = true;
                const pos = this.beam.geometry.attributes.position.array;
                pos[0] = this.camera.position.x; pos[1] = this.camera.position.y - 0.5; pos[2] = this.camera.position.z;
                pos[3] = this.pickedBody.position.x; pos[4] = this.pickedBody.position.y; pos[5] = this.pickedBody.position.z;
                this.beam.geometry.attributes.position.needsUpdate = true;
            }
        }

        updateZombies() {
            this.zombies.forEach(z => {
                const dx = this.playerBody.position.x - z.position.x;
                const dz = this.playerBody.position.z - z.position.z;
                const len = Math.sqrt(dx*dx + dz*dz);
                if(len < 30) {
                    z.velocity.x = (dx / len) * 5;
                    z.velocity.z = (dz / len) * 5;
                }
            });
        }

        render() {
            requestAnimationFrame(() => this.render());
            const dt = Math.min(this.clock.getDelta(), 0.1);
            this.world.step(1/60);

            this.updatePlayer(dt);
            this.updatePhysGun();
            this.updateZombies();

            // Sincronizar Mallas
            for(let i=0; i<this.props.length; i++) {
                this.meshes[i].position.copy(this.props[i].position);
                this.meshes[i].quaternion.copy(this.props[i].quaternion);
            }

            this.renderer.render(this.scene, this.camera);
            document.getElementById('fps').innerText = Math.round(1/dt);
        }
    }

    const Engine = new GmodEngine();
    </script>
</body>
</html>
