<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slime Web Rancher 3D</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }

        /* Interfaz de Usuario (HUD) */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 20px;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        #inventory {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .slot {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #aaa;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
        }

        .slot.active { border-color: #00ff00; background: rgba(0, 255, 0, 0.1); }
        .slot-count { font-size: 12px; font-weight: bold; }
        .slot-type { font-size: 10px; text-transform: uppercase; }

        #instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            pointer-events: auto;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="instructions">
        <h1>SLIME WEB RANCHER</h1>
        <p>W,A,S,D - Moverse | Mouse - Mirar</p>
        <p>Click Izquierdo - Succionar Slime | Click Derecho - Disparar Slime</p>
        <p><strong>HAZ CLICK PARA EMPEZAR</strong></p>
    </div>

    <div id="hud">
        <div id="crosshair"></div>
        <div id="inventory">
            <div class="slot active" id="slot-0">
                <span class="slot-type">Vacío</span>
                <span class="slot-count">0</span>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- CONFIGURACIÓN Y VARIABLES GLOBALES ---
        let scene, camera, renderer, controls, clock;
        let slimes = [];
        let particles = [];
        const inventory = { type: null, count: 0, max: 20 };
        const SLIME_TYPES = [
            { name: 'Pink', color: 0xff69b4 },
            { name: 'Blue', color: 0x00aaff },
            { name: 'Green', color: 0x32cd32 }
        ];

        // --- INICIALIZACIÓN ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // Cielo azul
            scene.fog = new THREE.Fog(0x87ceeb, 20, 100);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.6; // Altura de los ojos

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Iluminación
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 20, 10);
            sun.castShadow = true;
            sun.shadow.camera.left = -50;
            sun.shadow.camera.right = 50;
            sun.shadow.camera.top = 50;
            sun.shadow.camera.bottom = -50;
            scene.add(sun);

            // Terreno
            const floorGeo = new THREE.PlaneGeometry(200, 200);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x4caf50 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Decoración simple (árboles abstractos)
            for(let i=0; i<20; i++) {
                createTree(Math.random()*80-40, Math.random()*80-40);
            }

            // Controles
            controls = new PointerLockControls(camera, document.body);
            const instructions = document.getElementById('instructions');
            instructions.addEventListener('click', () => controls.lock());
            controls.addEventListener('lock', () => instructions.style.display = 'none');
            controls.addEventListener('unlock', () => instructions.style.display = 'block');

            // Eventos de interacción
            window.addEventListener('mousedown', onMouseDown);
            window.addEventListener('resize', onWindowResize);

            // Spawner inicial
            for(let i=0; i<15; i++) spawnSlime();

            animate();
        }

        // --- CLASE SLIME ---
        class Slime {
            constructor(type, position) {
                this.type = type;
                this.velocity = new THREE.Vector3(0, 0, 0);
                this.isJumping = false;
                
                // Cuerpo
                const geo = new THREE.SphereGeometry(0.5, 32, 32);
                const mat = new THREE.MeshStandardMaterial({ color: type.color, roughness: 0.3 });
                this.mesh = new THREE.Mesh(geo, mat);
                this.mesh.position.copy(position);
                this.mesh.castShadow = true;
                
                // Ojos
                const eyeGeo = new THREE.SphereGeometry(0.08, 8, 8);
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
                const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
                eyeL.position.set(0.2, 0.1, 0.4);
                const eyeR = eyeL.clone();
                eyeR.position.x = -0.2;
                this.mesh.add(eyeL, eyeR);

                scene.add(this.mesh);
            }

            update(delta) {
                // Gravedad
                this.velocity.y -= 9.8 * delta;
                this.mesh.position.addScaledVector(this.velocity, delta);

                // Colisión suelo
                if (this.mesh.position.y <= 0.5) {
                    this.mesh.position.y = 0.5;
                    this.velocity.y = 0;
                    this.isJumping = false;
                }

                // IA Simple: Salto aleatorio
                if (!this.isJumping && Math.random() < 0.01) {
                    this.isJumping = true;
                    this.velocity.y = 4 + Math.random() * 2;
                    this.velocity.x = (Math.random() - 0.5) * 5;
                    this.velocity.z = (Math.random() - 0.5) * 5;
                }

                // Animación de rebote (squash and stretch)
                if (this.isJumping) {
                    this.mesh.scale.set(0.8, 1.2, 0.8);
                } else {
                    this.mesh.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
                }
            }
        }

        // --- FUNCIONES DE JUEGO ---

        function createTree(x, z) {
            const trunkGeo = new THREE.CylinderGeometry(0.2, 0.4, 2);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.set(x, 1, z);
            
            const leavesGeo = new THREE.SphereGeometry(1.2, 8, 8);
            const leavesMat = new THREE.MeshStandardMaterial({ color: 0x228b22 });
            const leaves = new THREE.Mesh(leavesGeo, leavesMat);
            leaves.position.y = 1.5;
            trunk.add(leaves);
            scene.add(trunk);
        }

        function spawnSlime() {
            const type = SLIME_TYPES[Math.floor(Math.random() * SLIME_TYPES.length)];
            const pos = new THREE.Vector3(
                Math.random() * 40 - 20,
                5,
                Math.random() * 40 - 20
            );
            slimes.push(new Slime(type, pos));
        }

        function createParticleEffect(pos, color) {
            for(let i=0; i<5; i++) {
                const pGeo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
                const pMat = new THREE.MeshBasicMaterial({ color: color });
                const p = new THREE.Mesh(pGeo, pMat);
                p.position.copy(pos);
                p.userData.life = 1.0;
                p.userData.vel = new THREE.Vector3(
                    (Math.random()-0.5)*5,
                    Math.random()*5,
                    (Math.random()-0.5)*5
                );
                scene.add(p);
                particles.push(p);
            }
        }

        function onMouseDown(e) {
            if (!controls.isLocked) return;

            if (e.button === 0) { // Click Izquierdo: Succionar
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
                
                // Buscar slimes cerca del centro de la pantalla y a poca distancia
                for (let i = slimes.length - 1; i >= 0; i--) {
                    const slime = slimes[i];
                    const dist = camera.position.distanceTo(slime.mesh.position);
                    
                    if (dist < 5) {
                        // Verificar si el slime está frente a nosotros
                        const toSlime = slime.mesh.position.clone().sub(camera.position).normalize();
                        const lookDir = new THREE.Vector3();
                        camera.getWorldDirection(lookDir);
                        
                        if (toSlime.dot(lookDir) > 0.8) {
                            if (inventory.count === 0 || inventory.type === slime.type.name) {
                                if (inventory.count < inventory.max) {
                                    inventory.type = slime.type.name;
                                    inventory.count++;
                                    createParticleEffect(slime.mesh.position, slime.type.color);
                                    scene.remove(slime.mesh);
                                    slimes.splice(i, 1);
                                    updateUI();
                                    break; 
                                }
                            }
                        }
                    }
                }
            } 
            else if (e.button === 2) { // Click Derecho: Disparar
                if (inventory.count > 0) {
                    const typeData = SLIME_TYPES.find(t => t.name === inventory.type);
                    const spawnPos = camera.position.clone();
                    const dir = new THREE.Vector3();
                    camera.getWorldDirection(dir);
                    spawnPos.addScaledVector(dir, 1);

                    const newSlime = new Slime(typeData, spawnPos);
                    newSlime.velocity.copy(dir).multiplyScalar(15);
                    slimes.push(newSlime);

                    inventory.count--;
                    if (inventory.count === 0) inventory.type = null;
                    updateUI();
                }
            }
        }

        function updateUI() {
            const slotType = document.querySelector('.slot-type');
            const slotCount = document.querySelector('.slot-count');
            slotType.innerText = inventory.type || "Vacío";
            slotCount.innerText = inventory.count;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- BUCLE DE ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (controls.isLocked) {
                // Actualizar slimes
                slimes.forEach(slime => slime.update(delta));

                // Reaparecer slimes si hay pocos
                if (slimes.length < 10 && Math.random() < 0.005) spawnSlime();

                // Actualizar partículas
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.position.addScaledVector(p.userData.vel, delta);
                    p.userData.life -= delta * 2;
                    p.scale.setScalar(p.userData.life);
                    if (p.userData.life <= 0) {
                        scene.remove(p);
                        particles.splice(i, 1);
                    }
                }

                // Ciclo día/noche (luz ambiental suave)
                const time = Date.now() * 0.0005;
                scene.background.setHSL(0.6, 0.5, 0.5 + Math.sin(time) * 0.1);
            }

            renderer.render(scene, camera);
        }

        // Iniciar todo
        init();

    </script>
</body>
</html>
