<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Custom Language Engine - DOOM Style</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        #header { background: #111; width: 100%; padding: 10px; border-bottom: 2px solid #00ff41; text-align: center; font-size: 14px; }
        canvas { background: #000; border: 4px solid #222; image-rendering: pixelated; margin-top: 20px; }
        .hud { width: 640px; height: 80px; background: #1a1a1a; border: 2px solid #555; display: flex; justify-content: space-around; align-items: center; margin-top: 10px; }
        .stat-box { text-align: center; border: 1px solid #333; padding: 5px 20px; }
        .controls { color: #888; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="header">EMULADOR DE LENGUAJE CUSTOM C++ | STATUS: RUNNING</div>

<canvas id="doomScreen" width="640" height="320"></canvas>

<div class="hud">
    <div class="stat-box"> <div style="font-size: 10px;">LIFE</div> <div id="hp-val" style="color: #ff0000; font-size: 24px; font-weight: bold;">100</div> </div>
    <div class="stat-box"> <div style="font-size: 10px;">SPEED</div> <div id="spd-val" style="color: #ffff00; font-size: 24px;">1.0</div> </div>
    <div class="stat-box"> <div style="font-size: 10px;">ENTITY E</div> <div style="color: #00ff41; font-size: 12px;">DMG: 20 | TYPE: MELEE</div> </div>
</div>

<div class="controls">Usa las flechas o WASD para moverte por la escene</div>

<script>
/**
 * INTERPRETACIÓN DEL CÓDIGO CUSTOM
 */
const config = {
    colors: { 'R': '#ff0000', 'Y': '#ffff00', '#': 'transparent', 'G': '#00ff00', 'A': '#0000ff', 'N': '#000000', 'B': '#ffffff' },
    scene: [
        ['O', 'O', 'O', 'O', 'O'],
        ['O', '+', 'O', '-', 'O'],
        ['O', ' ', 'O', ' ', 'O'],
        ['O', ' ', 'E', ' ', 'O'],
        ['O', 'O', 'O', 'O', 'O']
    ],
    assets: {
        'E': {
            type: "entity",
            life: 100,
            damage: 20,
            atacktype: "melee",
            speed: 1,
            texture: ["########","##R##R##","#RYRRYR#","#RRRRRR#","###RR###","###RR###","##R##R##","########"]
        },
        'O': {
            type: "tileset",
            texture: ["RRRRRRRR","RRRRRRRR","RRRRRRRR","RRRRRRRR","RRRRRRRR","RRRRRRRR","RRRRRRRR","RRRRRRRR"]
        },
        '+': {
            type: "player",
            life: 100,
            speed: 1,
            texture: ["########","##B##B##","#RYRRYR#","#BBBBBB#","###RR###","###RR###","##N##N##","########"]
        },
        '-': { // El símbolo "-" en tu escena como la meta/finish
            type: "finish",
            texture: ["########","###BNBNB","###NBNBN","###BNBNB","###N####","####N###","####N###","########"]
        }
    }
};

const canvas = document.getElementById('doomScreen');
const ctx = canvas.getContext('2d');

let player = { x: 1.5, y: 1.5, dir: 0, speed: 0.05 };
const keys = {};

window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

function render() {
    // Movimiento
    if (keys['w'] || keys['arrowup']) {
        let nx = player.x + Math.cos(player.dir) * player.speed;
        let ny = player.y + Math.sin(player.dir) * player.speed;
        if (config.scene[Math.floor(ny)][Math.floor(nx)] !== 'O') { player.x = nx; player.y = ny; }
    }
    if (keys['s'] || keys['arrowdown']) {
        let nx = player.x - Math.cos(player.dir) * player.speed;
        let ny = player.y - Math.sin(player.dir) * player.speed;
        if (config.scene[Math.floor(ny)][Math.floor(nx)] !== 'O') { player.x = nx; player.y = ny; }
    }
    if (keys['a'] || keys['arrowleft']) player.dir -= 0.05;
    if (keys['d'] || keys['arrowright']) player.dir += 0.05;

    // Dibujar Fondo
    ctx.fillStyle = "#111"; ctx.fillRect(0, 0, 640, 160); // Techo
    ctx.fillStyle = "#222"; ctx.fillRect(0, 160, 640, 160); // Suelo

    // Raycasting para Renderizar la Escena
    for (let x = 0; x < 160; x++) {
        let rayAngle = (player.dir - 0.5) + (x / 160);
        let dist = 0;
        let hit = false;
        let hitType = '';
        let hitX = 0;

        while (!hit && dist < 10) {
            dist += 0.02;
            let tx = Math.floor(player.x + Math.cos(rayAngle) * dist);
            let ty = Math.floor(player.y + Math.sin(rayAngle) * dist);

            if (config.scene[ty] && config.scene[ty][tx] !== ' ' && config.scene[ty][tx] !== '+') {
                hit = true;
                hitType = config.scene[ty][tx];
                let exactX = player.x + Math.cos(rayAngle) * dist;
                let exactY = player.y + Math.sin(rayAngle) * dist;
                hitX = Math.floor(((exactX % 1) + (exactY % 1)) * 8) % 8;
            }
        }

        let h = 320 / dist;
        let asset = config.assets[hitType];

        if (asset) {
            for (let py = 0; py < 8; py++) {
                let char = asset.texture[py][hitX];
                let color = config.colors[char];
                if (color !== 'transparent') {
                    ctx.fillStyle = color;
                    ctx.fillRect(x * 4, (160 - h / 2) + (py * (h / 8)), 4, (h / 8) + 1);
                }
            }
        }
    }
    requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
