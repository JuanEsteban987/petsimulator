<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BlockStrike P2P</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; 
            width: 20px; height: 20px; border: 2px solid white;
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #ui { position: absolute; bottom: 20px; left: 20px; color: white; text-shadow: 2px 2px black; }
        #shop { 
            display: none; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); background: rgba(0,0,0,0.8);
            padding: 20px; color: white; border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="ui">Dinero: $<span id="money">0</span> | Arma: <span id="weapon">Cuchillo</span></div>
    
    <div id="shop">
        <h2>Tienda de Armas</h2>
        <button onclick="buyWeapon('AK-47', 2500)">AK-47 ($2500)</button>
        <button onclick="buyWeapon('Sniper', 4500)">Sniper ($4500)</button>
        <button onclick="closeShop()">Cerrar (B)</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    </body>
</html>
