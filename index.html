<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABS 2D - Ragdoll Battle Simulator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
        }
        
        #gameCanvas {
            display: block;
            border: 3px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: crosshair;
        }
        
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #fff;
        }
        
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #45a049;
            transform: scale(1.05);
        }
        
        button.red { background: #f44336; }
        button.red:hover { background: #da190b; }
        
        button.blue { background: #2196F3; }
        button.blue:hover { background: #0b7dda; }
        
        #stats {
            margin-top: 10px;
            font-size: 14px;
        }
        
        .health-bar {
            width: 200px;
            height: 20px;
            background: #333;
            border: 2px solid #fff;
            margin: 5px 0;
            position: relative;
        }
        
        .health-fill {
            height: 100%;
            transition: width 0.3s;
        }
        
        .red-team { background: #f44336; }
        .blue-team { background: #2196F3; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>🎮 TABS 2D Simulator</h2>
        <button onclick="game.spawnTeam('red')">+ Rojo</button>
        <button onclick="game.spawnTeam('blue')">+ Azul</button>
        <button onclick="game.reset()">🔄 Reset</button>
        <button onclick="game.toggleGravity()">⚖️ Gravedad</button>
        <div id="stats">
            <div>🔴 Rojos: <span id="redCount">0</span></div>
            <div>🔵 Azules: <span id="blueCount">0</span></div>
            <div>FPS: <span id="fps">60</span></div>
        </div>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // Constantes físicas
        const GRAVITY = 0.4;
        const FRICTION = 0.95;
        const GROUND_Y = canvas.height - 50;
        
        // Clase Vector2
        class Vector2 {
            constructor(x, y) {
                this.x = x;
                this.y = y;
            }
            
            add(v) { return new Vector2(this.x + v.x, this.y + v.y); }
            sub(v) { return new Vector2(this.x - v.x, this.y - v.y); }
            mult(s) { return new Vector2(this.x * s, this.y * s); }
            mag() { return Math.sqrt(this.x * this.x + this.y * this.y); }
            normalize() {
                const m = this.mag();
                return m > 0 ? new Vector2(this.x/m, this.y/m) : new Vector2(0,0);
            }
            dist(v) { return Math.sqrt((this.x-v.x)**2 + (this.y-v.y)**2); }
        }
        
        // Clase Partícula (para física Verlet)
        class Particle {
            constructor(x, y, pinned = false) {
                this.pos = new Vector2(x, y);
                this.oldPos = new Vector2(x, y);
                this.acc = new Vector2(0, 0);
                this.pinned = pinned;
                this.radius = 5;
            }
            
            update() {
                if (this.pinned) return;
                
                const vel = this.pos.sub(this.oldPos).mult(FRICTION);
                this.oldPos = new Vector2(this.pos.x, this.pos.y);
                this.pos = this.pos.add(vel).add(this.acc);
                this.acc = new Vector2(0, 0);
                
                // Gravedad
                this.acc.y += GRAVITY;
                
                // Suelo
                if (this.pos.y > GROUND_Y) {
                    this.pos.y = GROUND_Y;
                    this.oldPos.y = this.pos.y + (this.pos.y - this.oldPos.y) * 0.5;
                }
                
                // Paredes
                if (this.pos.x < 0) this.pos.x = 0;
                if (this.pos.x > canvas.width) this.pos.x = canvas.width;
            }
            
            applyForce(force) {
                this.acc = this.acc.add(force);
            }
            
            constrain(other, distance) {
                const delta = other.pos.sub(this.pos);
                const dist = delta.mag();
                const diff = (dist - distance) / dist;
                
                if (!this.pinned) {
                    this.pos = this.pos.add(delta.mult(0.5 * diff));
                }
                if (!other.pinned) {
                    other.pos = other.pos.sub(delta.mult(0.5 * diff));
                }
            }
        }
        
        // Clase Ragdoll (Unidad)
        class Ragdoll {
            constructor(x, y, team) {
                this.team = team; // 'red' o 'blue'
                this.health = 100;
                this.maxHealth = 100;
                this.alive = true;
                this.target = null;
                this.attackCooldown = 0;
                this.walkCycle = 0;
                this.facing = team === 'red' ? 1 : -1; // 1 derecha, -1 izquierda
                
                // Colores
                this.color = team === 'red' ? '#ff4444' : '#4444ff';
                this.darkColor = team === 'red' ? '#cc0000' : '#0000cc';
                
                // Crear cuerpo
                this.createBody(x, y);
            }
            
            createBody(x, y) {
                // Torso (centro)
                this.torso = new Particle(x, y);
                this.torso.radius = 12;
                
                // Cabeza
                this.head = new Particle(x, y - 25);
                this.head.radius = 10;
                
                // Brazos
                this.armL = new Particle(x - 15, y - 10);
                this.armR = new Particle(x + 15, y - 10);
                this.handL = new Particle(x - 25, y + 10);
                this.handR = new Particle(x + 25, y + 10);
                
                // Piernas
                this.legL = new Particle(x - 8, y + 20);
                this.legR = new Particle(x + 8, y + 20);
                this.footL = new Particle(x - 8, y + 45);
                this.footR = new Particle(x + 8, y + 45);
                
                // Constraints (huesos)
                this.constraints = [
                    [this.torso, this.head, 25],
                    [this.torso, this.armL, 15],
                    [this.torso, this.armR, 15],
                    [this.armL, this.handL, 15],
                    [this.armR, this.handR, 15],
                    [this.torso, this.legL, 20],
                    [this.torso, this.legR, 20],
                    [this.legL, this.footL, 25],
                    [this.legR, this.footR, 25],
                    // Estabilidad cruzada
                    [this.head, this.armL, 30],
                    [this.head, this.armR, 30],
                    [this.legL, this.legR, 16]
                ];
                
                this.particles = [this.torso, this.head, this.armL, this.armR, 
                               this.handL, this.handR, this.legL, this.legR, 
                               this.footL, this.footR];
            }
            
            think(enemies) {
                if (!this.alive) return;
                
                // Encontrar objetivo más cercano
                let closest = null;
                let minDist = Infinity;
                
                for (let enemy of enemies) {
                    if (!enemy.alive) continue;
                    const d = this.torso.pos.dist(enemy.torso.pos);
                    if (d < minDist) {
                        minDist = d;
                        closest = enemy;
                    }
                }
                
                this.target = closest;
                
                if (!this.target) return;
                
                const dist = minDist;
                const dir = this.target.torso.pos.sub(this.torso.pos).normalize();
                
                // IA de movimiento
                if (dist > 60) {
                    // Moverse hacia el objetivo
                    const speed = 0.8;
                    this.torso.applyForce(dir.mult(speed));
                    
                    // Animación de caminar
                    this.walkCycle += 0.3;
                    const walkOffset = Math.sin(this.walkCycle) * 10;
                    
                    // Mover piernas alternadas
                    this.footL.pos.x += (dir.x * speed * 2) + Math.cos(this.walkCycle) * 2;
                    this.footR.pos.x += (dir.x * speed * 2) + Math.cos(this.walkCycle + Math.PI) * 2;
                    
                    // Levantar pies
                    if (Math.sin(this.walkCycle) > 0) {
                        this.footL.pos.y -= 2;
                    } else {
                        this.footR.pos.y -= 2;
                    }
                    
                    // Balancear brazos
                    this.handL.pos.y = this.armL.pos.y + Math.sin(this.walkCycle) * 5;
                    this.handR.pos.y = this.armR.pos.y + Math.sin(this.walkCycle + Math.PI) * 5;
                    
                } else if (dist < 40) {
                    // Atacar!
                    if (this.attackCooldown <= 0) {
                        this.attack();
                    }
                }
                
                if (this.attackCooldown > 0) this.attackCooldown--;
                
                // Mirar hacia el objetivo
                this.facing = dir.x > 0 ? 1 : -1;
            }
            
            attack() {
                this.attackCooldown = 60;
                
                // Empuje hacia adelante
                const attackDir = new Vector2(this.facing, -0.5);
                this.torso.applyForce(attackDir.mult(3));
                this.armR.applyForce(attackDir.mult(5));
                
                // Daño al enemigo
                if (this.target) {
                    // Empujar al enemigo
                    const pushDir = this.target.torso.pos.sub(this.torso.pos).normalize();
                    this.target.takeDamage(10, pushDir.mult(8));
                    
                    // Efecto visual de golpe
                    game.createParticles(this.target.torso.pos.x, this.target.torso.pos.y, 5, '#ffff00');
                }
            }
            
            takeDamage(amount, force) {
                this.health -= amount;
                
                // Fuerza de impacto (ragdoll)
                this.head.applyForce(force.mult(1.5));
                this.torso.applyForce(force);
                this.armR.applyForce(force.mult(1.2));
                
                if (this.health <= 0) {
                    this.die();
                }
            }
            
            die() {
                this.alive = false;
                // Relajar todas las constraints para que caiga como muñeco
                // pero mantener conexiones débiles
                for (let i = 0; i < 3; i++) {
                    this.updateConstraints();
                }
            }
            
            update() {
                // Actualizar partículas
                for (let p of this.particles) {
                    p.update();
                }
                
                // Resolver constraints múltiples veces para estabilidad
                for (let i = 0; i < 3; i++) {
                    this.updateConstraints();
                }
            }
            
            updateConstraints() {
                for (let [p1, p2, dist] of this.constraints) {
                    p1.constrain(p2, dist);
                }
            }
            
            draw() {
                ctx.save();
                
                // Dibujar huesos/constraints
                ctx.strokeStyle = this.darkColor;
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                
                for (let [p1, p2] of this.constraints) {
                    ctx.beginPath();
                    ctx.moveTo(p1.pos.x, p1.pos.y);
                    ctx.lineTo(p2.pos.x, p2.pos.y);
                    ctx.stroke();
                }
                
                // Dibujar articulaciones (círculos)
                for (let p of this.particles) {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(p.pos.x, p.pos.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Borde
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
                
                // Cara (ojos)
                if (this.alive) {
                    ctx.fillStyle = '#fff';
                    const eyeOffset = this.facing * 3;
                    
                    // Ojo izquierdo
                    ctx.beginPath();
                    ctx.arc(this.head.pos.x - 3 + eyeOffset, this.head.pos.y - 2, 3, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Ojo derecho
                    ctx.beginPath();
                    ctx.arc(this.head.pos.x + 3 + eyeOffset, this.head.pos.y - 2, 3, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Pupilas
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(this.head.pos.x - 3 + eyeOffset, this.head.pos.y - 2, 1, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(this.head.pos.x + 3 + eyeOffset, this.head.pos.y - 2, 1, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // X para muerto
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(this.head.pos.x - 4, this.head.pos.y - 4);
                    ctx.lineTo(this.head.pos.x + 4, this.head.pos.y + 4);
                    ctx.moveTo(this.head.pos.x + 4, this.head.pos.y - 4);
                    ctx.lineTo(this.head.pos.x - 4, this.head.pos.y + 4);
                    ctx.stroke();
                }
                
                // Barra de vida
                if (this.alive && this.health < this.maxHealth) {
                    const barWidth = 30;
                    const barHeight = 4;
                    const x = this.torso.pos.x - barWidth/2;
                    const y = this.head.pos.y - 20;
                    
                    ctx.fillStyle = '#000';
                    ctx.fillRect(x, y, barWidth, barHeight);
                    
                    ctx.fillStyle = this.health > 50 ? '#0f0' : '#f00';
                    ctx.fillRect(x, y, barWidth * (this.health/this.maxHealth), barHeight);
                }
                
                ctx.restore();
            }
        }
        
        // Partículas de efecto
        class ParticleEffect {
            constructor(x, y, color) {
                this.pos = new Vector2(x, y);
                this.vel = new Vector2((Math.random()-0.5)*10, (Math.random()-0.5)*10);
                this.life = 30;
                this.color = color;
            }
            
            update() {
                this.pos = this.pos.add(this.vel);
                this.vel.y += 0.5; // gravedad
                this.life--;
            }
            
            draw() {
                ctx.globalAlpha = this.life / 30;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.pos.x, this.pos.y, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        // Clase principal del juego
        class Game {
            constructor() {
                this.units = [];
                this.particles = [];
                this.gravity = true;
                this.lastTime = 0;
                this.fps = 60;
                
                this.spawnInitial();
            }
            
            spawnInitial() {
                // Spawn inicial: 3 vs 3
                for (let i = 0; i < 3; i++) {
                    this.spawnTeam('red', 100 + i * 50);
                    this.spawnTeam('blue', canvas.width - 100 - i * 50);
                }
            }
            
            spawnTeam(team, x = null) {
                if (x === null) {
                    x = team === 'red' ? 100 + Math.random() * 200 : 
                        canvas.width - 300 + Math.random() * 200;
                }
                const y = 200 + Math.random() * 100;
                this.units.push(new Ragdoll(x, y, team));
            }
            
            createParticles(x, y, count, color) {
                for (let i = 0; i < count; i++) {
                    this.particles.push(new ParticleEffect(x, y, color));
                }
            }
            
            toggleGravity() {
                // Invertir gravedad temporalmente
                for (let unit of this.units) {
                    for (let p of unit.particles) {
                        p.applyForce(new Vector2(0, -15));
                    }
                }
            }
            
            reset() {
                this.units = [];
                this.particles = [];
                this.spawnInitial();
            }
            
            update() {
                // Separar por equipos para IA
                const reds = this.units.filter(u => u.team === 'red' && u.alive);
                const blues = this.units.filter(u => u.team === 'blue' && u.alive);
                
                for (let unit of this.units) {
                    const enemies = unit.team === 'red' ? blues : reds;
                    unit.think(enemies);
                    unit.update();
                }
                
                // Colisiones entre unidades
                for (let i = 0; i < this.units.length; i++) {
                    for (let j = i + 1; j < this.units.length; j++) {
                        this.resolveCollision(this.units[i], this.units[j]);
                    }
                }
                
                // Actualizar partículas
                this.particles = this.particles.filter(p => {
                    p.update();
                    return p.life > 0;
                });
                
                // Limpiar muertos después de un tiempo
                this.units = this.units.filter(u => {
                    if (!u.alive) {
                        u.deathTimer = (u.deathTimer || 0) + 1;
                        return u.deathTimer < 300; // Desaparecen después de 5 segundos
                    }
                    return true;
                });
                
                // Actualizar UI
                document.getElementById('redCount').textContent = reds.length;
                document.getElementById('blueCount').textContent = blues.length;
            }
            
            resolveCollision(u1, u2) {
                // Colisión simple entre torsos
                const dist = u1.torso.pos.dist(u2.torso.pos);
                const minDist = u1.torso.radius + u2.torso.radius + 5;
                
                if (dist < minDist && dist > 0) {
                    const push = u2.torso.pos.sub(u1.torso.pos).normalize();
                    const overlap = minDist - dist;
                    
                    if (u1.alive) {
                        u1.torso.pos = u1.torso.pos.sub(push.mult(overlap * 0.5));
                        u1.torso.oldPos = u1.torso.oldPos.sub(push.mult(overlap * 0.5));
                    }
                    if (u2.alive) {
                        u2.torso.pos = u2.torso.pos.add(push.mult(overlap * 0.5));
                        u2.torso.oldPos = u2.torso.oldPos.add(push.mult(overlap * 0.5));
                    }
                }
            }
            
            draw() {
                // Limpiar
                ctx.fillStyle = '#87CEEB';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Dibujar suelo
                ctx.fillStyle = '#4a5f3a';
                ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
                
                // Línea de suelo
                ctx.strokeStyle = '#2d3d23';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(0, GROUND_Y);
                ctx.lineTo(canvas.width, GROUND_Y);
                ctx.stroke();
                
                // Sombras
                for (let unit of this.units) {
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    const shadowY = GROUND_Y;
                    const shadowX = unit.torso.pos.x;
                    const shadowSize = 15 + (GROUND_Y - unit.torso.pos.y) * 0.1;
                    ctx.beginPath();
                    ctx.ellipse(shadowX, shadowY, shadowSize, shadowSize * 0.3, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Ordenar por Y para profundidad
                const sorted = [...this.units].sort((a, b) => a.torso.pos.y - b.torso.pos.y);
                
                for (let unit of sorted) {
                    unit.draw();
                }
                
                for (let p of this.particles) {
                    p.draw();
                }
            }
            
            loop(timestamp) {
                const deltaTime = timestamp - this.lastTime;
                this.lastTime = timestamp;
                
                if (deltaTime > 0) {
                    this.fps = Math.round(1000 / deltaTime);
                    document.getElementById('fps').textContent = this.fps;
                }
                
                this.update();
                this.draw();
                
                requestAnimationFrame((t) => this.loop(t));
            }
        }
        
        // Interacción con mouse
        let draggedParticle = null;
        
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouse = new Vector2(e.clientX - rect.left, e.clientY - rect.top);
            
            // Buscar partícula cercana para agarrar
            for (let unit of game.units) {
                for (let p of unit.particles) {
                    if (p.pos.dist(mouse) < 20) {
                        draggedParticle = p;
                        p.pinned = true;
                        break;
                    }
                }
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (draggedParticle) {
                const rect = canvas.getBoundingClientRect();
                draggedParticle.pos.x = e.clientX - rect.left;
                draggedParticle.pos.y = e.clientY - rect.top;
                draggedParticle.oldPos.x = draggedParticle.pos.x;
                draggedParticle.oldPos.y = draggedParticle.pos.y;
            }
        });
        
        canvas.addEventListener('mouseup', () => {
            if (draggedParticle) {
                draggedParticle.pinned = false;
                draggedParticle = null;
            }
        });
        
        // Click para spawn aleatorio
        canvas.addEventListener('click', (e) => {
            if (!draggedParticle) {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const team = Math.random() > 0.5 ? 'red' : 'blue';
                game.spawnTeam(team, x);
            }
        });
        
        // Redimensionar
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        // Iniciar
        const game = new Game();
        requestAnimationFrame((t) => game.loop(t));
    </script>
</body>
</html>
