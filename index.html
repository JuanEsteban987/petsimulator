<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Doom Player</title>
    <script src="https://js-dos.com/v7/build/releases/latest/js-dos.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            width: 800px;
            height: 600px;
            max-width: 95vw;
            max-height: 80vh;
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            background-color: #000;
        }

        .controls-info {
            margin-top: 20px;
            text-align: center;
            color: #888;
            font-size: 0.9em;
        }

        kbd {
            background: #444;
            padding: 2px 6px;
            border-radius: 4px;
            color: #fff;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: #e74c3c;
        }
    </style>
</head>
<body>

    <h1>DOOM WEB PLAYER</h1>

    <div id="game-container"></div>

    <div class="controls-info">
        <p>Usa las <b>Flechas</b> para moverte, <kbd>Ctrl</kbd> para disparar y <kbd>Espacio</kbd> para abrir puertas.</p>
        <p><i>Nota: La primera carga puede tardar unos segundos mientras se descarga el motor.</i></p>
    </div>

    <script>
        // Configuración del contenedor
        const container = document.getElementById("game-container");
        
        // Ejecución del emulador
        // Cargamos la versión shareware oficial desde el repositorio de js-dos
        Dos(container, {
            style: "hidden" // Oculta la interfaz por defecto del emulador para una estética limpia
        }).run("https://doszone-uploads.s3.dualstack.eu-central-1.amazonaws.com/original/2X/2/24b00b14f11dec35557837452790af57485b0d01.jsdos");
    </script>

</body>
</html>
