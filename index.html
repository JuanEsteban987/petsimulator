<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JS-Craft Ultra: Voxel Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        
        /* HUD & CROSSHAIR */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 20px; height: 20px; border: 2px solid white; border-radius: 50%; opacity: 0.5;
        }

        /* INVENTARIO ESTILO MINECRAFT */
        #inventory {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #c6c6c6; border: 4px solid #373737; padding: 15px;
            display: none; flex-direction: column; gap: 15px; pointer-events: all;
        }
        .inv-row { display: flex; gap: 5px; }
        .slot { 
            width: 40px; height: 40px; background: #8b8b8b; border: 3px solid #373737; 
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .slot:hover { background: #bebebe; }
        .crafting-grid { display: grid; grid-template-columns: repeat(2, 45px); gap: 5px; }
        .result-slot { margin-left: 20px; border-color: #ffffff; }

        #hotbar {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            display: flex; background: rgba(0,0,0,0.5); padding: 5px; gap: 5px;
        }
        .slot.selected { border-color: white; box-shadow: 0 0 10px white; }
    </style>
</head>
<body>

<div id="hud">
    <div id="crosshair"></div>
    <div id="hotbar">
        <div class="slot selected" data-type="grass">🌿</div>
        <div class="slot" data-type="dirt">🟫</div>
        <div class="slot" data-type="wood">🪵</div>
    </div>
</div>

<div id="inventory">
    <div style="display: flex; align-items: center; margin-bottom: 20px;">
        <div class="crafting-grid">
            <div class="slot" draggable="true"></div><div class="slot"></div>
            <div class="slot"></div><div class="slot"></div>
        </div>
        <div style="font-size: 24px; margin: 0 15px;">➜</div>
        <div class="slot result-slot"></div>
    </div>
    <div class="inv-row"> <div class="slot">🌿</div><div class="slot">🌿</div><div class="slot">🟫</div>
        <div class="slot">🪵</div><div class="slot"></div><div class="slot"></div>
    </div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js';

// --- CONFIG ---
const world = { size: 64, height: 10, data: new Map() };
const player = { height: 1.8, radius: 0.4, speed: 0.12, velocity: new THREE.Vector3() };

// --- THREE.JS SETUP ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 20, 50);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new PointerLockControls(camera, document.body);
const light = new THREE.AmbientLight(0xffffff, 1.0);
scene.add(light);

// --- GENERACIÓN CON FACE CULLING ---
const geo = new THREE.BoxGeometry(1, 1, 1);
const materials = {
    grass: new THREE.MeshLambertMaterial({ color: 0x5d994d }),
    dirt: new THREE.MeshLambertMaterial({ color: 0x795548 }),
    wood: new THREE.MeshLambertMaterial({ color: 0x4d3222 })
};

function getVoxel(x, y, z) { return world.data.get(`${Math.round(x)},${Math.round(y)},${Math.round(z)}`); }

function addBlock(x, y, z, type, render = true) {
    const key = `${x},${y},${z}`;
    if (world.data.has(key)) return;
    
    const mesh = new THREE.Mesh(geo, materials[type]);
    mesh.position.set(x, y, z);
    mesh.name = type;
    if (render) scene.add(mesh);
    world.data.set(key, mesh);
}

// Generar terreno amplio
for(let x = -world.size/2; x < world.size/2; x++) {
    for(let z = -world.size/2; z < world.size/2; z++) {
        const h = Math.floor(Math.sin(x/8) * 2 + Math.cos(z/8) * 2);
        for(let y = -2; y <= h; y++) {
            // "Face Culling" básico: Solo añade al scene si es la capa superior o está en el borde
            addBlock(x, y, z, y === h ? 'grass' : 'dirt', y === h);
        }
    }
}

// --- COLISIONES REALES ---
function checkCollision(pos) {
    // Revisar pies y cabeza
    const checkPoints = [
        new THREE.Vector3(pos.x, pos.y - 1.5, pos.z),
        new THREE.Vector3(pos.x, pos.y, pos.z)
    ];
    for(let p of checkPoints) {
        if (getVoxel(p.x, p.y, p.z)) return true;
    }
    return false;
}

// --- INPUTS ---
let keys = {};
document.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'KeyE') {
        if (controls.isLocked) {
            controls.unlock();
            document.getElementById('inventory').style.display = 'flex';
        } else {
            controls.lock();
            document.getElementById('inventory').style.display = 'none';
        }
    }
});
document.addEventListener('keyup', (e) => keys[e.code] = false);

// --- INTERACCIÓN ---
const raycaster = new THREE.Raycaster();
document.addEventListener('mousedown', (e) => {
    if (!controls.isLocked) return;
    raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
    const intersects = raycaster.intersectObjects(scene.children);
    
    if (intersects.length > 0) {
        const target = intersects[0];
        if (e.button === 0) { // Romper
            scene.remove(target.object);
            world.data.delete(`${target.object.position.x},${target.object.position.y},${target.object.position.z}`);
        } else { // Poner
            const pos = target.object.position.clone().add(target.face.normal);
            addBlock(pos.x, pos.y, pos.z, 'wood', true);
        }
    }
});

// --- LOOP ---
camera.position.y = 5;
let canJump = false;

function animate() {
    requestAnimationFrame(animate);
    if (controls.isLocked) {
        const oldPos = camera.position.clone();
        
        // Gravedad
        player.velocity.y -= 0.015;
        camera.position.y += player.velocity.y;

        // Colisión Suelo
        if (checkCollision(camera.position)) {
            camera.position.y = oldPos.y;
            player.velocity.y = 0;
            canJump = true;
        }

        // Movimiento
        const dir = new THREE.Vector3();
        if (keys['KeyW']) dir.z += 1;
        if (keys['KeyS']) dir.z -= 1;
        if (keys['KeyA']) dir.x -= 1;
        if (keys['KeyD']) dir.x += 1;
        dir.normalize();

        controls.moveRight(dir.x * player.speed);
        if (checkCollision(camera.position)) camera.position.x = oldPos.x;

        controls.moveForward(dir.z * player.speed);
        if (checkCollision(camera.position)) camera.position.z = oldPos.z;

        if (keys['Space'] && canJump) {
            player.velocity.y = 0.25;
            canJump = false;
        }
    }
    renderer.render(scene, camera);
}
animate();

// UI de inicio
document.body.onclick = () => { if(document.getElementById('inventory').style.display !== 'flex') controls.lock(); };
</script>
</body>
</html>
