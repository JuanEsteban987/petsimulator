<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GMod Web Clone - Three.js + Cannon.js</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        #hud {
            position: absolute; bottom: 20px; left: 20px; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); pointer-events: none;
        }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            background: rgba(255,255,255,0.8); border-radius: 50%;
            transform: translate(-50%, -50%); border: 1px solid black;
        }

        #spawn-menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 10px;
            display: none; color: white; text-align: center;
        }

        .spawn-item {
            display: inline-block; padding: 10px; margin: 10px;
            background: #333; border: 2px solid #555; cursor: pointer;
        }
        .spawn-item:hover { background: #555; }

        #tool-info {
            position: absolute; bottom: 20px; right: 20px; color: #00eaff;
            text-align: right; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="hud">
        <h1 style="margin:0">HP: 100</h1>
        <p>Arma: <span id="weapon-name">Physics Gun</span></p>
    </div>

    <div id="tool-info">
        <p>LMB: Agarrar / Soldar | RMB: Empujar / Eliminar</p>
        <p>Wheel: Distancia | Q: Menú Spawn</p>
    </div>

    <div id="spawn-menu">
        <h2>Spawn Menu</h2>
        <div class="spawn-item" onclick="spawnObject('box')">Cubo</div>
        <div class="spawn-item" onclick="spawnObject('sphere')">Esfera</div>
        <div class="spawn-item" onclick="spawnObject('cylinder')">Cilindro</div>
        <p>(Presiona Q para cerrar)</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import * as CANNON from 'https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/+esm';

        // --- Configuración Básica ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 0, 500);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Físicas ---
        const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.82, 0) });
        const physicsBodies = [];
        const visualMeshes = [];

        // --- Luces ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        sun.castShadow = true;
        scene.add(sun);

        // --- Suelo ---
        const groundGeo = new THREE.PlaneGeometry(1000, 1000);
        const groundMat = new THREE.MeshPhongMaterial({ color: 0x444444 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
        groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
        world.addBody(groundBody);

        // --- Controles del Jugador ---
        const controls = new PointerLockControls(camera, document.body);
        const moveState = { forward: false, backward: false, left: false, right: false, jump: false };
        
        document.addEventListener('click', () => { if(!menuOpen) controls.lock(); });
        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveState.forward = true;
            if(e.code === 'KeyS') moveState.backward = true;
            if(e.code === 'KeyA') moveState.left = true;
            if(e.code === 'KeyD') moveState.right = true;
            if(e.code === 'Space' && canJump) { playerVelocity.y = 5; canJump = false; }
            if(e.code === 'KeyQ') toggleMenu();
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveState.forward = false;
            if(e.code === 'KeyS') moveState.backward = false;
            if(e.code === 'KeyA') moveState.left = false;
            if(e.code === 'KeyD') moveState.right = false;
        });

        // Física del Jugador
        const playerBody = new CANNON.Body({ mass: 70, shape: new CANNON.Sphere(1.2), fixedRotation: true });
        playerBody.position.set(0, 2, 0);
        world.addBody(playerBody);
        let canJump = false;
        const playerVelocity = new CANNON.Vec3();

        // --- Sistema de Herramientas ---
        let currentTool = 'physics'; // 'physics' o 'tool'
        let pickedBody = null;
        let pickDistance = 5;
        const raycaster = new THREE.Raycaster();
        let weldTarget = null;

        // --- Spawn de Objetos ---
        window.spawnObject = function(type) {
            let shape, geo;
            const pos = new THREE.Vector3();
            camera.getWorldDirection(pos);
            pos.multiplyScalar(5).add(camera.position);

            if(type === 'box') {
                shape = new CANNON.Box(new CANNON.Vec3(0.5, 0.5, 0.5));
                geo = new THREE.BoxGeometry(1, 1, 1);
            } else if(type === 'sphere') {
                shape = new CANNON.Sphere(0.5);
                geo = new THREE.SphereGeometry(0.5);
            } else {
                shape = new CANNON.Cylinder(0.5, 0.5, 1, 16);
                geo = new THREE.CylinderGeometry(0.5, 0.5, 1, 16);
            }

            const body = new CANNON.Body({ mass: 5, shape: shape });
            body.position.copy(pos);
            const mesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff }));
            mesh.castShadow = true;
            
            world.addBody(body);
            scene.add(mesh);
            physicsBodies.push(body);
            visualMeshes.push(mesh);
        };

        // --- Lógica de Disparo / Herramientas ---
        window.addEventListener('mousedown', (e) => {
            if(!controls.isLocked) return;

            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const intersects = raycaster.intersectObjects(visualMeshes);

            if (e.button === 0) { // Click Izquierdo
                if (intersects.length > 0) {
                    const obj = intersects[0].object;
                    const index = visualMeshes.indexOf(obj);
                    const body = physicsBodies[index];

                    if (currentTool === 'physics') {
                        pickedBody = body;
                        pickDistance = intersects[0].distance;
                        body.mass = 0; // "Congelar" para manipular
                        body.updateMassProperties();
                    } else if (currentTool === 'tool') {
                        if (!weldTarget) {
                            weldTarget = body;
                            obj.material.emissive.setHex(0x00ff00);
                        } else if (weldTarget !== body) {
                            const constraint = new CANNON.LockConstraint(weldTarget, body);
                            world.addConstraint(constraint);
                            weldTarget.visual.material.emissive.setHex(0x000000);
                            weldTarget = null;
                        }
                    }
                }
            } else if (e.button === 2) { // Click Derecho
                if (intersects.length > 0) {
                    const index = visualMeshes.indexOf(intersects[0].object);
                    const body = physicsBodies[index];
                    
                    if (currentTool === 'physics') {
                        // Gravity Gun Push
                        const force = new THREE.Vector3();
                        camera.getWorldDirection(force);
                        body.applyImpulse(new CANNON.Vec3(force.x * 50, force.y * 50, force.z * 50), body.position);
                    } else {
                        // Tool Gun: Eliminar
                        world.removeBody(body);
                        scene.remove(intersects[0].object);
                        physicsBodies.splice(index, 1);
                        visualMeshes.splice(index, 1);
                    }
                }
            }
        });

        window.addEventListener('mouseup', () => {
            if (pickedBody) {
                pickedBody.mass = 5;
                pickedBody.updateMassProperties();
                pickedBody = null;
            }
        });

        window.addEventListener('wheel', (e) => {
            pickDistance -= e.deltaY * 0.01;
            pickDistance = Math.max(2, Math.min(20, pickDistance));
        });

        // --- Menú ---
        let menuOpen = false;
        function toggleMenu() {
            menuOpen = !menuOpen;
            document.getElementById('spawn-menu').style.display = menuOpen ? 'block' : 'none';
            if(menuOpen) controls.unlock(); else controls.lock();
        }

        // --- Bucle de Animación ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            world.fixedStep();

            // Movimiento Jugador
            const speed = 15;
            const inputVelocity = new THREE.Vector3();
            if (moveState.forward) inputVelocity.z -= 1;
            if (moveState.backward) inputVelocity.z += 1;
            if (moveState.left) inputVelocity.x -= 1;
            if (moveState.right) inputVelocity.x += 1;
            
            inputVelocity.applyQuaternion(camera.quaternion);
            playerBody.velocity.x = inputVelocity.x * speed;
            playerBody.velocity.z = inputVelocity.z * speed;
            
            // Detectar suelo para saltar (simplificado)
            if(Math.abs(playerBody.velocity.y) < 0.1) canJump = true;

            camera.position.copy(playerBody.position);

            // Physics Gun Logic
            if (pickedBody) {
                const targetPos = new THREE.Vector3();
                camera.getWorldDirection(targetPos);
                targetPos.multiplyScalar(pickDistance).add(camera.position);
                pickedBody.position.lerp(new CANNON.Vec3(targetPos.x, targetPos.y, targetPos.z), 0.2, pickedBody.position);
                pickedBody.velocity.set(0,0,0);
                pickedBody.angularVelocity.set(0,0,0);
            }

            // Sincronizar Visuales con Físicas
            for (let i = 0; i < physicsBodies.length; i++) {
                visualMeshes[i].position.copy(physicsBodies[i].position);
                visualMeshes[i].quaternion.copy(physicsBodies[i].quaternion);
                physicsBodies[i].visual = visualMeshes[i]; // Ref para weld
            }

            renderer.render(scene, camera);
        }

        animate();

        // Cambio de Herramienta con teclas 1 y 2
        document.addEventListener('keydown', (e) => {
            if(e.key === '1') {
                currentTool = 'physics';
                document.getElementById('weapon-name').innerText = "Physics Gun";
                document.getElementById('weapon-name').style.color = "white";
            }
            if(e.key === '2') {
                currentTool = 'tool';
                document.getElementById('weapon-name').innerText = "Tool Gun";
                document.getElementById('weapon-name').style.color = "#00eaff";
            }
        });

    </script>
</body>
</html>
