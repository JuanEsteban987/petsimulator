<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mini Pet Simulator</title>
    <style>
        body { background: #2c3e50; color: white; font-family: 'Arial', sans-serif; text-align: center; }
        #game-container { margin-top: 50px; }
        #coins-display { font-size: 2em; color: #f1c40f; text-shadow: 2px 2px #000; }
        
        .pet-area { height: 200px; border: 2px dashed #7f8c8d; margin: 20px auto; width: 80%; position: relative; border-radius: 15px; }
        .pet { font-size: 40px; position: absolute; transition: all 0.5s ease; cursor: pointer; }
        
        button { 
            padding: 15px 30px; font-size: 1.2em; cursor: pointer; border-radius: 10px; border: none;
            background: #27ae60; color: white; transition: 0.3s;
        }
        button:hover { background: #2ecc71; transform: scale(1.05); }
        button:disabled { background: #95a5a6; cursor: not-allowed; }
        
        .stats { margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>🐾 PET SIMULATOR HTML 🐾</h1>
        <div class="stats">
            <div id="coins-display">💰 Monedas: 0</div>
            <p id="pet-count">Mascotas: 1 (Cada una genera 1 moneda/seg)</p>
        </div>

        <div class="pet-area" id="pet-area">
            <span class="pet" id="pet1">🐶</span>
        </div>

        <button onclick="clickCoin()">¡Cosechar Monedas!</button>
        <button id="buy-egg" onclick="buyEgg()">🥚 Comprar Huevo (50 Monedas)</button>
    </div>

    <script>
        let coins = 0;
        let pets = ["🐶"];
        const petIcons = ["🐱", "🐭", "🐹", "🐰", "🦊", "🐻", "🐼", "🐸", "🦁", "🦄"];
        const petArea = document.getElementById('pet-area');

        // Función para ganar monedas al hacer clic
        function clickCoin() {
            coins += 1 + (pets.length * 2); // Bonus por tener mascotas
            updateUI();
        }

        // Comprar nuevas mascotas
        function buyEgg() {
            if (coins >= 50) {
                coins -= 50;
                const randomPet = petIcons[Math.floor(Math.random() * petIcons.length)];
                pets.push(randomPet);
                
                // Crear el elemento visual de la mascota
                const newPet = document.createElement('span');
                newPet.className = 'pet';
                newPet.innerHTML = randomPet;
                newPet.style.left = Math.random() * 80 + "%";
                newPet.style.top = Math.random() * 60 + "%";
                petArea.appendChild(newPet);
                
                updateUI();
            }
        }

        // Actualizar la interfaz
        function updateUI() {
            document.getElementById('coins-display').innerText = `💰 Monedas: ${coins}`;
            document.getElementById('pet-count').innerText = `Mascotas: ${pets.length} (Bonus activo)`;
            document.getElementById('buy-egg').disabled = coins < 50;
        }

        // Generación automática de monedas (Ingreso pasivo)
        setInterval(() => {
            coins += pets.length;
            updateUI();
            
            // Mover mascotas aleatoriamente para que se vea "vivo"
            const allPets = document.querySelectorAll('.pet');
            allPets.forEach(p => {
                p.style.left = Math.random() * 80 + "%";
                p.style.top = Math.random() * 60 + "%";
            });
        }, 3000);

    </script>
</body>
</html>
