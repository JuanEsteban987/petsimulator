<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gmod HTML Clone - Concept</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; 
            width: 10px; height: 10px; border: 2px solid white; 
            border-radius: 50%; transform: translate(-50%, -50%);
        }
        #spawn-menu { 
            position: absolute; left: 20px; top: 20px; 
            background: rgba(0,0,0,0.8); color: white; padding: 20px;
            display: none; pointer-events: auto; border-radius: 8px;
        }
        .vitals { position: absolute; bottom: 20px; left: 20px; color: white; font-size: 24px; text-shadow: 2px 2px black; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="crosshair"></div>
        <div id="spawn-menu">
            <h3>Spawn Menu (Q)</h3>
            <button onclick="spawnProp('cube')">Cubo de Madera</button>
            <button onclick="spawnProp('sphere')">Pelota</button>
        </div>
        <div class="vitals">❤️ 100 | 🛡️ 100</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // 1. CONFIGURACIÓN ESCENA
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Cielo azul
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. ILUMINACIÓN
        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
        scene.add(light);

        // 3. SUELO (Baseplate)
        const grid = new THREE.GridHelper(200, 50);
        scene.add(grid);
        const planeGeo = new THREE.PlaneGeometry(200, 200);
        const planeMat = new THREE.MeshPhongMaterial({ color: 0x999999 });
        const floor = new THREE.Mesh(planeGeo, planeMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // 4. CONTROLES DE MOVIMIENTO
        const controls = new PointerLockControls(camera, document.body);
        document.addEventListener('click', () => controls.lock());

        // 5. SISTEMA DE SPAWN (Lógica simplificada)
        window.spawnProp = function(type) {
            let geometry;
            if(type === 'cube') geometry = new THREE.BoxGeometry(1, 1, 1);
            else geometry = new THREE.SphereGeometry(0.5, 32, 32);
            
            const material = new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff });
            const prop = new THREE.Mesh(geometry, material);
            
            // Posicionar frente a la cámara
            prop.position.set(camera.position.x, 1, camera.position.z - 5);
            scene.add(prop);
        };

        // 6. TECLAS (Q para Menú)
        document.addEventListener('keydown', (e) => {
            if(e.key.toLowerCase() === 'q') {
                const menu = document.getElementById('spawn-menu');
                menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
                if(menu.style.display === 'block') controls.unlock();
            }
        });

        // Loop de renderizado
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
