<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABS 2D - Ragdoll Battle Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 50%, #90EE90 50%, #228B22 100%);
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            max-width: 300px;
        }
        .button {
            background: #4CAF50;
            border: none;
            color: white;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        .button:hover { background: #45a049; }
        .button.red { background: #f44336; }
        .button.red:hover { background: #da190b; }
        .button.blue { background: #2196F3; }
        .button.blue:hover { background: #0b7dda; }
        .tool-btn {
            background: #555;
            border: 2px solid #777;
            color: white;
            padding: 8px 15px;
            margin: 2px;
            cursor: pointer;
            border-radius: 3px;
            display: inline-block;
        }
        .tool-btn.active {
            background: #FFD700;
            color: black;
            border-color: #FFA500;
        }
        #stats {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h3>🎮 TABS 2D - Editor</h3>
        <div>
            <span>Herramienta:</span><br>
            <button class="tool-btn active" onclick="setTool('platform')">📦 Plataforma</button>
            <button class="tool-btn" onclick="setTool('wall')">🧱 Pared</button>
            <button class="tool-btn" onclick="setTool('spawnRed')">🔴 Spawn Rojo</button>
            <button class="tool-btn" onclick="setTool('spawnBlue')">🔵 Spawn Azul</button>
            <button class="tool-btn" onclick="setTool('erase')">❌ Borrar</button>
        </div>
        <br>
        <button class="button" onclick="startBattle()">⚔️ Iniciar Batalla</button>
        <button class="button red" onclick="resetRagdolls()">🔄 Reset Ragdolls</button>
        <button class="button blue" onclick="clearMap()">🗑️ Limpiar Mapa</button>
        <br><br>
        <small>Click izquierdo: Colocar | Click derecho: Arrastrar vista<br>
        Espacio: Pausa | R: Reset cámara</small>
    </div>
    
    <div id="stats">
        <div>🔴 Rojos: <span id="redCount">0</span></div>
        <div>🔵 Azules: <span id="blueCount">0</span></div>
        <div>⚔️ Combates: <span id="fights">0</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Configuración física
        const GRAVITY = 0.6;
        const FRICTION = 0.85;
        const GROUND_Y = canvas.height - 100;
        
        // Estado del juego
        let currentTool = 'platform';
        let platforms = [];
        let ragdolls = [];
        let particles = [];
        let camera = { x: 0, y: 0, zoom: 1 };
        let isDragging = false;
        let lastMouseX = 0;
        let lastMouseY = 0;
        let battleStarted = false;
        let mousePos = { x: 0, y: 0 };

        // Clase Partícula (sangre/efectos)
        class Particle {
            constructor(x, y, vx, vy, color, life) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.life = life;
                this.maxLife = life;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2; // gravedad ligera
                this.life--;
                this.vx *= 0.98;
            }
            
            draw() {
                ctx.globalAlpha = this.life / this.maxLife;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x - camera.x, this.y - camera.y, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // Clase Parte del cuerpo (física verlet)
        class BodyPart {
            constructor(x, y, radius, mass, color) {
                this.x = x;
                this.y = y;
                this.oldX = x;
                this.oldY = y;
                this.radius = radius;
                this.mass = mass;
                this.color = color;
                this.grounded = false;
            }
            
            update() {
                const vx = (this.x - this.oldX) * FRICTION;
                const vy = (this.y - this.oldY) * FRICTION;
                
                this.oldX = this.x;
                this.oldY = this.y;
                
                this.x += vx;
                this.y += vy;
                this.y += GRAVITY * this.mass;
                
                // Colisión con plataformas
                this.grounded = false;
                for (let platform of platforms) {
                    if (this.x > platform.x && this.x < platform.x + platform.width) {
                        // Colisión superior
                        if (this.y + this.radius > platform.y && 
                            this.y + this.radius < platform.y + platform.height + 10 &&
                            this.oldY + this.radius <= platform.y + 5) {
                            this.y = platform.y - this.radius;
                            this.oldY = this.y + vy * 0.3; // rebote
                            this.grounded = true;
                        }
                        // Colisión lateral
                        if (this.y > platform.y && this.y < platform.y + platform.height) {
                            if (this.x < platform.x + platform.width/2) {
                                this.x = platform.x - this.radius;
                            } else {
                                this.x = platform.x + platform.width + this.radius;
                            }
                        }
                    }
                }
                
                // Límites del mundo
                if (this.y > GROUND_Y + 500) {
                    this.y = GROUND_Y + 500;
                    this.oldY = this.y + vy * 0.5;
                }
            }
            
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x - camera.x, this.y - camera.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                // brillo
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.arc(this.x - camera.x - 2, this.y - camera.y - 2, this.radius/2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Constraint (unión entre partes)
        class Constraint {
            constructor(partA, partB, length, stiffness = 0.5) {
                this.partA = partA;
                this.partB = partB;
                this.length = length;
                this.stiffness = stiffness;
            }
            
            resolve() {
                const dx = this.partB.x - this.partA.x;
                const dy = this.partB.y - this.partA.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const diff = (dist - this.length) / dist;
                
                const offsetX = dx * diff * this.stiffness;
                const offsetY = dy * diff * this.stiffness;
                
                this.partA.x += offsetX;
                this.partA.y += offsetY;
                this.partB.x -= offsetX;
                this.partB.y -= offsetY;
            }
            
            draw() {
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(this.partA.x - camera.x, this.partA.y - camera.y);
                ctx.lineTo(this.partB.x - camera.x, this.partB.y - camera.y);
                ctx.stroke();
            }
        }

        // Clase Ragdoll completo con IA
        class Ragdoll {
            constructor(x, y, team) {
                this.team = team; // 'red' o 'blue'
                this.color = team === 'red' ? '#FF4444' : '#4444FF';
                this.health = 100;
                this.dead = false;
                this.attackCooldown = 0;
                this.target = null;
                this.walkForce = 0;
                this.direction = team === 'red' ? 1 : -1;
                this.state = 'idle'; // idle, walk, attack, fall
                
                // Crear partes del cuerpo
                const skinColor = '#FDBCB4';
                const clothesColor = this.color;
                
                // Cabeza
                this.head = new BodyPart(x, y - 60, 15, 1, skinColor);
                // Torso
                this.torso = new BodyPart(x, y - 30, 20, 3, clothesColor);
                // Cadera
                this.hips = new BodyPart(x, y, 15, 2, '#333');
                
                // Brazos
                this.lShoulder = new BodyPart(x - 25, y - 40, 8, 1, clothesColor);
                this.lElbow = new BodyPart(x - 35, y - 20, 7, 1, skinColor);
                this.lHand = new BodyPart(x - 40, y, 6, 0.5, skinColor);
                
                this.rShoulder = new BodyPart(x + 25, y - 40, 8, 1, clothesColor);
                this.rElbow = new BodyPart(x + 35, y - 20, 7, 1, skinColor);
                this.rHand = new BodyPart(x + 40, y, 6, 0.5, skinColor);
                
                // Piernas
                this.lHip = new BodyPart(x - 10, y + 10, 9, 1.5, '#333');
                this.lKnee = new BodyPart(x - 15, y + 40, 8, 1, '#333');
                this.lFoot = new BodyPart(x - 15, y + 70, 7, 0.5, '#222');
                
                this.rHip = new BodyPart(x + 10, y + 10, 9, 1.5, '#333');
                this.rKnee = new BodyPart(x + 15, y + 40, 8, 1, '#333');
                this.rFoot = new BodyPart(x + 15, y + 70, 7, 0.5, '#222');
                
                // Armas (manos)
                this.weapon = { active: false, cooldown: 0 };
                
                // Constraints
                this.constraints = [];
                
                // Conectar torso
                this.constraints.push(new Constraint(this.head, this.torso, 35));
                this.constraints.push(new Constraint(this.torso, this.hips, 35));
                
                // Brazos izquierdo
                this.constraints.push(new Constraint(this.torso, this.lShoulder, 20));
                this.constraints.push(new Constraint(this.lShoulder, this.lElbow, 25));
                this.constraints.push(new Constraint(this.lElbow, this.lHand, 25));
                
                // Brazos derecho
                this.constraints.push(new Constraint(this.torso, this.rShoulder, 20));
                this.constraints.push(new Constraint(this.rShoulder, this.rElbow, 25));
                this.constraints.push(new Constraint(this.rElbow, this.rHand, 25));
                
                // Piernas izquierda
                this.constraints.push(new Constraint(this.hips, this.lHip, 15));
                this.constraints.push(new Constraint(this.lHip, this.lKnee, 30));
                this.constraints.push(new Constraint(this.lKnee, this.lFoot, 30));
                
                // Piernas derecha
                this.constraints.push(new Constraint(this.hips, this.rHip, 15));
                this.constraints.push(new Constraint(this.rHip, this.rKnee, 30));
                this.constraints.push(new Constraint(this.rKnee, this.rFoot, 30));
                
                // Estabilidad
                this.constraints.push(new Constraint(this.lShoulder, this.rShoulder, 50));
                this.constraints.push(new Constraint(this.lHip, this.rHip, 25));
                
                this.parts = [this.head, this.torso, this.hips, 
                           this.lShoulder, this.lElbow, this.lHand,
                           this.rShoulder, this.rElbow, this.rHand,
                           this.lHip, this.lKnee, this.lFoot,
                           this.rHip, this.rKnee, this.rFoot];
            }
            
            updateAI() {
                if (this.dead) return;
                
                // Buscar enemigo más cercano
                let closest = null;
                let minDist = Infinity;
                
                for (let other of ragdolls) {
                    if (other !== this && other.team !== this.team && !other.dead) {
                        const dist = Math.hypot(other.torso.x - this.torso.x, 
                                              other.torso.y - this.torso.y);
                        if (dist < minDist) {
                            minDist = dist;
                            closest = other;
                        }
                    }
                }
                
                this.target = closest;
                
                if (this.target) {
                    const dx = this.target.torso.x - this.torso.x;
                    const dy = this.target.torso.y - this.torso.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    
                    // Dirección hacia el enemigo
                    const dir = dx > 0 ? 1 : -1;
                    this.direction = dir;
                    
                    // Distancia de ataque
                    if (dist < 60 && this.attackCooldown <= 0) {
                        this.attack();
                    } else if (dist > 50) {
                        // Moverse hacia el enemigo
                        this.walk(dir);
                        
                        // Saltar si hay obstáculo abajo
                        if (this.torso.grounded && dy < -20) {
                            this.jump();
                        }
                    }
                }
                
                if (this.attackCooldown > 0) this.attackCooldown--;
                
                // Mantenerse derecho (fuerza de balanceo)
                const targetAngle = 0;
                const currentAngle = Math.atan2(this.head.y - this.hips.y, 
                                               this.head.x - this.hips.x) - Math.PI/2;
                const diff = targetAngle - currentAngle;
                
                if (Math.abs(diff) > 0.1) {
                    const force = diff * 0.1;
                    this.head.x += force * 2;
                    this.hips.x -= force;
                }
            }
            
            walk(dir) {
                const force = 0.8;
                this.hips.x += dir * force;
                
                // Animación de piernas
                const walkCycle = Date.now() / 200;
                this.lHip.x += Math.sin(walkCycle) * 0.5;
                this.rHip.x += Math.sin(walkCycle + Math.PI) * 0.5;
            }
            
            jump() {
                if (this.hips.grounded || this.torso.grounded) {
                    this.hips.y -= 15;
                    this.hips.oldY = this.hips.y + 10;
                }
            }
            
            attack() {
                this.attackCooldown = 40;
                
                // Empujar brazos hacia adelante
                const dir = this.direction;
                this.rHand.x += dir * 30;
                this.rHand.y -= 10;
                this.lHand.x += dir * 20;
                
                // Verificar golpe
                for (let other of ragdolls) {
                    if (other !== this && other.team !== this.team && !other.dead) {
                        const dist = Math.hypot(other.torso.x - this.rHand.x, 
                                              other.torso.y - this.rHand.y);
                        if (dist < 40) {
                            // ¡Golpe!
                            other.takeDamage(15, dir * 10);
                            
                            // Partículas de sangre
                            for (let i = 0; i < 5; i++) {
                                particles.push(new Particle(
                                    other.torso.x, other.torso.y,
                                    (Math.random() - 0.5) * 10 + dir * 5,
                                    (Math.random() - 0.5) * 10,
                                    '#FF0000', 30
                                ));
                            }
                        }
                    }
                }
            }
            
            takeDamage(amount, knockback) {
                this.health -= amount;
                
                // Knockback físico
                this.torso.x += knockback;
                this.head.x += knockback * 1.2;
                this.hips.x += knockback * 0.8;
                
                if (this.health <= 0) {
                    this.die();
                }
            }
            
            die() {
                this.dead = true;
                // Hacer que se desplomen (relajar constraints temporalmente)
                for (let part of this.parts) {
                    part.mass *= 0.5;
                }
            }
            
            update() {
                // Actualizar física
                for (let part of this.parts) {
                    part.update();
                }
                
                // Resolver constraints múltiples veces para estabilidad
                for (let i = 0; i < 3; i++) {
                    for (let constraint of this.constraints) {
                        constraint.resolve();
                    }
                }
                
                // IA
                if (battleStarted && !this.dead) {
                    this.updateAI();
                }
            }
            
            draw() {
                // Dibujar constraints (huesos)
                for (let constraint of this.constraints) {
                    constraint.draw();
                }
                
                // Dibujar partes
                for (let part of this.parts) {
                    part.draw();
                }
                
                // Dibujar barra de vida
                if (!this.dead && battleStarted) {
                    const x = this.torso.x - camera.x;
                    const y = this.head.y - camera.y - 30;
                    ctx.fillStyle = '#333';
                    ctx.fillRect(x - 20, y, 40, 6);
                    ctx.fillStyle = this.health > 50 ? '#0F0' : '#F00';
                    ctx.fillRect(x - 19, y + 1, 38 * (this.health/100), 4);
                }
                
                // Indicador de equipo
                ctx.fillStyle = this.color;
                ctx.fillRect(this.head.x - camera.x - 5, this.head.y - camera.y - 25, 10, 5);
            }
        }

        // Funciones de utilidad
        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function startBattle() {
            battleStarted = true;
            // Spawnear ragdolls si no hay
            if (ragdolls.length === 0) {
                spawnRagdollsFromSpawners();
            }
        }

        function resetRagdolls() {
            ragdolls = [];
            battleStarted = false;
            spawnRagdollsFromSpawners();
        }

        function spawnRagdollsFromSpawners() {
            platforms.forEach(plat => {
                if (plat.type === 'spawnRed') {
                    ragdolls.push(new Ragdoll(plat.x + plat.width/2, plat.y, 'red'));
                } else if (plat.type === 'spawnBlue') {
                    ragdolls.push(new Ragdoll(plat.x + plat.width/2, plat.y, 'blue'));
                }
            });
        }

        function clearMap() {
            platforms = [];
            ragdolls = [];
            battleStarted = false;
        }

        // Input handling
        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 2) { // Click derecho - arrastrar
                isDragging = true;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
            } else if (e.button === 0) { // Click izquierdo - colocar
                const x = (e.clientX + camera.x) / camera.zoom;
                const y = (e.clientY + camera.y) / camera.zoom;
                
                if (currentTool === 'erase') {
                    platforms = platforms.filter(p => {
                        return !(x > p.x && x < p.x + p.width && 
                                y > p.y && y < p.y + p.height);
                    });
                } else {
                    let width = 100, height = 20;
                    if (currentTool === 'wall') {
                        width = 20;
                        height = 100;
                    } else if (currentTool.includes('spawn')) {
                        width = 40;
                        height = 60;
                    }
                    
                    platforms.push({
                        x: x - width/2,
                        y: y - height/2,
                        width: width,
                        height: height,
                        type: currentTool
                    });
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            mousePos.x = e.clientX;
            mousePos.y = e.clientY;
            
            if (isDragging) {
                camera.x -= (e.clientX - lastMouseX);
                camera.y -= (e.clientY - lastMouseY);
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
            }
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });

        canvas.addEventListener('contextmenu', e => e.preventDefault());
        
        canvas.addEventListener('wheel', (e) => {
            const zoomSpeed = 0.1;
            camera.zoom += e.deltaY > 0 ? -zoomSpeed : zoomSpeed;
            camera.zoom = Math.max(0.5, Math.min(3, camera.zoom));
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                battleStarted = !battleStarted;
            }
            if (e.code === 'KeyR') {
                camera = { x: 0, y: 0, zoom: 1 };
            }
        });

        // Loop principal
        function gameLoop() {
            // Limpiar canvas
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-camera.x, -camera.y);
            
            // Dibujar suelo
            ctx.fillStyle = '#228B22';
            ctx.fillRect(camera.x, GROUND_Y, canvas.width / camera.zoom, 200);
            
            // Dibujar plataformas
            platforms.forEach(plat => {
                if (plat.type === 'spawnRed') {
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
                    ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
                    ctx.fillStyle = '#FF0000';
                    ctx.font = '20px Arial';
                    ctx.fillText('🔴', plat.x + 10, plat.y + 40);
                } else if (plat.type === 'spawnBlue') {
                    ctx.fillStyle = 'rgba(0, 0, 255, 0.5)';
                    ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
                    ctx.fillStyle = '#0000FF';
                    ctx.font = '20px Arial';
                    ctx.fillText('🔵', plat.x + 10, plat.y + 40);
                } else {
                    // Gradiente para plataformas
                    const grad = ctx.createLinearGradient(plat.x, plat.y, 
                                                         plat.x, plat.y + plat.height);
                    grad.addColorStop(0, '#8B4513');
                    grad.addColorStop(1, '#654321');
                    ctx.fillStyle = grad;
                    ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
                    
                    // Borde
                    ctx.strokeStyle = '#4a3018';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(plat.x, plat.y, plat.width, plat.height);
                }
            });
            
            // Actualizar y dibujar ragdolls
            ragdolls.forEach(ragdoll => {
                ragdoll.update();
                ragdoll.draw();
            });
            
            // Partículas
            particles = particles.filter(p => {
                p.update();
                p.draw();
                return p.life > 0;
            });
            
            ctx.restore();
            
            // Actualizar UI
            const reds = ragdolls.filter(r => r.team === 'red' && !r.dead).length;
            const blues = ragdolls.filter(r => r.team === 'blue' && !r.dead).length;
            document.getElementById('redCount').textContent = reds;
            document.getElementById('blueCount').textContent = blues;
            
            // Vista previa de colocación
            if (!isDragging) {
                ctx.globalAlpha = 0.5;
                const x = (mousePos.x + camera.x) / camera.zoom;
                const y = (mousePos.y + camera.y) / camera.zoom;
                
                if (currentTool === 'platform') {
                    ctx.fillStyle = '#8B4513';
                    ctx.fillRect(x - 50 - camera.x, y - 10 - camera.y, 100, 20);
                } else if (currentTool === 'wall') {
                    ctx.fillStyle = '#8B4513';
                    ctx.fillRect(x - 10 - camera.x, y - 50 - camera.y, 20, 100);
                }
                ctx.globalAlpha = 1;
            }
            
            requestAnimationFrame(gameLoop);
        }

        // Plataformas iniciales de ejemplo
        platforms.push(
            { x: 300, y: 400, width: 200, height: 20, type: 'platform' },
            { x: 600, y: 300, width: 200, height: 20, type: 'platform' },
            { x: 100, y: 500, width: 40, height: 60, type: 'spawnRed' },
            { x: 800, y: 500, width: 40, height: 60, type: 'spawnBlue' }
        );

        // Ajustar tamaño de ventana
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        gameLoop();
    </script>
</body>
</html>
