<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMOD: DEFINITIVE EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; background: #000; color: #0f0; user-select: none; }
        canvas { display: block; }

        /* --- INTERFAZ GMOD STYLE --- */
        #hud {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 14px; height: 14px;
            border: 2px solid #0f0; border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .stats {
            position: absolute; bottom: 30px; left: 30px;
            background: rgba(0, 40, 0, 0.8);
            padding: 20px; border: 2px solid #0f0; border-radius: 5px;
            min-width: 200px;
        }

        #weapon-name {
            position: absolute; bottom: 30px; right: 30px;
            font-size: 28px; font-weight: bold;
            color: #ffd700; text-shadow: 2px 2px #000;
        }

        /* --- MENÚ Q (CONSTRUCCIÓN) --- */
        #q-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 20, 0, 0.7);
            display: none; justify-content: center; align-items: center;
            pointer-events: auto; z-index: 100;
        }

        .grid {
            display: grid; grid-template-columns: repeat(3, 150px);
            gap: 20px; background: #111; padding: 40px;
            border: 4px double #0f0;
        }

        .item {
            background: #222; border: 1px solid #0f0; color: #0f0;
            padding: 20px; cursor: pointer; text-align: center;
            transition: 0.1s;
        }
        .item:hover { background: #0f0; color: #000; transform: scale(1.1); }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="startKMod()">
        <h1 style="font-size: 70px; margin: 0;">KMOD: DEFINITIVE</h1>
        <p style="font-size: 20px;">[ CLICK PARA CARGAR MOTOR DE FÍSICA ]</p>
    </div>

    <div id="q-menu">
        <div class="grid">
            <div class="item" onclick="spawn('cube')">CUBO</div>
            <div class="item" onclick="spawn('sphere')">ESFERA</div>
            <div class="item" onclick="spawn('wall')">MURO</div>
            <div class="item" onclick="spawn('zombie')" style="color: #f00;">ZOMBIE</div>
            <div class="item" onclick="spawn('prop_exp')" style="color: #ff0;">BARRIL</div>
            <div class="item" onclick="toggleMenu()" style="grid-column: span 3; background: #300; border-color: #f00;">CERRAR</div>
        </div>
    </div>

    <div id="hud">
        <div id="crosshair"></div>
        <div class="stats">
            <div>SALUD: <span id="hp">100</span>%</div>
            <div style="width: 100%; height: 10px; background: #030; margin-top: 5px;">
                <div id="hp-bar" style="width: 100%; height: 100%; background: #0f0;"></div>
            </div>
            <div style="margin-top: 10px; font-size: 12px;">Q: Spawn | 1,2,3: Armas | R: Unfreeze</div>
        </div>
        <div id="weapon-name">PHYSICS GUN</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- CORE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x050505, 10, 140);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- LIGHTS ---
        const hemi = new THREE.HemisphereLight(0xffffff, 0x111111, 0.8);
        scene.add(hemi);
        const pLight = new THREE.PointLight(0x00ff00, 1, 50);
        scene.add(pLight);

        // --- MUNDO ---
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(300, 300),
            new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 1 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- SISTEMA DE FÍSICA Y ENTIDADES ---
        let props = [];
        let enemies = [];
        let particles = [];
        let held = null;
        let heldDist = 6;
        let playerHP = 100;
        let curWep = "physgun";
        const keys = {};
        const raycaster = new THREE.Raycaster();
        const controls = new PointerLockControls(camera, document.body);

        // --- ARMA VISUAL ---
        const vModel = new THREE.Group();
        const vGun = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.2, 0.7), new THREE.MeshStandardMaterial({color: 0x222222}));
        vGun.position.set(0.4, -0.4, -0.6);
        vModel.add(vGun);
        camera.add(vModel);
        scene.add(camera);

        // --- CLASE PROP (SÓLIDOS) ---
        class Prop {
            constructor(type, pos) {
                this.type = type;
                let geo, mat;
                if(type === 'cube') geo = new THREE.BoxGeometry(2,2,2);
                else if(type === 'sphere') geo = new THREE.SphereGeometry(1.2, 12, 12);
                else if(type === 'wall') geo = new THREE.BoxGeometry(0.5, 6, 10);
                else if(type === 'prop_exp') geo = new THREE.CylinderGeometry(0.8, 0.8, 2, 12);

                mat = new THREE.MeshStandardMaterial({
                    color: type === 'prop_exp' ? 0xff4400 : Math.random() * 0xffffff,
                    metalness: 0.5, roughness: 0.5
                });

                this.mesh = new THREE.Mesh(geo, mat);
                this.mesh.position.copy(pos);
                this.mesh.position.y += 2;
                this.mesh.castShadow = true;
                this.mesh.receiveShadow = true;
                this.mesh.userData.parent = this;

                this.vel = new THREE.Vector3();
                this.radius = 1.2;
                this.mass = type === 'wall' ? 10 : 1;
                this.frozen = false;
                this.isHeld = false;

                scene.add(this.mesh);
                props.push(this);
            }

            update(delta) {
                if(this.frozen || this.isHeld) return;

                // Gravedad
                if(this.mesh.position.y > this.radius) {
                    this.vel.y -= 22 * delta;
                } else {
                    this.mesh.position.y = this.radius;
                    this.vel.y *= -0.2; // Rebote
                    this.vel.x *= 0.9; this.vel.z *= 0.9;
                }

                // Colisiones Prop vs Prop
                props.forEach(other => {
                    if(other === this || other.isHeld) return;
                    let d = this.mesh.position.distanceTo(other.mesh.position);
                    let min = this.radius + other.radius;
                    if(d < min) {
                        let normal = this.mesh.position.clone().sub(other.mesh.position).normalize();
                        this.mesh.position.add(normal.multiplyScalar(min - d));
                        this.vel.add(normal.multiplyScalar(2));
                    }
                });

                this.mesh.position.add(this.vel.clone().multiplyScalar(delta));
            }
        }

        // --- ZOMBIE IA ---
        class Zombie {
            constructor(pos) {
                this.mesh = new THREE.Group();
                const b = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0x334422}));
                const h = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.4, 0.7), new THREE.MeshStandardMaterial({color: 0x550000}));
                h.position.y = 1.2;
                this.mesh.add(b, h);
                this.mesh.position.copy(pos);
                scene.add(this.mesh);
                this.vel = new THREE.Vector3();
                this.hp = 100;
                enemies.push(this);
            }
            update(delta) {
                let toPl = camera.position.clone().sub(this.mesh.position);
                toPl.y = 0;
                if(toPl.length() < 30) {
                    toPl.normalize();
                    this.mesh.position.add(toPl.multiplyScalar(4 * delta));
                    this.mesh.lookAt(camera.position.x, 0, camera.position.z);
                    
                    // Ataque
                    if(this.mesh.position.distanceTo(camera.position) < 2) {
                        playerHP -= 0.5;
                        updateHUD();
                    }
                }
            }
        }

        // --- SISTEMA DE PARTÍCULAS ---
        function createSpark(pos) {
            const p = new THREE.Mesh(new THREE.SphereGeometry(0.05), new THREE.MeshBasicMaterial({color: 0xffff00}));
            p.position.copy(pos);
            p.userData.life = 1.0;
            p.userData.vel = new THREE.Vector3((Math.random()-0.5)*5, Math.random()*5, (Math.random()-0.5)*5);
            scene.add(p);
            particles.push(p);
        }

        // --- FUNCIONES DE CONTROL ---
        window.startKMod = () => {
            controls.lock();
            document.getElementById('overlay').style.display = 'none';
        };

        window.toggleMenu = () => {
            const m = document.getElementById('q-menu');
            if(m.style.display === 'flex') { m.style.display = 'none'; controls.lock(); }
            else { m.style.display = 'flex'; controls.unlock(); }
        };

        window.spawn = (type) => {
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            const pos = camera.position.clone().add(dir.multiplyScalar(6));
            if(type === 'zombie') new Zombie(pos);
            else new Prop(type, pos);
            toggleMenu();
        };

        function updateHUD() {
            document.getElementById('hp').innerText = Math.ceil(playerHP);
            document.getElementById('hp-bar').style.width = playerHP + "%";
            if(playerHP <= 0) location.reload();
        }

        // --- INPUTS ---
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'KeyQ') toggleMenu();
            if(e.key === '1') { curWep = "physgun"; updateWep(); }
            if(e.key === '2') { curWep = "smg"; updateWep(); }
            if(e.key === '3') { curWep = "toolgun"; updateWep(); }
            if(e.code === 'KeyR') reloadFunc();
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function updateWep() {
            document.getElementById('weapon-name').innerText = curWep.toUpperCase();
            vGun.material.color.setHex(curWep === 'physgun' ? 0x00aaff : (curWep === 'smg' ? 0x333333 : 0xff0000));
        }

        function reloadFunc() {
            raycaster.setFromCamera({x:0,y:0}, camera);
            const hits = raycaster.intersectObjects(scene.children);
            for(let h of hits) {
                if(h.object.userData.parent) {
                    h.object.userData.parent.frozen = false;
                    h.object.material.emissive.setHex(0x000000);
                }
            }
        }

        let firing = false;
        window.addEventListener('mousedown', (e) => {
            if(!controls.isLocked) return;
            firing = true;
            if(e.button === 0) {
                if(curWep === 'physgun') {
                    raycaster.setFromCamera({x:0,y:0}, camera);
                    const hits = raycaster.intersectObjects(scene.children);
                    for(let h of hits) {
                        if(h.object.userData.parent) {
                            held = h.object.userData.parent;
                            held.isHeld = true;
                            held.frozen = false;
                            heldDist = h.distance;
                            break;
                        }
                    }
                } else if(curWep === 'smg') shoot();
                else if(curWep === 'toolgun') removeObj();
            }
            if(e.button === 2 && held) {
                held.frozen = true;
                held.isHeld = false;
                held.mesh.material.emissive.setHex(0x111133);
                held = null;
            }
        });
        window.addEventListener('mouseup', () => {
            firing = false;
            if(held) { held.isHeld = false; held = null; }
        });

        function shoot() {
            vModel.position.z += 0.2; // Recoil
            raycaster.setFromCamera({x:0,y:0}, camera);
            const hits = raycaster.intersectObjects(scene.children, true);
            if(hits.length > 0) {
                const hit = hits[0];
                for(let i=0; i<5; i++) createSpark(hit.point);
                
                // Daño
                enemies.forEach((z, idx) => {
                    if(z.mesh.contains(hit.object)) {
                        z.hp -= 25;
                        if(z.hp <= 0) { scene.remove(z.mesh); enemies.splice(idx, 1); }
                    }
                });
                if(hit.object.userData.parent) {
                    const dir = new THREE.Vector3();
                    camera.getWorldDirection(dir);
                    hit.object.userData.parent.vel.add(dir.multiplyScalar(15));
                }
            }
        }

        function removeObj() {
            raycaster.setFromCamera({x:0,y:0}, camera);
            const hits = raycaster.intersectObjects(scene.children);
            if(hits[0] && hits[0].object.userData.parent) {
                scene.remove(hits[0].object);
                props = props.filter(p => p.mesh !== hits[0].object);
            }
        }

        // --- BUCLE PRINCIPAL ---
        const clock = new THREE.Clock();
        let pVel = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if(controls.isLocked) {
                const speed = 18 * delta;
                if(keys['KeyW']) controls.moveForward(speed);
                if(keys['KeyS']) controls.moveForward(-speed);
                if(keys['KeyA']) controls.moveRight(-speed);
                if(keys['KeyD']) controls.moveRight(speed);
                
                // Salto y Gravedad Jugador
                if(camera.position.y > 1.6) pVel.y -= 25 * delta;
                else { camera.position.y = 1.6; pVel.y = 0; if(keys['Space']) pVel.y = 10; }
                camera.position.y += pVel.y * delta;
            }

            // Physgun lerp
            if(held) {
                const target = camera.position.clone();
                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir);
                target.add(dir.multiplyScalar(heldDist));
                held.mesh.position.lerp(target, 0.2);
                held.vel.set(0,0,0);
            }

            // Gun Sway/Recoil
            vModel.position.lerp(new THREE.Vector3(0,0,0), 0.1);
            pLight.position.copy(camera.position);

            // Updates
            props.forEach(p => p.update(delta));
            enemies.forEach(z => z.update(delta));
            particles.forEach((p, idx) => {
                p.userData.life -= delta;
                p.position.add(p.userData.vel.clone().multiplyScalar(delta));
                if(p.userData.life <= 0) { scene.remove(p); particles.splice(idx,1); }
            });

            renderer.render(scene, camera);
        }

        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
