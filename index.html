<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gmod HTML5 - Ultimate Edition</title>
    <style>
        :root { --source-orange: #ffb400; --ui-bg: rgba(20, 20, 20, 0.85); }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Tahoma', sans-serif; cursor: crosshair; }
        
        /* HUD & UI */
        #gui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .hud-vitals { position: absolute; bottom: 30px; left: 30px; color: var(--source-orange); font-size: 32px; font-weight: bold; text-shadow: 2px 2px #000; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); }
        
        /* Spawn Menu (Q) */
        #spawn-menu { 
            position: fixed; top: 10%; left: 10%; width: 80%; height: 80%; 
            background: var(--ui-bg); border: 2px solid #555; display: none; 
            pointer-events: auto; padding: 20px; color: white; overflow-y: auto;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px;
        }
        .prop-card { 
            background: #333; border: 1px solid #777; padding: 10px; text-align: center; 
            cursor: pointer; transition: 0.2s; 
        }
        .prop-card:hover { background: var(--source-orange); color: black; }

        /* Tool Menu (C) */
        #tool-menu {
            position: fixed; right: 0; top: 0; width: 250px; height: 100%;
            background: rgba(30, 30, 30, 0.9); border-left: 2px solid var(--source-orange);
            color: white; padding: 20px; display: none; pointer-events: auto;
        }
        .tool-btn { width: 100%; padding: 10px; margin: 5px 0; background: #444; border: none; color: white; cursor: pointer; }
        .tool-btn.active { background: var(--source-orange); color: black; }

        #multiplayer-status { position: absolute; top: 10px; right: 10px; color: #0f0; font-family: monospace; }
    </style>
</head>
<body>

    <div id="gui-container">
        <div id="crosshair"></div>
        <div class="hud-vitals">
            <div>+ 100</div>
            <div style="font-size: 18px;">ARMOR 100</div>
        </div>
        <div id="multiplayer-status">MODO: SINGLEPLAYER (PeerJS ID: <span id="peer-id">Conectando...</span>)</div>
    </div>

    <div id="spawn-menu">
        <h1 style="grid-column: 1/-1">Spawn Menu</h1>
        <div class="prop-card" onclick="Gmod.spawn('cube')">CUBO</div>
        <div class="prop-card" onclick="Gmod.spawn('sphere')">ESFERA</div>
        <div class="prop-card" onclick="Gmod.spawn('cylinder')">CILINDRO</div>
        <div class="prop-card" onclick="Gmod.spawn('wall')">MURO</div>
        <div class="prop-card" onclick="Gmod.spawn('car')">CHASIS</div>
    </div>

    <div id="tool-menu">
        <h3>HERRAMIENTAS</h3>
        <button class="tool-btn active">Physics Gun</button>
        <button class="tool-btn">Weld (Soldar)</button>
        <button class="tool-btn">Thruster</button>
        <button class="tool-btn">Remover</button>
        <hr>
        <input type="text" id="remote-id" placeholder="ID del Amigo" style="width: 100%">
        <button class="tool-btn" onclick="Gmod.connect()">CONECTAR P2P</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <script>
    /**
     * GMOD WEB ENGINE - CORE ARCHITECTURE
     * Desarrollado para simular las mecánicas de Source Engine en JS.
     */
    const Gmod = (() => {
        // --- VARIABLES DE MOTOR ---
        let scene, camera, renderer, world, clock;
        let pBodies = [], pMeshes = [];
        let controls, moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let peer, connection;
        
        // Physics Gun Logic
        let pickedObject = null;
        let pickConstraint = null;
        let pickDistance = 5;

        // --- INICIALIZACIÓN ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x444466);
            scene.fog = new THREE.Fog(0x444466, 0, 100);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Mundo Físico
            world = new CANNON.World();
            world.gravity.set(0, -9.82, 0);
            world.broadphase = new CANNON.NaiveBroadphase();

            setupLights();
            setupMap();
            setupEventListeners();
            setupNetworking();
            animate();
        }

        function setupLights() {
            const ambient = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 20, 10);
            sun.castShadow = true;
            scene.add(sun);
        }

        function setupMap() {
            // Suelo Infinito
            const groundGeo = new THREE.PlaneGeometry(200, 200);
            const groundMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
            const groundMesh = new THREE.Mesh(groundGeo, groundMat);
            groundMesh.rotation.x = -Math.PI / 2;
            groundMesh.receiveShadow = true;
            scene.add(groundMesh);

            const groundBody = new CANNON.Body({ mass: 0 });
            groundBody.addShape(new CANNON.Plane());
            groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
            world.addBody(groundBody);
        }

        // --- LÓGICA DE HERRAMIENTAS (PHYSICS GUN) ---
        function handlePhysicsGun() {
            if (pickedObject) {
                // Calcular posición objetivo frente a la cámara
                const targetPos = new THREE.Vector3(0, 0, -pickDistance);
                targetPos.applyQuaternion(camera.quaternion);
                targetPos.add(camera.position);

                // Mover el cuerpo físico suavemente hacia el target
                pickedObject.velocity.set(
                    (targetPos.x - pickedObject.position.x) * 10,
                    (targetPos.y - pickedObject.position.y) * 10,
                    (targetPos.z - pickedObject.position.z) * 10
                );
            }
        }

        function raycast() {
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const intersects = raycaster.intersectObjects(pMeshes);

            if (intersects.length > 0) {
                const mesh = intersects[0].object;
                const index = pMeshes.indexOf(mesh);
                return pBodies[index];
            }
            return null;
        }

        // --- SISTEMA DE SPAWN ---
        function spawn(type) {
            let shape, geo;
            const pos = new THREE.Vector3(0, 2, -pickDistance).applyQuaternion(camera.quaternion).add(camera.position);

            switch(type) {
                case 'cube': 
                    geo = new THREE.BoxGeometry(1, 1, 1);
                    shape = new CANNON.Box(new CANNON.Vec3(0.5, 0.5, 0.5));
                    break;
                case 'sphere':
                    geo = new THREE.SphereGeometry(0.6, 16, 16);
                    shape = new CANNON.Sphere(0.6);
                    break;
                case 'wall':
                    geo = new THREE.BoxGeometry(4, 2, 0.2);
                    shape = new CANNON.Box(new CANNON.Vec3(2, 1, 0.1));
                    break;
            }

            const mesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff }));
            mesh.castShadow = true;
            const body = new CANNON.Body({ mass: 5 });
            body.addShape(shape);
            body.position.set(pos.x, pos.y, pos.z);

            world.addBody(body);
            scene.add(mesh);
            pBodies.push(body);
            pMeshes.push(mesh);
            
            // Cerrar menú después de spawnear
            document.getElementById('spawn-menu').style.display = 'none';
            renderer.domElement.requestPointerLock();
        }

        // --- EVENTOS ---
        function setupEventListeners() {
            document.addEventListener('keydown', (e) => {
                if(e.code === 'KeyQ') {
                    const m = document.getElementById('spawn-menu');
                    m.style.display = (m.style.display === 'grid') ? 'none' : 'grid';
                    if(m.style.display === 'grid') document.exitPointerLock();
                }
                if(e.code === 'KeyC') {
                    const t = document.getElementById('tool-menu');
                    t.style.display = (t.style.display === 'block') ? 'none' : 'block';
                }
                if(e.code === 'KeyW') moveForward = true;
                if(e.code === 'KeyS') moveBackward = true;
                if(e.code === 'KeyA') moveLeft = true;
                if(e.code === 'KeyD') moveRight = true;
            });

            document.addEventListener('keyup', (e) => {
                if(e.code === 'KeyW') moveForward = false;
                if(e.code === 'KeyS') moveBackward = false;
                if(e.code === 'KeyA') moveLeft = false;
                if(e.code === 'KeyD') moveRight = false;
            });

            document.addEventListener('mousedown', (e) => {
                if(e.button === 0) pickedObject = raycast(); // Left click pick
            });

            document.addEventListener('mouseup', () => pickedObject = null);

            document.addEventListener('mousemove', (e) => {
                if(document.pointerLockElement === renderer.domElement) {
                    camera.rotation.y -= e.movementX * 0.002;
                    camera.rotation.x -= e.movementY * 0.002;
                    camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
                }
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // --- MULTIPLAYER (PEERJS) ---
        function setupNetworking() {
            peer = new Peer();
            peer.on('open', id => document.getElementById('peer-id').innerText = id);
            peer.on('connection', conn => {
                connection = conn;
                setupDataHandler();
            });
        }

        function connect() {
            const id = document.getElementById('remote-id').value;
            connection = peer.connect(id);
            setupDataHandler();
        }

        function setupDataHandler() {
            connection.on('data', data => {
                // Aquí se manejarían los paquetes de posición de otros jugadores
                console.log("Datos recibidos:", data);
            });
        }

        // --- LOOP PRINCIPAL ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            world.step(1/60);
            handlePhysicsGun();

            // Sync Meshes
            for(let i=0; i<pBodies.length; i++) {
                pMeshes[i].position.copy(pBodies[i].position);
                pMeshes[i].quaternion.copy(pBodies[i].quaternion);
            }

            // Player Movement
            if(document.pointerLockElement === renderer.domElement) {
                const speed = 10 * delta;
                if(moveForward) camera.translateZ(-speed);
                if(moveBackward) camera.translateZ(speed);
                if(moveLeft) camera.translateX(-speed);
                if(moveRight) camera.translateX(speed);
            }

            renderer.render(scene, camera);
        }

        return { init, spawn, connect };
    })();

    Gmod.init();
    </script>
</body>
</html>
