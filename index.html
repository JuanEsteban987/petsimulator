<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Battle P2P Arena</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            background: linear-gradient(45deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .connection-panel {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .room-section {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        input, textarea, button, select {
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
        }

        input, textarea, select {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        input::placeholder, textarea::placeholder {
            color: rgba(255,255,255,0.5);
        }

        button {
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            min-width: 120px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .signal-box {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
        }

        .signal-box.active {
            display: block;
        }

        textarea {
            width: 100%;
            min-height: 100px;
            font-family: monospace;
            font-size: 12px;
            resize: vertical;
        }

        .battle-arena {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 20px;
        }

        .battle-arena.active {
            display: grid;
        }

        .character-card {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            border: 3px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }

        .character-card.local {
            border-color: #4ade80;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
        }

        .character-card.remote {
            border-color: #f87171;
            box-shadow: 0 0 20px rgba(248, 113, 113, 0.3);
        }

        .character-card.turn-active {
            animation: pulse 2s infinite;
            border-color: #ffd700;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.8); }
        }

        .char-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .char-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            border: 4px solid rgba(255,255,255,0.3);
            position: relative;
        }

        .char-avatar::after {
            content: attr(data-class);
            position: absolute;
            bottom: -10px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.3em;
            white-space: nowrap;
        }

        .hp-bar, .mp-bar {
            background: rgba(0,0,0,0.5);
            height: 25px;
            border-radius: 12px;
            overflow: hidden;
            margin: 10px 0;
            position: relative;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .hp-fill {
            background: linear-gradient(90deg, #ef4444, #dc2626);
            height: 100%;
            transition: width 0.5s ease;
        }

        .mp-fill {
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            height: 100%;
            transition: width 0.5s ease;
        }

        .bar-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            font-size: 12px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
            font-size: 0.9em;
        }

        .stat {
            background: rgba(255,255,255,0.1);
            padding: 8px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            opacity: 0.7;
            font-size: 0.8em;
        }

        .stat-value {
            font-weight: bold;
            font-size: 1.2em;
            color: #ffd700;
        }

        .combat-log {
            grid-column: 1 / -1;
            background: rgba(0,0,0,0.6);
            border-radius: 15px;
            padding: 20px;
            height: 200px;
            overflow-y: auto;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .log-entry {
            padding: 5px;
            margin: 2px 0;
            border-left: 3px solid transparent;
            padding-left: 10px;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .log-entry.damage { border-left-color: #ef4444; }
        .log-entry.heal { border-left-color: #22c55e; }
        .log-entry.special { border-left-color: #a855f7; }
        .log-entry.system { border-left-color: #3b82f6; font-style: italic; }

        .controls {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }

        .action-btn {
            padding: 15px;
            font-size: 1em;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }

        .action-btn.attack { background: linear-gradient(45deg, #dc2626, #991b1b); }
        .action-btn.defend { background: linear-gradient(45deg, #2563eb, #1e40af); }
        .action-btn.special { background: linear-gradient(45deg, #9333ea, #6b21a8); }
        .action-btn.heal { background: linear-gradient(45deg, #16a34a, #15803d); }

        .action-btn:disabled {
            background: #4b5563;
        }

        .damage-number {
            position: absolute;
            font-size: 2em;
            font-weight: bold;
            animation: floatUp 1.5s forwards;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
        }

        .turn-timer {
            text-align: center;
            font-size: 1.5em;
            margin: 10px 0;
        }

        .effects {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 10px;
            min-height: 30px;
        }

        .effect {
            background: rgba(255,215,0,0.3);
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.8em;
            border: 1px solid rgba(255,215,0,0.5);
        }

        .status-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #ef4444;
        }

        .status-indicator.connected {
            background: #22c55e;
            box-shadow: 0 0 10px #22c55e;
        }

        .class-select {
            margin-bottom: 15px;
        }

        .winner-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .winner-overlay.active {
            display: flex;
        }

        .winner-text {
            font-size: 4em;
            margin-bottom: 20px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .battle-arena {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ RPG Battle P2P Arena ⚔️</h1>
        
        <div class="connection-panel">
            <div class="status-indicator" id="connectionStatus"></div>
            
            <div class="class-select">
                <label>Selecciona tu clase:</label>
                <select id="classSelect">
                    <option value="warrior">⚔️ Guerrero (Alto HP/ATK)</option>
                    <option value="mage">🔮 Mago (Alto MP/Magia)</option>
                    <option value="rogue">🗡️ Pícaro (Velocidad/Crítico)</option>
                    <option value="paladin">🛡️ Paladín (Defensa/Sanación)</option>
                </select>
            </div>

            <div class="room-section">
                <button onclick="createRoom()" id="btnCreate">🏰 Crear Sala</button>
                <button onclick="joinRoom()" id="btnJoin">🔌 Unirse a Sala</button>
                <button onclick="resetGame()" id="btnReset" style="display:none;">🔄 Reiniciar</button>
            </div>

            <div id="createRoomBox" class="signal-box">
                <h3>1. Copia este código y envíaselo a tu oponente:</h3>
                <textarea id="offerText" readonly></textarea>
                <h3>2. Pega aquí el código de respuesta de tu oponente:</h3>
                <textarea id="answerInput" placeholder="Pega aquí el código de respuesta..."></textarea>
                <button onclick="completeConnection()">✅ Conectar</button>
            </div>

            <div id="joinRoomBox" class="signal-box">
                <h3>1. Pega aquí el código de oferta del host:</h3>
                <textarea id="offerInput" placeholder="Pega aquí el código de oferta..."></textarea>
                <button onclick="createAnswer()">⚡ Generar Respuesta</button>
                <h3>2. Copia este código y envíaselo al host:</h3>
                <textarea id="answerText" readonly></textarea>
            </div>
        </div>

        <div id="battleArena" class="battle-arena">
            <div class="character-card local" id="localCard">
                <div class="char-header">
                    <div class="char-avatar" id="localAvatar">🙂</div>
                    <h2 id="localName">Tú</h2>
                </div>
                <div class="hp-bar">
                    <div class="hp-fill" id="localHpBar" style="width: 100%"></div>
                    <div class="bar-text" id="localHpText">100/100</div>
                </div>
                <div class="mp-bar">
                    <div class="mp-fill" id="localMpBar" style="width: 100%"></div>
                    <div class="bar-text" id="localMpText">50/50</div>
                </div>
                <div class="stats" id="localStats"></div>
                <div class="effects" id="localEffects"></div>
            </div>

            <div class="character-card remote" id="remoteCard">
                <div class="char-header">
                    <div class="char-avatar" id="remoteAvatar">🤖</div>
                    <h2 id="remoteName">Oponente</h2>
                </div>
                <div class="hp-bar">
                    <div class="hp-fill" id="remoteHpBar" style="width: 100%"></div>
                    <div class="bar-text" id="remoteHpText">100/100</div>
                </div>
                <div class="mp-bar">
                    <div class="mp-fill" id="remoteMpBar" style="width: 100%"></div>
                    <div class="bar-text" id="remoteMpText">50/50</div>
                </div>
                <div class="stats" id="remoteStats"></div>
                <div class="effects" id="remoteEffects"></div>
            </div>

            <div class="combat-log" id="combatLog"></div>

            <div class="controls" id="controls">
                <button class="action-btn attack" onclick="action('attack')">⚔️ Atacar</button>
                <button class="action-btn defend" onclick="action('defend')">🛡️ Defender</button>
                <button class="action-btn special" onclick="action('special')">✨ Especial</button>
                <button class="action-btn heal" onclick="action('heal')">💚 Curar</button>
            </div>
        </div>
    </div>

    <div class="winner-overlay" id="winnerOverlay">
        <div class="winner-text" id="winnerText"></div>
        <button onclick="location.reload()">🔄 Nueva Partida</button>
    </div>

    <script>
        // Configuración de clases
        const CLASSES = {
            warrior: { emoji: '⚔️', hp: 150, mp: 30, atk: 15, def: 10, spd: 8, mag: 3, name: 'Guerrero' },
            mage: { emoji: '🔮', hp: 80, mp: 120, atk: 5, def: 5, spd: 10, mag: 20, name: 'Mago' },
            rogue: { emoji: '🗡️', hp: 100, mp: 40, atk: 18, def: 6, spd: 15, mag: 5, name: 'Pícaro' },
            paladin: { emoji: '🛡️', hp: 130, mp: 60, atk: 10, def: 15, spd: 6, mag: 12, name: 'Paladín' }
        };

        // Variables de WebRTC
        let localConnection, remoteConnection;
        let dataChannel;
        let isHost = false;
        let isConnected = false;

        // Variables del juego
        let localPlayer, remotePlayer;
        let currentTurn = 0; // 0 = local, 1 = remote
        let turnCount = 1;
        let gameActive = false;

        // Clase Personaje
        class Character {
            constructor(classType, isLocal) {
                const base = CLASSES[classType];
                this.class = classType;
                this.name = base.name;
                this.emoji = base.emoji;
                this.maxHp = base.hp;
                this.hp = base.hp;
                this.maxMp = base.mp;
                this.mp = base.mp;
                this.atk = base.atk;
                this.def = base.def;
                this.spd = base.spd;
                this.mag = base.mag;
                this.isLocal = isLocal;
                this.effects = [];
                this.defending = false;
            }

            takeDamage(dmg) {
                let actualDmg = dmg;
                if (this.defending) {
                    actualDmg = Math.floor(dmg / 2);
                    this.defending = false;
                }
                this.hp = Math.max(0, this.hp - actualDmg);
                return actualDmg;
            }

            heal(amount) {
                const actualHeal = Math.min(this.maxHp - this.hp, amount);
                this.hp += actualHeal;
                return actualHeal;
            }

            useMp(amount) {
                if (this.mp >= amount) {
                    this.mp -= amount;
                    return true;
                }
                return false;
            }

            restoreMp(amount) {
                this.mp = Math.min(this.maxMp, this.mp + amount);
            }
        }

        // WebRTC Functions
        async function createRoom() {
            isHost = true;
            document.getElementById('createRoomBox').classList.add('active');
            document.getElementById('btnCreate').disabled = true;
            document.getElementById('btnJoin').disabled = true;

            localConnection = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });

            dataChannel = localConnection.createDataChannel('game');
            setupDataChannel();

            localConnection.onicecandidate = (e) => {
                if (e.candidate === null) {
                    document.getElementById('offerText').value = btoa(JSON.stringify(localConnection.localDescription));
                }
            };

            const offer = await localConnection.createOffer();
            await localConnection.setLocalDescription(offer);
        }

        async function createAnswer() {
            const offer = JSON.parse(atob(document.getElementById('offerInput').value));
            
            remoteConnection = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });

            remoteConnection.ondatachannel = (e) => {
                dataChannel = e.channel;
                setupDataChannel();
            };

            remoteConnection.onicecandidate = (e) => {
                if (e.candidate === null) {
                    document.getElementById('answerText').value = btoa(JSON.stringify(remoteConnection.localDescription));
                }
            };

            await remoteConnection.setRemoteDescription(offer);
            const answer = await remoteConnection.createAnswer();
            await remoteConnection.setLocalDescription(answer);
        }

        async function completeConnection() {
            const answer = JSON.parse(atob(document.getElementById('answerInput').value));
            await localConnection.setRemoteDescription(answer);
        }

        function setupDataChannel() {
            dataChannel.onopen = () => {
                isConnected = true;
                document.getElementById('connectionStatus').classList.add('connected');
                document.getElementById('btnReset').style.display = 'inline-block';
                log('¡Conexión establecida! Preparando batalla...', 'system');
                initGame();
            };

            dataChannel.onmessage = (e) => {
                const data = JSON.parse(e.data);
                handleGameMessage(data);
            };

            dataChannel.onclose = () => {
                log('Conexión cerrada', 'system');
                isConnected = false;
            };
        }

        function joinRoom() {
            document.getElementById('joinRoomBox').classList.add('active');
            document.getElementById('btnCreate').disabled = true;
            document.getElementById('btnJoin').disabled = true;
        }

        // Game Functions
        function initGame() {
            const classType = document.getElementById('classSelect').value;
            localPlayer = new Character(classType, true);
            
            // Enviar info al oponente
            sendData({ type: 'init', class: classType, spd: localPlayer.spd });
            
            document.getElementById('battleArena').classList.add('active');
            updateUI();
        }

        function startBattle(remoteClass, remoteSpd) {
            remotePlayer = new Character(remoteClass, false);
            
            // Determinar quién empieza (más velocidad)
            currentTurn = localPlayer.spd >= remoteSpd ? 0 : 1;
            
            gameActive = true;
            updateUI();
            log(`¡Batalla iniciada! ${localPlayer.name} vs ${remotePlayer.name}`, 'system');
            log(`Turno ${turnCount}: ${currentTurn === 0 ? 'Tu turno' : 'Turno del oponente'}`, 'system');
            
            updateTurn();
        }

        function handleGameMessage(data) {
            switch(data.type) {
                case 'init':
                    startBattle(data.class, data.spd);
                    // Responder con nuestra info si somos el host
                    if (isHost) {
                        sendData({ 
                            type: 'init-response', 
                            class: localPlayer.class, 
                            spd: localPlayer.spd 
                        });
                    }
                    break;
                case 'init-response':
                    if (!remotePlayer) {
                        startBattle(data.class, data.spd);
                    }
                    break;
                case 'action':
                    handleRemoteAction(data.action, data.value);
                    break;
                case 'end-turn':
                    endTurn();
                    break;
            }
        }

        function sendData(data) {
            if (dataChannel && dataChannel.readyState === 'open') {
                dataChannel.send(JSON.stringify(data));
            }
        }

        function action(type) {
            if (!gameActive || currentTurn !== 0) return;

            let value = 0;
            let mpCost = 0;

            switch(type) {
                case 'attack':
                    value = calculateDamage(localPlayer.atk, 10);
                    const dmg = remotePlayer.takeDamage(value);
                    sendData({ type: 'action', action: 'attack', value: dmg });
                    showDamage(dmg, 'remoteCard');
                    log(`Atacas por ${dmg} daño!`, 'damage');
                    break;
                case 'defend':
                    localPlayer.defending = true;
                    sendData({ type: 'action', action: 'defend' });
                    log('Te pones en posición defensiva', 'special');
                    break;
                case 'special':
                    mpCost = 20;
                    if (!localPlayer.useMp(mpCost)) {
                        log('¡No tienes suficiente MP!', 'system');
                        return;
                    }
                    value = calculateDamage(localPlayer.mag * 2, 20);
                    const specialDmg = remotePlayer.takeDamage(value);
                    sendData({ type: 'action', action: 'special', value: specialDmg });
                    showDamage(specialDmg, 'remoteCard');
                    log(`¡Ataque especial mágico! ${specialDmg} daño!`, 'special');
                    break;
                case 'heal':
                    mpCost = 15;
                    if (!localPlayer.useMp(mpCost)) {
                        log('¡No tienes suficiente MP!', 'system');
                        return;
                    }
                    value = localPlayer.heal(localPlayer.mag * 3);
                    sendData({ type: 'action', action: 'heal', value: value });
                    log(`Te curas ${value} HP`, 'heal');
                    break;
            }

            localPlayer.restoreMp(5);
            updateUI();
            checkWinCondition();
            
            if (gameActive) {
                sendData({ type: 'end-turn' });
                currentTurn = 1;
                updateTurn();
            }
        }

        function handleRemoteAction(action, value) {
            switch(action) {
                case 'attack':
                    const dmg = localPlayer.takeDamage(value);
                    showDamage(dmg, 'localCard');
                    log(`Oponente ataca por ${dmg} daño!`, 'damage');
                    break;
                case 'defend':
                    remotePlayer.defending = true;
                    log('Oponente se defiende', 'special');
                    break;
                case 'special':
                    const specialDmg = localPlayer.takeDamage(value);
                    showDamage(specialDmg, 'localCard');
                    log(`¡Ataque especial del oponente! ${specialDmg} daño!`, 'special');
                    break;
                case 'heal':
                    remotePlayer.heal(value);
                    log(`Oponente se cura ${value} HP`, 'heal');
                    break;
            }
            remotePlayer.restoreMp(5);
            updateUI();
            checkWinCondition();
        }

        function calculateDamage(base, variance) {
            const roll = Math.floor(Math.random() * variance) - (variance / 2);
            return Math.max(1, Math.floor(base + roll));
        }

        function endTurn() {
            currentTurn = 0;
            turnCount++;
            log(`Turno ${turnCount}: Tu turno`, 'system');
            updateTurn();
        }

        function updateTurn() {
            document.getElementById('localCard').classList.toggle('turn-active', currentTurn === 0);
            document.getElementById('remoteCard').classList.toggle('turn-active', currentTurn === 1);
            
            const buttons = document.querySelectorAll('.action-btn');
            buttons.forEach(btn => btn.disabled = currentTurn !== 0);
        }

        function checkWinCondition() {
            if (localPlayer.hp <= 0) {
                endGame(false);
            } else if (remotePlayer.hp <= 0) {
                endGame(true);
            }
        }

        function endGame(victory) {
            gameActive = false;
            const overlay = document.getElementById('winnerOverlay');
            const text = document.getElementById('winnerText');
            
            if (victory) {
                text.innerHTML = '🎉 ¡VICTORIA! 🎉';
                text.style.color = '#ffd700';
            } else {
                text.innerHTML = '💀 DERROTA 💀';
                text.style.color = '#ef4444';
            }
            
            setTimeout(() => overlay.classList.add('active'), 1000);
        }

        function updateUI() {
            if (!localPlayer) return;

            // Local Player
            const localHpPercent = (localPlayer.hp / localPlayer.maxHp) * 100;
            const localMpPercent = (localPlayer.mp / localPlayer.maxMp) * 100;
            document.getElementById('localHpBar').style.width = localHpPercent + '%';
            document.getElementById('localMpBar').style.width = localMpPercent + '%';
            document.getElementById('localHpText').textContent = `${localPlayer.hp}/${localPlayer.maxHp}`;
            document.getElementById('localMpText').textContent = `${localPlayer.mp}/${localPlayer.maxMp}`;
            document.getElementById('localAvatar').textContent = localPlayer.emoji;
            document.getElementById('localAvatar').setAttribute('data-class', localPlayer.name);
            
            document.getElementById('localStats').innerHTML = `
                <div class="stat"><div class="stat-label">ATK</div><div class="stat-value">${localPlayer.atk}</div></div>
                <div class="stat"><div class="stat-label">DEF</div><div class="stat-value">${localPlayer.def}</div></div>
                <div class="stat"><div class="stat-label">SPD</div><div class="stat-value">${localPlayer.spd}</div></div>
                <div class="stat"><div class="stat-label">MAG</div><div class="stat-value">${localPlayer.mag}</div></div>
            `;

            // Remote Player
            if (remotePlayer) {
                const remoteHpPercent = (remotePlayer.hp / remotePlayer.maxHp) * 100;
                const remoteMpPercent = (remotePlayer.mp / remotePlayer.maxMp) * 100;
                document.getElementById('remoteHpBar').style.width = remoteHpPercent + '%';
                document.getElementById('remoteMpBar').style.width = remoteMpPercent + '%';
                document.getElementById('remoteHpText').textContent = `${remotePlayer.hp}/${remotePlayer.maxHp}`;
                document.getElementById('remoteMpText').textContent = `${remotePlayer.mp}/${remotePlayer.maxMp}`;
                document.getElementById('remoteAvatar').textContent = remotePlayer.emoji;
                document.getElementById('remoteAvatar').setAttribute('data-class', remotePlayer.name);
                
                document.getElementById('remoteStats').innerHTML = `
                    <div class="stat"><div class="stat-label">ATK</div><div class="stat-value">${remotePlayer.atk}</div></div>
                    <div class="stat"><div class="stat-label">DEF</div><div class="stat-value">${remotePlayer.def}</div></div>
                    <div class="stat"><div class="stat-label">SPD</div><div class="stat-value">${remotePlayer.spd}</div></div>
                    <div class="stat"><div class="stat-label">MAG</div><div class="stat-value">${remotePlayer.mag}</div></div>
                `;
            }
        }

        function showDamage(amount, targetId) {
            const card = document.getElementById(targetId);
            const dmg = document.createElement('div');
            dmg.className = 'damage-number';
            dmg.textContent = amount;
            dmg.style.color = '#ef4444';
            dmg.style.left = Math.random() * 50 + 25 + '%';
            dmg.style.top = '30%';
            card.appendChild(dmg);
            setTimeout(() => dmg.remove(), 1500);
        }

        function log(message, type = 'system') {
            const log = document.getElementById('combatLog');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${message}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function resetGame() {
            location.reload();
        }

        // Inicializar UI
        updateUI();
    </script>
</body>
</html>
