<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JS-Craft: Survival Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: rgba(0,0,0,0.7); padding: 10px; border: 4px solid #333; pointer-events: none; }
        .slot { width: 50px; height: 50px; border: 3px solid #555; background: #8b8b8b; display: flex; justify-content: center; align-items: center; position: relative; color: white; font-weight: bold; }
        .slot.active { border-color: #fff; box-shadow: 0 0 15px #fff; }
        .count { position: absolute; bottom: 2px; right: 5px; font-size: 14px; text-shadow: 2px 2px #000; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 20px; opacity: 0.8; pointer-events: none; }
        #msg { position: absolute; top: 20px; width: 100%; text-align: center; color: white; pointer-events: none; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

<div id="msg">CLIC PARA JUGAR | 'E' INVENTARIO | RUEDA: CAMBIAR BLOQUE</div>
<div id="crosshair">+</div>
<div id="ui">
    </div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js';

// --- CONFIGURACIÓN ---
const CHUNK_SIZE = 40;
const worldData = new Map();
const inventory = Array(9).fill(null).map(() => ({ type: null, count: 0 }));
let selectedSlot = 0;

// --- GENERADOR DE TEXTURAS 8x8 ---
function createPixelTexture(colorBase, noiseLevel = 40) {
    const size = 8;
    const data = new Uint8Array(size * size * 4);
    for (let i = 0; i < size * size * 4; i += 4) {
        const noise = (Math.random() - 0.5) * noiseLevel;
        data[i] = Math.max(0, Math.min(255, colorBase.r + noise));
        data[i+1] = Math.max(0, Math.min(255, colorBase.g + noise));
        data[i+2] = Math.max(0, Math.min(255, colorBase.b + noise));
        data[i+3] = 255;
    }
    const tex = new THREE.DataTexture(data, size, size, THREE.RGBAFormat);
    tex.magFilter = THREE.NearestFilter;
    tex.needsUpdate = true;
    return tex;
}

const materials = {
    grass: new THREE.MeshLambertMaterial({ map: createPixelTexture({r:100, g:160, b:60}) }),
    dirt: new THREE.MeshLambertMaterial({ map: createPixelTexture({r:120, g:80, b:50}) }),
    wood: new THREE.MeshLambertMaterial({ map: createPixelTexture({r:90, g:60, b:40}) }),
    leaves: new THREE.MeshLambertMaterial({ map: createPixelTexture({r:50, g:120, b:40}), transparent: true, opacity: 0.9 }),
    stone: new THREE.MeshLambertMaterial({ map: createPixelTexture({r:120, g:120, b:120}) }),
    chest: new THREE.MeshLambertMaterial({ map: createPixelTexture({r:180, g:130, b:60}, 80) }),
    crafting: new THREE.MeshLambertMaterial({ map: createPixelTexture({r:150, g:100, b:70}, 100) })
};

// --- ESCENA Y MOTOR ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new PointerLockControls(camera, document.body);
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const sun = new THREE.DirectionalLight(0xffffff, 0.6);
sun.position.set(10, 20, 10);
scene.add(sun);

// --- LÓGICA DE MUNDO ---
const boxGeo = new THREE.BoxGeometry(1, 1, 1);

function setBlock(x, y, z, type) {
    const key = `${x},${y},${z}`;
    if (worldData.has(key)) return;
    const mesh = new THREE.Mesh(boxGeo, materials[type]);
    mesh.position.set(x, y, z);
    mesh.name = type;
    scene.add(mesh);
    worldData.set(key, mesh);
}

// Generar Terreno con Cuevas y Árboles
for(let x = -CHUNK_SIZE/2; x < CHUNK_SIZE/2; x++) {
    for(let z = -CHUNK_SIZE/2; z < CHUNK_SIZE/2; z++) {
        const ground = Math.floor(Math.sin(x/6)*2 + Math.cos(z/6)*2);
        
        for(let y = -8; y <= ground; y++) {
            // CUEVAS: Si el "ruido" es bajo, no ponemos bloque
            const caveNoise = Math.sin(x/2) * Math.cos(y/2) * Math.sin(z/2);
            if (y < ground - 1 && caveNoise > 0.7) continue; 

            let type = 'stone';
            if (y === ground) type = 'grass';
            else if (y > ground - 3) type = 'dirt';
            setBlock(x, y, z, type);
        }

        // ÁRBOLES Y ESTRUCTURAS (Raro)
        if (Math.random() > 0.98 && x % 5 === 0) {
            const h = ground + 1;
            for(let ty=0; ty<4; ty++) setBlock(x, h+ty, z, 'wood'); // Tronco
            for(let lx=-1; lx<=1; lx++) 
                for(let lz=-1; lz<=1; lz++) 
                    setBlock(x+lx, h+4, z+lz, 'leaves'); // Copa
            
            if (Math.random() > 0.5) setBlock(x+1, h, z, 'chest'); // Cofre random
            else setBlock(x-1, h, z, 'crafting'); // Mesa random
        }
    }
}

// --- FÍSICA Y COLISIONES ---
let move = { f:0, b:0, l:0, r:0 };
let velocity = new THREE.Vector3();
let canJump = false;

function isBlockAt(x, y, z) {
    return worldData.has(`${Math.round(x)},${Math.round(y)},${Math.round(z)}`);
}

function updatePhysics(delta) {
    if (!controls.isLocked) return;

    velocity.y -= 9.8 * 1.5 * delta; // Gravedad
    
    // Colisión Vertical (Pies)
    const nextY = camera.position.y + velocity.y * delta;
    if (isBlockAt(camera.position.x, nextY - 1.6, camera.position.z)) {
        velocity.y = 0;
        canJump = true;
    } else {
        camera.position.y = nextY;
    }

    // Movimiento Horizontal
    const direction = new THREE.Vector3();
    direction.z = move.f - move.b;
    direction.x = move.r - move.l;
    direction.normalize();

    if (move.f || move.b || move.l || move.r) {
        const speed = 5 * delta;
        controls.moveRight(direction.x * speed);
        if (isBlockAt(camera.position.x, camera.position.y - 1, camera.position.z)) {
            controls.moveRight(-direction.x * speed);
        }
        controls.moveForward(direction.z * speed);
        if (isBlockAt(camera.position.x, camera.position.y - 1, camera.position.z)) {
            controls.moveForward(-direction.z * speed);
        }
    }
}

// --- INVENTARIO Y UI ---
const ui = document.getElementById('ui');
const blockIcons = { grass: '🌿', dirt: '🟫', wood: '🪵', stone: '🧱', chest: '📦', crafting: '🛠️', leaves: '🍃' };

function updateUI() {
    ui.innerHTML = '';
    inventory.forEach((slot, i) => {
        const div = document.createElement('div');
        div.className = `slot ${i === selectedSlot ? 'active' : ''}`;
        div.innerHTML = slot.type ? blockIcons[slot.type] : '';
        if (slot.count > 1) div.innerHTML += `<span class="count">${slot.count}</span>`;
        ui.appendChild(div);
    });
}

function addToInventory(type) {
    const existing = inventory.find(s => s.type === type);
    if (existing) existing.count++;
    else {
        const empty = inventory.find(s => s.type === null);
        if (empty) { empty.type = type; empty.count = 1; }
    }
    updateUI();
}

// --- INTERACCIÓN ---
document.addEventListener('mousedown', (e) => {
    if (!controls.isLocked) return;
    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(0,0), camera);
    const intersects = ray.intersectObjects(scene.children);

    if (intersects.length > 0) {
        const obj = intersects[0].object;
        if (e.button === 0) { // Romper
            addToInventory(obj.name);
            scene.remove(obj);
            worldData.delete(`${obj.position.x},${obj.position.y},${obj.position.z}`);
        } else if (inventory[selectedSlot].type) { // Poner
            const pos = obj.position.clone().add(intersects[0].face.normal);
            setBlock(pos.x, pos.y, pos.z, inventory[selectedSlot].type);
            inventory[selectedSlot].count--;
            if (inventory[selectedSlot].count <= 0) inventory[selectedSlot].type = null;
            updateUI();
        }
    }
});

// --- EVENTOS ---
window.onkeydown = (e) => {
    if (e.code === 'KeyW') move.f = 1; if (e.code === 'KeyS') move.b = 1;
    if (e.code === 'KeyA') move.l = 1; if (e.code === 'KeyD') move.r = 1;
    if (e.code === 'Space' && canJump) { velocity.y = 5; canJump = false; }
    if (e.key >= 1 && e.key <= 9) { selectedSlot = e.key - 1; updateUI(); }
};
window.onkeyup = (e) => {
    if (e.code === 'KeyW') move.f = 0; if (e.code === 'KeyS') move.b = 0;
    if (e.code === 'KeyA') move.l = 0; if (e.code === 'KeyD') move.r = 0;
};
window.onwheel = (e) => {
    selectedSlot = (selectedSlot + (e.deltaY > 0 ? 1 : -1) + 9) % 9;
    updateUI();
};
document.body.onclick = () => controls.lock();

// --- LOOP ---
let lastTime = performance.now();
function animate() {
    requestAnimationFrame(animate);
    const time = performance.now();
    updatePhysics((time - lastTime) / 1000);
    renderer.render(scene, camera);
    lastTime = time;
}
updateUI();
camera.position.set(0, 10, 0);
animate();
</script>
</body>
</html>
