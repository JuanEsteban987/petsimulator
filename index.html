<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korblox: Slime Prototype</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        /* Interfaz de Usuario */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            pointer-events: none;
            user-select: none;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>Haz clic para empezar a recolectar</h1>
    </div>

    <div id="ui">
        <div style="font-size: 24px;">Slimes en Inventario: <span id="counter">0</span></div>
        <div style="font-size: 12px; margin-top: 5px;">[WASD] Mover | [Click Izq] Succión | [Click Der] Disparar</div>
    </div>

    <div id="crosshair"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- Configuración Básica ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Cielo azul
        scene.fog = new THREE.Fog(0x87ceeb, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 1.6; // Altura de los ojos

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Iluminación ---
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 2);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- Suelo y Límites ---
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x7cfc00 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- Lógica de Juego ---
        const slimes = [];
        let inventoryCount = 0;
        const inventoryEl = document.getElementById('counter');
        
        // Controles
        const controls = new PointerLockControls(camera, document.body);
        const overlay = document.getElementById('overlay');

        overlay.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => overlay.style.display = 'none');
        controls.addEventListener('unlock', () => overlay.style.display = 'flex');

        // Movimiento
        const moveKeys = { forward: false, backward: false, left: false, right: false };
        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW') moveKeys.forward = true;
            if (e.code === 'KeyS') moveKeys.backward = true;
            if (e.code === 'KeyA') moveKeys.left = true;
            if (e.code === 'KeyD') moveKeys.right = true;
        });
        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') moveKeys.forward = false;
            if (e.code === 'KeyS') moveKeys.backward = false;
            if (e.code === 'KeyA') moveKeys.left = false;
            if (e.code === 'KeyD') moveKeys.right = false;
        });

        // Mouse Actions
        let isSucking = false;
        document.addEventListener('mousedown', (e) => {
            if (e.button === 0) isSucking = true;
            if (e.button === 2) shootSlime();
        });
        document.addEventListener('mouseup', (e) => {
            if (e.button === 0) isSucking = false;
        });
        document.addEventListener('contextmenu', e => e.preventDefault());

        // --- Clase Slime ---
        class Slime {
            constructor(position, color = 0xff69b4) {
                this.mesh = new THREE.Group();
                
                // Cuerpo
                const body = new THREE.Mesh(
                    new THREE.SphereGeometry(0.4, 16, 16),
                    new THREE.MeshStandardMaterial({ color: color })
                );
                body.castShadow = true;
                this.mesh.add(body);

                // Ojos
                const eyeGeo = new THREE.SphereGeometry(0.05, 8, 8);
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
                const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
                eyeL.position.set(0.15, 0.1, 0.35);
                const eyeR = eyeL.clone();
                eyeR.position.x = -0.15;
                this.mesh.add(eyeL, eyeR);

                this.mesh.position.copy(position);
                scene.add(this.mesh);

                // Física y Estado
                this.velocity = new THREE.Vector3(0, 0, 0);
                this.isGrounded = true;
                this.nextJump = Date.now() + Math.random() * 3000;
            }

            update(delta) {
                // Gravedad simple
                if (this.mesh.position.y > 0.4) {
                    this.velocity.y -= 9.8 * delta;
                    this.isGrounded = false;
                } else {
                    this.mesh.position.y = 0.4;
                    this.velocity.y = 0;
                    this.velocity.x *= 0.9; // Fricción
                    this.velocity.z *= 0.9;
                    this.isGrounded = true;
                }

                // Salto aleatorio (IA Wander)
                if (this.isGrounded && Date.now() > this.nextJump) {
                    this.velocity.y = 4;
                    this.velocity.x = (Math.random() - 0.5) * 5;
                    this.velocity.z = (Math.random() - 0.5) * 5;
                    this.nextJump = Date.now() + 2000 + Math.random() * 3000;
                }

                // Aplicar movimiento
                this.mesh.position.add(this.velocity.clone().multiplyScalar(delta));

                // Mirar hacia donde se mueven
                if (this.velocity.length() > 0.1) {
                    const lookAtTarget = this.mesh.position.clone().add(this.velocity);
                    lookAtTarget.y = this.mesh.position.y;
                    this.mesh.lookAt(lookAtTarget);
                }
            }
        }

        // --- Generación Inicial ---
        const colors = [0xff69b4, 0x00ff7f, 0x1e90ff, 0xffd700];
        for (let i = 0; i < 15; i++) {
            const pos = new THREE.Vector3((Math.random() - 0.5) * 40, 0.4, (Math.random() - 0.5) * 40);
            slimes.push(new Slime(pos, colors[Math.floor(Math.random() * colors.length)]));
        }

        function shootSlime() {
            if (inventoryCount <= 0) return;
            
            inventoryCount--;
            inventoryEl.innerText = inventoryCount;

            const spawnPos = camera.position.clone().add(new THREE.Vector3(0, -0.2, 0));
            const newSlime = new Slime(spawnPos, colors[Math.floor(Math.random() * colors.length)]);
            
            // Impulso inicial
            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);
            newSlime.velocity.copy(direction.multiplyScalar(15));
            newSlime.velocity.y += 2; // Un poco hacia arriba

            slimes.push(newSlime);
        }

        // --- Bucle de Animación ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (controls.isLocked) {
                // Movimiento del jugador
                const speed = 10 * delta;
                if (moveKeys.forward) controls.moveForward(speed);
                if (moveKeys.backward) controls.moveForward(-speed);
                if (moveKeys.left) controls.moveRight(-speed);
                if (moveKeys.right) controls.moveRight(speed);
            }

            // Actualizar Slimes
            for (let i = slimes.length - 1; i >= 0; i--) {
                const s = slimes[i];
                s.update(delta);

                // Lógica de succión
                if (isSucking) {
                    const dist = s.mesh.position.distanceTo(camera.position);
                    if (dist < 8) {
                        // Atraer hacia la cámara
                        const target = camera.position.clone();
                        target.y -= 0.5; // Apuntar un poco más abajo del centro
                        s.mesh.position.lerp(target, 0.1);
                        
                        // Capturar
                        if (dist < 1.2) {
                            scene.remove(s.mesh);
                            slimes.splice(i, 1);
                            inventoryCount++;
                            inventoryEl.innerText = inventoryCount;
                        }
                    }
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
