<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gmod Web - Final Build v1.0</title>
    <style>
        :root { --source-orange: #ffb400; --source-bg: rgba(0, 0, 0, 0.75); }
        body { margin: 0; overflow: hidden; background: #1a1a1b; font-family: 'Segoe UI', sans-serif; }
        
        /* HUD SOURCE ENGINE */
        #hud { position: absolute; bottom: 40px; left: 40px; display: flex; gap: 50px; pointer-events: none; z-index: 10; }
        .stat-box { color: var(--source-orange); text-shadow: 3px 3px 0px #000; }
        .stat-val { font-size: 56px; font-weight: 900; line-height: 1; }
        .stat-lbl { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }

        #crosshair { 
            position: fixed; top: 50%; left: 50%; width: 30px; height: 30px; 
            border: 2px solid var(--source-orange); border-radius: 50%; 
            transform: translate(-50%, -50%); pointer-events: none; 
        }
        #crosshair::before { content: ''; position: absolute; top: 50%; left: 50%; width: 2px; height: 10px; background: var(--source-orange); transform: translate(-50%, -50%); }
        #crosshair::after { content: ''; position: absolute; top: 50%; left: 50%; width: 10px; height: 2px; background: var(--source-orange); transform: translate(-50%, -50%); }

        /* MENÚS */
        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 100;
        }
        #q-menu-content {
            width: 800px; height: 500px; background: var(--source-bg); border: 2px solid var(--source-orange);
            padding: 20px; color: white; overflow-y: auto;
        }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .item { 
            background: #333; border: 1px solid #555; padding: 20px; text-align: center; 
            cursor: pointer; transition: 0.2s; font-weight: bold;
        }
        .item:hover { background: var(--source-orange); color: black; transform: scale(1.05); }

        #top-bar { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-size: 12px; pointer-events: none; }
        #peer-info { position: absolute; top: 10px; right: 20px; color: #0f0; font-family: monospace; }
    </style>
</head>
<body>

    <div id="top-bar">GM_CONSTRUCT_HTML | MODO: <span id="cur-mode">SANDBOX</span> | [F1] Cambiar Modo | [Q] Spawn Menu</div>
    <div id="peer-info">P2P ID: <span id="my-id">...</span></div>
    <div id="crosshair"></div>

    <div id="hud">
        <div class="stat-box"><div class="stat-lbl">Salud</div><div class="stat-val" id="hp">100</div></div>
        <div class="stat-box"><div class="stat-lbl">Traje</div><div class="stat-val" id="ap">0</div></div>
        <div class="stat-box"><div class="stat-lbl">Munición</div><div class="stat-val">∞</div></div>
    </div>

    <div id="q-menu" class="menu-overlay">
        <div id="q-menu-content">
            <h1>Spawn Menu</h1>
            <hr border-color="#ffb400">
            <div class="grid">
                <div class="item" onclick="Engine.spawn('cube')">Caja Madera</div>
                <div class="item" onclick="Engine.spawn('sphere')">Pelota</div>
                <div class="item" onclick="Engine.spawn('wall')">Muro</div>
                <div class="item" onclick="Engine.spawn('barrel')">Barril</div>
                <div class="item" onclick="Engine.spawn('zombie')">Spawn Zombie</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <script>
    const Engine = (() => {
        let scene, camera, renderer, world, clock;
        let playerBody, controlsEnabled = false;
        let moveF = 0, moveR = 0;
        let pBodies = [], pMeshes = [], zombies = [];
        let gameMode = 'Sandbox';
        let noclip = false;

        // PhysGun
        let picked = null, pickDist = 8, beam;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x71adff); // Cielo Gmod
            scene.fog = new THREE.Fog(0x71adff, 20, 300);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            world = new CANNON.World();
            world.gravity.set(0, -18, 0);
            clock = new THREE.Clock();

            // PhysGun Beam
            const beamGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
            beam = new THREE.Line(beamGeo, new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 5 }));
            scene.add(beam);
            beam.visible = false;

            setupWorld();
            setupPlayer();
            setupNetworking();
            setupControls();
            animate();
        }

        function setupWorld() {
            // Suelo
            const groundMat = new THREE.MeshPhongMaterial({ color: 0x444d44 });
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), groundMat);
            ground.rotation.x = -Math.PI/2;
            ground.receiveShadow = true;
            scene.add(ground);

            const floorBody = new CANNON.Body({ mass: 0 });
            floorBody.addShape(new CANNON.Plane());
            floorBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2);
            world.addBody(floorBody);

            // Luces
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(50, 100, 50);
            sun.castShadow = true;
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        }

        function setupPlayer() {
            const shape = new CANNON.Box(new CANNON.Vec3(0.5, 1.7, 0.5));
            playerBody = new CANNON.Body({ mass: 85, fixedRotation: true });
            playerBody.addShape(shape);
            playerBody.position.set(0, 5, 0);
            world.addBody(playerBody);
        }

        function spawn(type) {
            let shape, geo, color = Math.random() * 0xffffff;
            let mass = 15;

            if(type === 'cube') {
                geo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
                shape = new CANNON.Box(new CANNON.Vec3(0.75, 0.75, 0.75));
            } else if(type === 'sphere') {
                geo = new THREE.SphereGeometry(1, 20, 20);
                shape = new CANNON.Sphere(1);
            } else if(type === 'barrel') {
                geo = new THREE.CylinderGeometry(0.6, 0.6, 1.8, 16);
                shape = new CANNON.Cylinder(0.6, 0.6, 1.8, 16);
            } else if(type === 'zombie') {
                geo = new THREE.BoxGeometry(1, 2, 1);
                shape = new CANNON.Box(new CANNON.Vec3(0.5, 1, 0.5));
                color = 0xff0000;
                mass = 70;
            }

            const mesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color: color }));
            mesh.castShadow = true;
            const body = new CANNON.Body({ mass: mass });
            body.addShape(shape);

            const look = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            body.position.set(camera.position.x + look.x*5, camera.position.y + look.y*5, camera.position.z + look.z*5);
            
            world.addBody(body);
            scene.add(mesh);
            pBodies.push(body);
            pMeshes.push(mesh);
            if(type === 'zombie') zombies.push(body);

            closeMenus();
        }

        function setupControls() {
            document.addEventListener('keydown', e => {
                if(e.code === 'KeyW') moveF = 1;
                if(e.code === 'KeyS') moveF = -1;
                if(e.code === 'KeyA') moveR = -1;
                if(e.code === 'KeyD') moveR = 1;
                if(e.code === 'KeyQ') document.getElementById('q-menu').style.display = 'flex';
                if(e.code === 'KeyV') noclip = !noclip;
                if(e.code === 'Space' && !noclip) playerBody.velocity.y = 10;
            });
            document.addEventListener('keyup', e => {
                if(['KeyW', 'KeyS'].includes(e.code)) moveF = 0;
                if(['KeyA', 'KeyD'].includes(e.code)) moveR = 0;
            });
            renderer.domElement.addEventListener('mousedown', e => {
                if(!controlsEnabled) renderer.domElement.requestPointerLock();
                else picked = getObjectUnderCrosshair();
            });
            document.addEventListener('mouseup', () => { picked = null; beam.visible = false; });
            document.addEventListener('mousemove', e => {
                if(document.pointerLockElement === renderer.domElement) {
                    camera.rotation.y -= e.movementX * 0.002;
                    camera.rotation.x -= e.movementY * 0.002;
                    camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
                }
            });
        }

        function getObjectUnderCrosshair() {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(pMeshes);
            if(hits.length > 0) return pBodies[pMeshes.indexOf(hits[0].object)];
            return null;
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            world.step(1/60);

            // Player Physics
            if(noclip) {
                playerBody.velocity.set(0,0,0);
                const dir = new THREE.Vector3(moveR, 0, -moveF).applyQuaternion(camera.quaternion);
                playerBody.position.x += dir.x * 0.5;
                playerBody.position.y += dir.y * 0.5;
                playerBody.position.z += dir.z * 0.5;
            } else {
                const speed = 15;
                const forward = new THREE.Vector3(0,0,-1).applyQuaternion(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), camera.rotation.y));
                const right = new THREE.Vector3(1,0,0).applyQuaternion(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), camera.rotation.y));
                playerBody.velocity.x = (forward.x * moveF + right.x * moveR) * speed;
                playerBody.velocity.z = (forward.z * moveF + right.z * moveR) * speed;
            }
            camera.position.set(playerBody.position.x, playerBody.position.y + 0.8, playerBody.position.z);

            // PhysGun Logic
            if(picked) {
                const target = new THREE.Vector3(0,0, -pickDist).applyQuaternion(camera.quaternion).add(camera.position);
                picked.position.lerp(new CANNON.Vec3(target.x, target.y, target.z), 0.2, picked.position);
                picked.velocity.set(0,0,0);
                
                beam.visible = true;
                const positions = beam.geometry.attributes.position.array;
                positions[0] = camera.position.x; positions[1] = camera.position.y - 0.2; positions[2] = camera.position.z;
                positions[3] = picked.position.x; positions[4] = picked.position.y; positions[5] = picked.position.z;
                beam.geometry.attributes.position.needsUpdate = true;
            }

            // Zombie AI (Simple Follow)
            if(gameMode === 'Zombie') {
                zombies.forEach(z => {
                    const dX = playerBody.position.x - z.position.x;
                    const dZ = playerBody.position.z - z.position.z;
                    z.velocity.x = Math.sign(dX) * 4;
                    z.velocity.z = Math.sign(dZ) * 4;
                });
            }

            // Sync Visuals
            pBodies.forEach((b, i) => { pMeshes[i].position.copy(b.position); pMeshes[i].quaternion.copy(b.quaternion); });
            renderer.render(scene, camera);
        }

        function closeMenus() {
            document.getElementById('q-menu').style.display = 'none';
            renderer.domElement.requestPointerLock();
        }

        function setupNetworking() {
            const peer = new Peer();
            peer.on('open', id => document.getElementById('my-id').innerText = id);
        }

        return { init, spawn };
    })();

    window.onload = Engine.init;
    </script>
</body>
</html>
