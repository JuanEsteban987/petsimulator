<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slime Web Rancher 3D - Ranchos y Zanahorias</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        canvas { display: block; }

        /* Interfaz de Usuario (HUD) */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 20px;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255,255,255,0.3);
        }

        #inventory-container {
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 25px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            pointer-events: auto;
        }

        .inventory-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }

        .section-title { font-size: 12px; text-transform: uppercase; margin-bottom: 5px; opacity: 0.8; }

        .slot {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid #888;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            transition: all 0.2s;
        }

        .slot.active { border-color: #4caf50; background: rgba(76, 175, 80, 0.2); }
        .slot-count { font-size: 20px; font-weight: bold; }
        .slot-type { font-size: 11px; text-transform: uppercase; margin-top: 2px;}

        /* Pantallas superpuestas */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            pointer-events: auto;
        }

        #instructions { cursor: pointer; }
        
        #build-menu { display: none; }
        .build-options { display: flex; gap: 20px; margin-top: 20px; }
        .build-btn {
            padding: 15px 30px; background: #4caf50; color: white;
            border: none; border-radius: 8px; cursor: pointer; font-size: 18px;
            transition: background 0.2s;
        }
        .build-btn:hover { background: #66bb6a; }
        .build-btn.cancel { background: #f44336; }
        .build-btn.cancel:hover { background: #ef5350; }

        #interaction-prompt {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 5px;
            display: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="instructions" class="overlay">
        <h1>SLIME WEB RANCHER 3D</h1>
        <p>W, A, S, D - Moverse | Mouse - Mirar</p>
        <p>Click Izquierdo - Succionar (Slimes/Comida) | Click Derecho - Disparar Slime</p>
        <p>E - Interactuar con Parcelas</p>
        <br>
        <p><strong>HAZ CLICK PARA EMPEZAR</strong></p>
    </div>

    <div id="build-menu" class="overlay">
        <h2>Nueva Parcela</h2>
        <p>¿Qué quieres construir aquí?</p>
        <div class="build-options">
            <button class="build-btn" onclick="game.buildOnPlot('corral')">Rancho (Slimes)</button>
            <button class="build-btn" onclick="game.buildOnPlot('garden')">Huerto (Zanahorias)</button>
            <button class="build-btn cancel" onclick="game.closeBuildMenu()">Cancelar</button>
        </div>
    </div>

    <div id="interaction-prompt">Presiona E para construir</div>
    <div id="hud">
        <div id="crosshair"></div>
        
        <div id="inventory-container">
            <div class="inventory-section">
                <div class="section-title">VacPack</div>
                <div class="slot active" id="slime-slot">
                    <span class="slot-count" id="slime-count">0</span>
                    <span class="slot-type" id="slime-name">Vacío</span>
                </div>
            </div>
            <div class="inventory-section">
                <div class="section-title">Comida</div>
                <div class="slot" id="food-slot">
                    <span class="slot-count" id="food-count">0</span>
                    <span class="slot-type">Zanahoria</span>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- CONSTANTES DE CONFIGURACIÓN ---
        const WORLD_SIZE = 100;
        const SLIME_TYPES = [
            { id: 'pink', name: 'Rosa', color: 0xff69b4 },
            { id: 'blue', name: 'Azul', color: 0x00aaff }
        ];
        const PLOT_POSITIONS = [
            { x: -15, z: -15 }, { x: 15, z: -15 },
            { x: -15, z: 15 }, { x: 15, z: 15 }
        ];

        // --- CLASE OBJETOS RECOLECTABLES (Zanahorias) ---
        class Carrot {
            constructor(position) {
                // Crear una forma de cono simple para la zanahoria
                const geometry = new THREE.CylinderGeometry(0, 0.15, 0.5, 8);
                const material = new THREE.MeshStandardMaterial({ color: 0xffa500, roughness: 0.5 }); // Naranja
                this.mesh = new THREE.Mesh(geometry, material);
                
                // Hojas verdes
                const leavesGeo = new THREE.CylinderGeometry(0.1, 0, 0.2, 4);
                const leavesMat = new THREE.MeshStandardMaterial({ color: 0x228b22 });
                const leaves = new THREE.Mesh(leavesGeo, leavesMat);
                leaves.position.y = 0.3;
                this.mesh.add(leaves);

                this.mesh.position.copy(position);
                this.mesh.position.y = 0.25; // Ajustar altura sobre el suelo
                this.mesh.rotation.x = Math.PI / 2 + (Math.random()-0.5); // Tumbada aleatoriamente
                this.mesh.castShadow = true;
                this.isFood = true; // Flag para identificación

                game.scene.add(this.mesh);
            }
        }

        // --- CLASE SLIME ---
        class Slime {
            constructor(type, position) {
                this.type = type;
                this.velocity = new THREE.Vector3(0, 0, 0);
                this.isJumping = false;
                this.inCorral = false; // Si está dentro de un rancho
                
                // Cuerpo esférico
                const geo = new THREE.SphereGeometry(0.5, 24, 16);
                const mat = new THREE.MeshStandardMaterial({ 
                    color: type.color, 
                    roughness: 0.2, 
                    transparent: true, 
                    opacity: 0.9 
                });
                this.mesh = new THREE.Mesh(geo, mat);
                this.mesh.position.copy(position);
                this.mesh.position.y = 0.5;
                this.mesh.castShadow = true;
                this.isSlime = true; // Flag para identificación
                
                // Ojos
                const eyeGeo = new THREE.SphereGeometry(0.08, 8, 8);
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
                const eyeL = new THREE.Mesh(eyeGeo, eyeMat); eyeL.position.set(0.2, 0.15, 0.4);
                const eyeR = eyeL.clone(); eyeR.position.x = -0.2;
                this.mesh.add(eyeL, eyeR);

                game.scene.add(this.mesh);
            }

            update(delta) {
                // Física básica
                this.velocity.y -= 15 * delta; // Gravedad
                this.mesh.position.addScaledVector(this.velocity, delta);

                // Colisión con suelo plano
                if (this.mesh.position.y <= 0.5) {
                    this.mesh.position.y = 0.5;
                    this.velocity.y = 0;
                    
                    // Fricción en el suelo
                    this.velocity.x *= 0.9;
                    this.velocity.z *= 0.9;
                    
                    if (this.isJumping) {
                        this.isJumping = false;
                        // Pequeño efecto de "aplastado" al aterrizar
                        this.mesh.scale.set(1.3, 0.7, 1.3);
                    }
                }

                // Recuperación de escala de animación
                this.mesh.scale.lerp(new THREE.Vector3(1, 1, 1), 10 * delta);

                // IA de movimiento (solo si no está capturado en un corral)
                if (!this.inCorral && !this.isJumping && controls.isLocked && Math.random() < 0.008) {
                    this.jump();
                }
            }

            jump(force = 1) {
                this.isJumping = true;
                this.velocity.y = (4 + Math.random() * 2) * force;
                this.velocity.x = (Math.random() - 0.5) * 6 * force;
                this.velocity.z = (Math.random() - 0.5) * 6 * force;
                this.mesh.scale.set(0.8, 1.3, 0.8); // Estirado al saltar
            }
        }

        // --- CLASE PARCELA DE CONSTRUCCIÓN ---
        class Plot {
            constructor(pos, index) {
                this.position = new THREE.Vector3(pos.x, 0, pos.z);
                this.size = 8;
                this.structure = null; // 'corral', 'garden', or null
                this.structureMesh = null;
                this.lastHarvestTime = 0;

                // Base visual de la parcela
                const geo = new THREE.PlaneGeometry(this.size, this.size);
                const mat = new THREE.MeshStandardMaterial({ color: 0x333333, side: THREE.DoubleSide });
                this.mesh = new THREE.Mesh(geo, mat);
                this.mesh.rotation.x = -Math.PI / 2;
                this.mesh.position.set(pos.x, 0.01, pos.z); // Ligeramente sobre el suelo
                this.mesh.receiveShadow = true;
                game.scene.add(this.mesh);

                // Borde visual
                const wireframe = new THREE.LineSegments(
                    new THREE.EdgesGeometry(new THREE.BoxGeometry(this.size, 0.1, this.size)),
                    new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 })
                );
                wireframe.position.set(pos.x, 0.05, pos.z);
                game.scene.add(wireframe);
            }

            build(type) {
                if (this.structure) return;
                this.structure = type;
                
                let geo, mat;
                if (type === 'corral') {
                    // Visual simple de corral: Suelo oscuro
                    geo = new THREE.BoxGeometry(this.size - 0.5, 0.2, this.size - 0.5);
                    mat = new THREE.MeshStandardMaterial({ color: 0x555555 });
                } else if (type === 'garden') {
                    // Visual simple de huerto: Tierra marrón
                    geo = new THREE.BoxGeometry(this.size - 0.5, 0.2, this.size - 0.5);
                    mat = new THREE.MeshStandardMaterial({ color: 0x8b4513 }); // Marrón tierra
                    this.lastHarvestTime = Date.now();
                }

                this.structureMesh = new THREE.Mesh(geo, mat);
                this.structureMesh.position.set(this.position.x, 0.1, this.position.z);
                this.structureMesh.receiveShadow = true;
                game.scene.add(this.structureMesh);
            }

            update() {
                // Lógica de producción del huerto
                if (this.structure === 'garden') {
                    const now = Date.now();
                    // Plantar una zanahoria cada 10 segundos si hay espacio
                    if (now - this.lastHarvestTime > 10000 && game.foods.length < 30) {
                        const spawnPos = this.position.clone();
                        spawnPos.x += (Math.random() - 0.5) * (this.size - 2);
                        spawnPos.z += (Math.random() - 0.5) * (this.size - 2);
                        game.foods.push(new Carrot(spawnPos));
                        this.lastHarvestTime = now;
                    }
                }
            }

            isPointInside(point) {
                const half = this.size / 2;
                return (point.x >= this.position.x - half && point.x <= this.position.x + half &&
                        point.z >= this.position.z - half && point.z <= this.position.z + half);
            }
        }

        // --- CLASE PRINCIPAL DEL JUEGO ---
        class Game {
            constructor() {
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.slimes = [];
                this.foods = [];
                this.plots = [];
                this.particles = [];
                this.keys = {};
                this.inventory = {
                    slime: { type: null, count: 0, max: 20 },
                    food: { count: 0, max: 30 }
                };
                this.clock = new THREE.Clock();
                this.raycaster = new THREE.Raycaster();
                this.closestPlot = null; // Parcela cerca del jugador

                this.UI = {
                    instructions: document.getElementById('instructions'),
                    buildMenu: document.getElementById('build-menu'),
                    prompt: document.getElementById('interaction-prompt'),
                    slimeCount: document.getElementById('slime-count'),
                    slimeName: document.getElementById('slime-name'),
                    foodCount: document.getElementById('food-count')
                };

                this.init();
            }

            init() {
                // Escena y Cámara
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0xa7dffc); // Cielo azul claro
                this.scene.fog = new THREE.Fog(0xa7dffc, 30, 120);

                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                
                // Renderizado
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                document.body.appendChild(this.renderer.domElement);

                // Luces
                this.scene.add(new THREE.AmbientLight(0xffffff, 0.7));
                const sun = new THREE.DirectionalLight(0xffffff, 1.2);
                sun.position.set(20, 40, 10);
                sun.castShadow = true;
                // Configurar sombras para mapa grande
                sun.shadow.camera.left = -WORLD_SIZE/2; sun.shadow.camera.right = WORLD_SIZE/2;
                sun.shadow.camera.top = WORLD_SIZE/2; sun.shadow.camera.bottom = -WORLD_SIZE/2;
                this.scene.add(sun);

                // Suelo Pradera
                const floor = new THREE.Mesh(
                    new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE),
                    new THREE.MeshStandardMaterial({ color: 0x7cfc00 }) // Verde césped
                );
                floor.rotation.x = -Math.PI / 2;
                floor.receiveShadow = true;
                this.scene.add(floor);

                // Controles
                window.controls = new PointerLockControls(this.camera, document.body);
                
                // Inicializar elementos del mundo
                PLOT_POSITIONS.forEach((pos, i) => this.plots.push(new Plot(pos, i)));
                for(let i=0; i<3; i++) this.createTree();
                for(let i=0; i<10; i++) this.spawnWildSlime();

                // Listeners
                this.setupEventListeners();
                
                // Empezar bucle
                this.animate();
            }

            setupEventListeners() {
                this.UI.instructions.addEventListener('click', () => controls.lock());
                controls.addEventListener('lock', () => this.UI.instructions.style.display = 'none');
                controls.addEventListener('unlock', () => {
                    if (this.UI.buildMenu.style.display !== 'flex') {
                        this.UI.instructions.style.display = 'flex';
                    }
                });

                window.addEventListener('keydown', (e) => {
                    this.keys[e.code] = true;
                    if (e.code === 'KeyE') this.tryInteract();
                });
                window.addEventListener('keyup', (e) => this.keys[e.code] = false);
                window.addEventListener('mousedown', (e) => this.onMouseDown(e));
                window.addEventListener('resize', () => this.onWindowResize());
            }

            createTree() {
                const x = (Math.random()-0.5) * WORLD_SIZE * 0.8;
                const z = (Math.random()-0.5) * WORLD_SIZE * 0.8;
                if (Math.abs(x) < 20 && Math.abs(z) < 20) return; // No árboles en el centro

                const trunkGeo = new THREE.CylinderGeometry(0.3, 0.6, 3);
                const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
                const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                trunk.position.set(x, 1.5, z);
                trunk.castShadow = true; trunk.receiveShadow = true;
                
                const leavesGeo = new THREE.DodecahedronGeometry(2);
                const leavesMat = new THREE.MeshStandardMaterial({ color: 0x228b22 });
                const leaves = new THREE.Mesh(leavesGeo, leavesMat);
                leaves.position.y = 2;
                trunk.add(leaves);
                this.scene.add(trunk);
            }

            spawnWildSlime() {
                const type = SLIME_TYPES[Math.floor(Math.random() * SLIME_TYPES.length)];
                const pos = new THREE.Vector3(
                    (Math.random() - 0.5) * WORLD_SIZE * 0.7,
                    5,
                    (Math.random() - 0.5) * WORLD_SIZE * 0.7
                );
                this.slimes.push(new Slime(type, pos));
            }

            // --- INTERACCIONES ---

            onMouseDown(e) {
                if (!controls.isLocked) return;

                if (e.button === 0) this.handleSuction(); // Click Izquierdo
                if (e.button === 2) this.handleShoot();   // Click Derecho
            }

            handleSuction() {
                // Raycaster desde el centro de la pantalla
                this.raycaster.setFromCamera(new THREE.Vector2(0, 0), this.camera);
                
                // Obtener todos los objetos succionables (slimes y comida)
                const slimeMeshes = this.slimes.map(s => s.mesh);
                const foodMeshes = this.foods.map(f => f.mesh);
                const targets = [...slimeMeshes, ...foodMeshes];

                const intersects = this.raycaster.intersectObjects(targets);

                if (intersects.length > 0) {
                    const hitObject = intersects[0].object;
                    const distance = intersects[0].distance;

                    if (distance < 6) { // Rango de succión
                        
                        // ¿Es un Slime?
                        if (hitObject.isSlime || (hitObject.parent && hitObject.parent.isSlime)) {
                            const actualMesh = hitObject.isSlime ? hitObject : hitObject.parent;
                            const slimeData = this.slimes.find(s => s.mesh === actualMesh);
                            
                            this.tryPickupSlime(slimeData);
                        }
                        // ¿Es comida?
                        else if (hitObject.isFood || (hitObject.parent && hitObject.parent.isFood)) {
                            const actualMesh = hitObject.isFood ? hitObject : hitObject.parent;
                            const foodData = this.foods.find(f => f.mesh === actualMesh);
                            
                            this.tryPickupFood(foodData);
                        }
                    }
                }
            }

            tryPickupSlime(slime) {
                const inv = this.inventory.slime;
                // Si inventario vacío o mismo tipo, y hay espacio
                if ((inv.count === 0 || inv.type.id === slime.type.id) && inv.count < inv.max) {
                    inv.type = slime.type;
                    inv.count++;
                    this.createParticleEffect(slime.mesh.position, slime.type.color);
                    this.scene.remove(slime.mesh);
                    this.slimes = this.slimes.filter(s => s !== slime);
                    this.updateUI();
                }
            }

            tryPickupFood(food) {
                const inv = this.inventory.food;
                if (inv.count < inv.max) {
                    inv.count++;
                    this.createParticleEffect(food.mesh.position, 0xffa500);
                    this.scene.remove(food.mesh);
                    this.foods = this.foods.filter(f => f !== food);
                    this.updateUI();
                }
            }

            handleShoot() {
                const inv = this.inventory.slime;
                if (inv.count > 0) {
                    // Posición de disparo frente a la cámara
                    const spawnPos = this.camera.position.clone();
                    const direction = new THREE.Vector3();
                    this.camera.getWorldDirection(direction);
                    spawnPos.addScaledVector(direction, 1);

                    const newSlime = new Slime(inv.type, spawnPos);
                    
                    // Comprobar si disparamos dentro de un corral existente
                    this.plots.forEach(plot => {
                        if (plot.structure === 'corral' && plot.isPointInside(newSlime.mesh.position)) {
                            newSlime.inCorral = true;
                        }
                    });

                    // Fuerza de disparo
                    newSlime.velocity.copy(direction).multiplyScalar(15);
                    newSlime.isJumping = true; // Flag para animación de físicas
                    
                    this.slimes.push(newSlime);

                    inv.count--;
                    if (inv.count === 0) inv.type = null;
                    this.updateUI();
                }
            }

            // --- SISTEMA DE CONSTRUCCIÓN ---

            checkPlotProximity() {
                this.closestPlot = null;
                this.UI.prompt.style.display = 'none';

                if (!controls.isLocked) return;

                for (let plot of this.plots) {
                    const dist = this.camera.position.distanceTo(plot.position);
                    if (dist < 6) { // Distancia para interactuar
                        this.closestPlot = plot;
                        if (!plot.structure) {
                            this.UI.prompt.innerText = "Presiona E para construir";
                        } else {
                            this.UI.prompt.innerText = plot.structure === 'corral' ? "Rancho Activo" : "Huerto Activo";
                        }
                        this.UI.prompt.style.display = 'block';
                        break;
                    }
                }
            }

            tryInteract() {
                if (controls.isLocked && this.closestPlot && !this.closestPlot.structure) {
                    controls.unlock();
                    this.UI.buildMenu.style.display = 'flex';
                }
            }

            closeBuildMenu() {
                this.UI.buildMenu.style.display = 'none';
                controls.lock();
            }

            buildOnPlot(type) {
                if (this.closestPlot) {
                    this.closestPlot.build(type);
                    this.closeBuildMenu();
                }
            }

            // --- FEEDBACK VISUAL Y UI ---

            updateUI() {
                // Actualizar Slimes
                if (this.inventory.slime.count > 0) {
                    this.UI.slimeCount.innerText = this.inventory.slime.count;
                    this.UI.slimeName.innerText = this.inventory.slime.type.name;
                    document.getElementById('slime-slot').style.borderColor = '#' + this.inventory.slime.type.color.toString(16).padStart(6, '0');
                } else {
                    this.UI.slimeCount.innerText = "0";
                    this.UI.slimeName.innerText = "Vacío";
                    document.getElementById('slime-slot').style.borderColor = '#888';
                }

                // Actualizar Comida
                this.UI.foodCount.innerText = this.inventory.food.count;
                if (this.inventory.food.count > 0) {
                     document.getElementById('food-slot').classList.add('active');
                } else {
                     document.getElementById('food-slot').classList.remove('active');
                }
            }

            createParticleEffect(pos, color) {
                for(let i=0; i<6; i++) {
                    const pGeo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
                    const pMat = new THREE.MeshBasicMaterial({ color: color });
                    const p = new THREE.Mesh(pGeo, pMat);
                    p.position.copy(pos);
                    p.userData.life = 1.0;
                    p.userData.vel = new THREE.Vector3(
                        (Math.random()-0.5)*4,
                        Math.random()*4 + 2,
                        (Math.random()-0.5)*4
                    );
                    this.scene.add(p);
                    this.particles.push(p);
                }
            }

            onWindowResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            // --- BUCLE PRINCIPAL (ANIMACIÓN) ---

            animate() {
                requestAnimationFrame(() => this.animate());
                const delta = Math.min(this.clock.getDelta(), 0.1); // Cap delta para evitar saltos físicos

                if (controls.isLocked) {
                    this.updatePlayerMovement(delta);
                    
                    // Actualizar Slimes
                    this.slimes.forEach(slime => slime.update(delta));

                    // Respawn slimes silvestres si hay pocos
                    if (this.slimes.filter(s=>!s.inCorral).length < 8 && Math.random() < 0.005) {
                        this.spawnWildSlime();
                    }

                    // Actualizar Parcelas
                    this.plots.forEach(plot => plot.update());

                    // Verificar proximidad a parcelas para el prompt de la UI
                    this.checkPlotProximity();

                    // Actualizar partículas
                    for (let i = this.particles.length - 1; i >= 0; i--) {
                        const p = this.particles[i];
                        p.position.addScaledVector(p.userData.vel, delta);
                        p.userData.vel.y -= 9.8 * delta; // gravedad partículas
                        p.userData.life -= delta * 1.5;
                        p.scale.setScalar(p.userData.life);
                        if (p.userData.life <= 0) {
                            this.scene.remove(p);
                            this.particles.splice(i, 1);
                        }
                    }
                }

                this.renderer.render(this.scene, this.camera);
            }

            updatePlayerMovement(delta) {
                const speed = 10;
                const camDir = new THREE.Vector3();
                this.camera.getWorldDirection(camDir);
                camDir.y = 0; camDir.normalize(); // Movimiento solo en XZ
                
                const camSide = new THREE.Vector3().crossVectors(this.camera.up, camDir).normalize();

                if (this.keys['KeyW']) controls.moveForward(speed * delta);
                if (this.keys['KeyS']) controls.moveForward(-speed * delta);
                if (this.keys['KeyA']) controls.moveRight(-speed * delta);
                if (this.keys['KeyD']) controls.moveRight(speed * delta);
                
                // Mantenemos la altura del jugador fija (sin saltos por ahora para simplificar)
                this.camera.position.y = 1.8;
            }
        }

        // Iniciar el juego
        const game = new Game();

    </script>
