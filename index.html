<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mini-Minecraft JS P2P</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid white; transform: translate(-50%, -50%); pointer-events: none; }
        #inventory { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; background: rgba(0,0,0,0.5); padding: 5px; }
        .slot { width: 40px; height: 40px; border: 2px solid #888; background: #333; }
        .slot.active { border-color: white; }
    </style>
</head>
<body>

<div id="crosshair"></div>
<div id="inventory">
    <div class="slot active" data-id="1"></div>
    <div class="slot" data-id="2"></div>
    <div class="slot" data-id="3"></div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// --- CONFIGURACIÓN ---
const CHUNK_SIZE = 16;
const RENDER_DISTANCE = 1; // 1 de radio = 3x3 chunks
const TEXTURE_SIZE = 16;

// --- MOTOR GRÁFICO ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
scene.add(light);

// --- LÓGICA DE MUNDO (Simplificada) ---
const chunks = new Map();

function getChunkKey(x, z) { return `${x},${z}`; }

function generateChunk(cx, cz) {
    const geometry = new THREE.BoxGeometry(1, 1, 1);
    const material = new THREE.MeshLambertMaterial({ color: Math.random() * 0xffffff });
    const group = new THREE.Group();

    for (let x = 0; x < CHUNK_SIZE; x++) {
        for (let z = 0; z < CHUNK_SIZE; z++) {
            const h = Math.floor(Math.random() * 3); // Altura simple
            for (let y = 0; y <= h; y++) {
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(cx * CHUNK_SIZE + x, y, cz * CHUNK_SIZE + z);
                group.add(mesh);
            }
        }
    }
    return group;
}

// --- BUCLE PRINCIPAL ---
function updateChunks() {
    const pCX = Math.floor(camera.position.x / CHUNK_SIZE);
    const pCZ = Math.floor(camera.position.z / CHUNK_SIZE);

    for (let x = pCX - RENDER_DISTANCE; x <= pCX + RENDER_DISTANCE; x++) {
        for (let z = pCZ - RENDER_DISTANCE; z <= pCZ + RENDER_DISTANCE; z++) {
            const key = getChunkKey(x, z);
            if (!chunks.has(key)) {
                const chunk = generateChunk(x, z);
                chunks.set(key, chunk);
                scene.add(chunk);
            }
        }
    }
}

// --- CONTROLES BÁSICOS ---
let moveForward = false, moveLeft = false, moveBackward = false, moveRight = false;
document.addEventListener('keydown', (e) => {
    if (e.code === 'KeyW') moveForward = true;
    if (e.code === 'KeyS') moveBackward = true;
    // Bloqueo de mouse para girar cámara
    if (e.code === 'Space') renderer.domElement.requestPointerLock();
});
document.addEventListener('keyup', (e) => {
    if (e.code === 'KeyW') moveForward = false;
    if (e.code === 'KeyS') moveBackward = false;
});

camera.position.y = 5;
camera.position.z = 5;

function animate() {
    requestAnimationFrame(animate);
    if (moveForward) camera.translateZ(-0.1);
    if (moveBackward) camera.translateZ(0.1);
    
    updateChunks();
    renderer.render(scene, camera);
}

// Ajuste de ventana
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();

console.log("Sistema P2P inicializado: Usa PeerJS para conectar con IDs de otros jugadores.");
</script>
</body>
</html>
