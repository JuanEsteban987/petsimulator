<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RAGDOLLS BATTLE - P2P</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --kof-red: #ed1c24; --kof-blue: #0054a6; --kof-gold: #ffc600; }
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Verdana', sans-serif; color: white; }
        #game-container { position: relative; width: 1000px; height: 600px; margin: 20px auto; outline: 6px double #444; }
        canvas { display: block; background: linear-gradient(to bottom, #1a1a2e 0%, #16213e 70%, #0f3460 100%); }
        
        /* UI Estilo Arcade */
        #ui-layer { position: absolute; top: 0; width: 100%; height: 100%; pointer-events: none; padding: 20px; box-sizing: border-box; }
        .hud-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .health-container { width: 400px; border: 3px solid #fff; background: #000; height: 35px; position: relative; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .health-bar { height: 100%; width: 100%; transition: width 0.3s ease-out; }
        #p1-bar { background: linear-gradient(to bottom, #00ff00, #008800); float: right; }
        #p2-bar { background: linear-gradient(to bottom, #00ff00, #008800); }
        .char-name { font-weight: bold; font-size: 18px; color: var(--kof-gold); text-shadow: 2px 2px #000; margin-bottom: 5px; }
        #timer { font-size: 50px; font-weight: bold; color: white; text-shadow: 3px 3px #f00; margin-top: -10px; }

        /* Networking Panel */
        #net-panel { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.9); border: 2px solid var(--kof-gold); padding: 15px; pointer-events: all; width: 300px; font-size: 12px; }
        input { background: #111; border: 1px solid var(--kof-gold); color: #0f0; padding: 5px; width: 100%; margin: 5px 0; box-sizing: border-box; }
        button { background: var(--kof-gold); border: none; padding: 8px; width: 100%; cursor: pointer; font-weight: bold; }
        #my-id-display { color: #0ff; font-weight: bold; word-break: break-all; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div class="hud-top">
            <div>
                <div class="char-name">PLAYER 1</div>
                <div class="health-container"><div id="p1-bar" class="health-bar"></div></div>
            </div>
            <div id="timer">99</div>
            <div>
                <div class="char-name" style="text-align: right;">PLAYER 2</div>
                <div class="health-container"><div id="p2-bar" class="health-bar"></div></div>
            </div>
        </div>
    </div>
    
    <div id="net-panel">
        <div style="margin-bottom: 10px;">MI ID: <span id="my-id-display">Cargando...</span></div>
        <input type="text" id="target-id" placeholder="Pegar ID del rival aquí...">
        <button onclick="connectToOpponent()">DESAFIAR RIVAL</button>
        <div id="net-status" style="margin-top: 5px; color: #aaa;">Estado: Offline</div>
    </div>
</div>

<script>
/** * RAGDOLLS BATTLE - MOTOR FÍSICO Y LÓGICA P2P
 */

const { Engine, Render, Runner, Bodies, Composite, Constraint, Body, Vector, Events } = Matter;

const engine = Engine.create();
const world = engine.world;
engine.gravity.y = 1.2; // Gravedad un poco más pesada para evitar flotación

const render = Render.create({
    element: document.getElementById('game-container'),
    engine: engine,
    options: {
        width: 1000,
        height: 600,
        wireframes: false,
        background: 'transparent'
    }
});

// --- Escenario ---
const ground = Bodies.rectangle(500, 580, 1000, 60, { 
    isStatic: true, 
    render: { fillStyle: '#333' },
    friction: 1
});
Composite.add(world, [ground, 
    Bodies.rectangle(-20, 300, 40, 600, { isStatic: true }),
    Bodies.rectangle(1020, 300, 40, 600, { isStatic: true })
]);

// --- Clase Fighter (Active Ragdoll) ---
class Fighter {
    constructor(x, y, color, isLocal) {
        this.group = Body.nextGroup(true);
        this.color = color;
        this.health = 100;
        this.isLocal = isLocal;
        this.stepPhase = 0;
        
        // Creación de huesos
        this.head = Bodies.circle(x, y - 90, 18, { collisionFilter: { group: this.group }, friction: 0.5, render: { fillStyle: color } });
        this.torso = Bodies.rectangle(x, y - 45, 35, 60, { collisionFilter: { group: this.group }, friction: 0.5, render: { fillStyle: color } });
        this.armL = Bodies.rectangle(x - 22, y - 45, 12, 45, { collisionFilter: { group: this.group }, render: { fillStyle: color } });
        this.armR = Bodies.rectangle(x + 22, y - 45, 12, 45, { collisionFilter: { group: this.group }, render: { fillStyle: color } });
        this.legL = Bodies.rectangle(x - 12, y + 10, 14, 50, { collisionFilter: { group: this.group }, friction: 0.8, render: { fillStyle: color } });
        this.legR = Bodies.rectangle(x + 12, y + 10, 14, 50, { collisionFilter: { group: this.group }, friction: 0.8, render: { fillStyle: color } });

        // Uniones
        const constraints = [
            Constraint.create({ bodyA: this.head, bodyB: this.torso, pointA: { x: 0, y: 18 }, pointB: { x: 0, y: -30 }, stiffness: 0.9, length: 2 }),
            Constraint.create({ bodyA: this.torso, bodyB: this.armL, pointA: { x: -18, y: -25 }, pointB: { x: 0, y: -20 }, stiffness: 0.5 }),
            Constraint.create({ bodyA: this.torso, bodyB: this.armR, pointA: { x: 18, y: -25 }, pointB: { x: 0, y: -20 }, stiffness: 0.5 }),
            Constraint.create({ bodyA: this.torso, bodyB: this.legL, pointA: { x: -12, y: 30 }, pointB: { x: 0, y: -25 }, stiffness: 0.7 }),
            Constraint.create({ bodyA: this.torso, bodyB: this.legR, pointA: { x: 12, y: 30 }, pointB: { x: 0, y: -25 }, stiffness: 0.7 })
        ];

        this.composite = Composite.create();
        Composite.add(this.composite, [this.head, this.torso, this.armL, this.armR, this.legL, this.legR, ...constraints]);
        Composite.add(world, this.composite);
    }

    keepUpright() {
        // Fuerza de equilibrio (Evita que se caigan)
        const targetAngle = 0;
        const torque = (targetAngle - this.torso.angle) * 0.25;
        Body.setAngularVelocity(this.torso, torque);
        
        // Mantener la cabeza sobre el torso
        const headTorque = (targetAngle - this.head.angle) * 0.1;
        Body.setAngularVelocity(this.head, headTorque);
    }

    walk(dir) {
        this.stepPhase += 0.15;
        const lift = Math.sin(this.stepPhase) * 15;
        const reach = Math.cos(this.stepPhase) * 20;

        // Mover piernas de forma alterna
        Body.applyForce(this.legL, this.legL.position, { x: (reach * dir) * 0.0005, y: -Math.abs(lift) * 0.0005 });
        Body.applyForce(this.legR, this.legR.position, { x: (-reach * dir) * 0.0005, y: -Math.abs(lift) * 0.0005 });
        
        // Empuje central
        Body.applyForce(this.torso, this.torso.position, { x: dir * 0.002, y: 0 });
    }

    attack(type) {
        const forceDir = this.isLocal ? 1 : -1;
        if (type === 'PUNCH') {
            Body.applyForce(this.armR, this.armR.position, { x: 0.06 * forceDir, y: -0.02 });
        } else if (type === 'KICK') {
            Body.applyForce(this.legR, this.legR.position, { x: 0.07 * forceDir, y: -0.04 });
        }
    }

    getSyncData() {
        return {
            h: { p: this.head.position, a: this.head.angle },
            t: { p: this.torso.position, a: this.torso.angle },
            al: { p: this.armL.position, a: this.armL.angle },
            ar: { p: this.armR.position, a: this.armR.angle },
            ll: { p: this.legL.position, a: this.legL.angle },
            lr: { p: this.legR.position, a: this.legR.angle },
            hp: this.health
        };
    }

    applySyncData(data) {
        const set = (body, d) => {
            Body.setPosition(body, d.p);
            Body.setAngle(body, d.a);
        };
        set(this.head, data.h);
        set(this.torso, data.t);
        set(this.armL, data.al);
        set(this.armR, data.ar);
        set(this.legL, data.ll);
        set(this.legR, data.lr);
        this.health = data.hp;
    }
}

// --- Inicialización de Jugadores ---
const p1 = new Fighter(250, 450, '#3498db', true);
const p2 = new Fighter(750, 450, '#e74c3c', false);

// --- Networking ---
const peer = new Peer();
let connection;

peer.on('open', id => document.getElementById('my-id-display').innerText = id);
peer.on('connection', conn => setupConnection(conn));

function connectToOpponent() {
    const targetId = document.getElementById('target-id').value;
    if (targetId) setupConnection(peer.connect(targetId));
}

function setupConnection(conn) {
    connection = conn;
    document.getElementById('net-status').innerText = "Estado: ¡COMBATIENDO!";
    document.getElementById('net-status').style.color = "#0f0";
    
    connection.on('data', data => {
        if (data.type === 'sync') p2.applySyncData(data.payload);
    });
}

// --- Input & Colisiones ---
const keys = {};
window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

Events.on(engine, 'collisionStart', (event) => {
    event.pairs.forEach(pair => {
        // Detectar si el puño/pierna de P1 toca a P2
        if (pair.bodyA.parent === p1.composite || pair.bodyB.parent === p1.composite) {
            if (pair.bodyA.parent === p2.composite || pair.bodyB.parent === p2.composite) {
                const impact = pair.collision.depth;
                if (impact > 2) p2.health -= 0.5;
            }
        }
    });
});

// --- Loop Principal ---
function update() {
    // Lógica Local
    p1.keepUpright();
    p2.keepUpright(); // El local también ayuda a que el remoto no se desplome por lag

    if (keys['KeyA']) p1.walk(-1);
    if (keys['KeyD']) p1.walk(1);
    if (keys['KeyF']) p1.attack('PUNCH');
    if (keys['KeyG']) p1.attack('KICK');

    // Sincronización P2P
    if (connection && connection.open) {
        connection.send({ type: 'sync', payload: p1.getSyncData() });
    }

    // UI
    document.getElementById('p1-bar').style.width = p1.health + '%';
    document.getElementById('p2-bar').style.width = p2.health + '%';

    Engine.update(engine);
    requestAnimationFrame(update);
}

Render.run(render);
Runner.run(Runner.create(), engine);
update();

</script>
</body>
</html>
