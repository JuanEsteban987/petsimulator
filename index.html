<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slime Rancher 3D Fix</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #000; }
        canvas { display: block; }
        
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100;
            cursor: pointer;
        }

        #hud {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 20px;
            pointer-events: none;
        }

        .slot {
            background: rgba(0,0,0,0.5);
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 10px;
            color: white;
            text-align: center;
        }

        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>SLIME RANCHER WEB</h1>
        <p>HAZ CLICK AQUÍ PARA JUGAR</p>
        <span style="font-size: 12px; opacity: 0.7;">(W,A,S,D para moverte | Click para succionar)</span>
    </div>

    <div id="hud">
        <div class="slot">Slimes: <span id="slime-count">0</span></div>
        <div class="slot">Zanahorias: <span id="carrot-count">0</span></div>
    </div>
    <div id="crosshair"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let scene, camera, renderer, controls, clock;
        let slimes = [];
        let invSlimes = 0;
        let invCarrots = 0;

        const overlay = document.getElementById('overlay');

        function init() {
            // Escena básica
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 2;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Luces
            const ambient = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 10, 7);
            scene.add(sun);

            // Suelo
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(100, 100),
                new THREE.MeshStandardMaterial({ color: 0x55aa55 })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Controles (FIX AQUÍ)
            controls = new PointerLockControls(camera, document.body);

            overlay.addEventListener('click', () => {
                controls.lock();
            });

            controls.addEventListener('lock', () => {
                overlay.style.display = 'none';
            });

            controls.addEventListener('unlock', () => {
                overlay.style.display = 'flex';
            });

            // Manejo de errores de bloqueo
            document.addEventListener('pointerlockerror', (e) => {
                console.error("Error al bloquear el puntero", e);
                alert("El navegador bloqueó el puntero. Intenta hacer click de nuevo o usa otro navegador.");
            });

            // Generar algunos slimes
            for(let i=0; i<10; i++) spawnSlime();

            // Interacción
            window.addEventListener('mousedown', (e) => {
                if (!controls.isLocked) return;
                
                if (e.button === 0) { // Click izquierdo: Succionar
                    const raycaster = new THREE.Raycaster();
                    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
                    const intersects = raycaster.intersectObjects(slimes);
                    
                    if (intersects.length > 0 && intersects[0].distance < 5) {
                        const target = intersects[0].object;
                        scene.remove(target);
                        slimes = slimes.filter(s => s !== target);
                        invSlimes++;
                        document.getElementById('slime-count').innerText = invSlimes;
                    }
                }
            });

            animate();
        }

        function spawnSlime() {
            const geo = new THREE.SphereGeometry(0.5, 16, 16);
            const mat = new THREE.MeshStandardMaterial({ color: 0xff69b4 });
            const slime = new THREE.Mesh(geo, mat);
            slime.position.set(Math.random()*20-10, 0.5, Math.random()*20-10);
            scene.add(slime);
            slimes.push(slime);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (controls.isLocked) {
                // Movimiento simple W/S
                const moveSpeed = 10 * delta;
                // Aquí podrías añadir lógica de teclado si lo deseas
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
