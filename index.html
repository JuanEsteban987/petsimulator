<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Survival RPG 2D</title>
<style>
body {
    margin: 0;
    background: #111;
    color: white;
    font-family: monospace;
}

canvas {
    display: block;
    margin: auto;
    image-rendering: pixelated;
    border: 2px solid #444;
}

#ui {
    position: absolute;
    top: 10px;
    left: 10px;
}

#inventory {
    margin-top: 10px;
}
</style>
</head>
<body>

<div id="ui">
    ❤️ Vida: <span id="hp">100</span>
    <div id="inventory">Inventario: vacío</div>
</div>

<canvas id="game" width="640" height="480"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const TILE = 16;
const SCALE = 2;

let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// PLAYER
const player = {
    x: 100,
    y: 100,
    size: 16,
    speed: 2,
    hp: 100,
    inventory: []
};

// ENEMIGOS
let enemies = [
    {x: 300, y: 200, hp: 30},
    {x: 400, y: 300, hp: 30}
];

// ITEMS
let items = [
    {x: 200, y: 150, type: "comida"},
    {x: 350, y: 250, type: "comida"}
];

// MOVIMIENTO
function movePlayer() {
    if(keys["w"]) player.y -= player.speed;
    if(keys["s"]) player.y += player.speed;
    if(keys["a"]) player.x -= player.speed;
    if(keys["d"]) player.x += player.speed;
}

// ATAQUE
function attack() {
    enemies.forEach(e => {
        let dx = player.x - e.x;
        let dy = player.y - e.y;
        let dist = Math.sqrt(dx*dx + dy*dy);

        if(dist < 25) {
            e.hp -= 10;
        }
    });
}

// IA ENEMIGOS
function updateEnemies() {
    enemies.forEach(e => {
        let dx = player.x - e.x;
        let dy = player.y - e.y;
        let dist = Math.sqrt(dx*dx + dy*dy);

        if(dist < 200) {
            e.x += dx * 0.01;
            e.y += dy * 0.01;
        }

        if(dist < 20) {
            player.hp -= 0.1;
        }
    });

    enemies = enemies.filter(e => e.hp > 0);
}

// RECOGER ITEMS
function collectItems() {
    items = items.filter(item => {
        let dx = player.x - item.x;
        let dy = player.y - item.y;
        let dist = Math.sqrt(dx*dx + dy*dy);

        if(dist < 20) {
            player.inventory.push(item.type);
            return false;
        }
        return true;
    });
}

// DIBUJAR PIXEL ART SIMPLE
function drawRect(x,y,color) {
    ctx.fillStyle = color;
    ctx.fillRect(x, y, TILE*SCALE, TILE*SCALE);
}

// RENDER
function render() {
    ctx.fillStyle = "#222";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // PLAYER
    drawRect(player.x, player.y, "lime");

    // ENEMIGOS
    enemies.forEach(e => drawRect(e.x, e.y, "red"));

    // ITEMS
    items.forEach(i => drawRect(i.x, i.y, "yellow"));
}

// UI
function updateUI() {
    document.getElementById("hp").textContent = Math.floor(player.hp);
    document.getElementById("inventory").textContent =
        "Inventario: " + (player.inventory.join(", ") || "vacío");
}

// LOOP
function gameLoop() {
    movePlayer();
    updateEnemies();
    collectItems();
    render();
    updateUI();

    requestAnimationFrame(gameLoop);
}

// INPUT ATAQUE
document.addEventListener("keydown", e => {
    if(e.key === " ") attack();
});

// INICIO
gameLoop();
</script>

</body>
</html>
