<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gmod Web Pro: Source Edition</title>
    <style>
        :root { --hl2-orange: #ff9d00; --hl2-bg: rgba(0, 0, 0, 0.6); }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Verdana', sans-serif; }
        
        /* HUD ESTILO HALF-LIFE 2 */
        #hud { position: absolute; bottom: 30px; left: 30px; display: flex; gap: 40px; pointer-events: none; }
        .stat { color: var(--hl2-orange); font-size: 42px; font-weight: bold; text-shadow: 3px 3px 0px rgba(0,0,0,0.8); }
        .stat-label { font-size: 14px; display: block; }
        
        #weapon-bucket { position: absolute; bottom: 30px; right: 30px; color: var(--hl2-orange); text-align: right; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 24px; height: 24px; border: 2px solid var(--hl2-orange); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #crosshair::after { content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: var(--hl2-orange); transform: translate(-50%, -50%); }

        /* MENÚS */
        #q-menu, #mode-menu { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70vw; height: 60vh; background: var(--hl2-bg); border: 2px solid var(--hl2-orange);
            display: none; color: white; padding: 30px; overflow-y: auto; z-index: 1000;
        }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .btn { background: #333; padding: 15px; border: 1px solid #555; cursor: pointer; text-align: center; }
        .btn:hover { background: var(--hl2-orange); color: black; }

        #mode-indicator { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="mode-indicator">MODE: SANDBOX</div>

    <div id="hud">
        <div class="stat"><span class="stat-label">HEALTH</span><span id="hp">100</span></div>
        <div class="stat"><span class="stat-label">ARMOR</span><span id="ap">0</span></div>
        <div class="stat"><span class="stat-label">AMMO</span><span>45 / 90</span></div>
    </div>

    <div id="weapon-bucket">
        <h2 id="current-weapon">PHYSICS GUN</h2>
        <div style="font-size: 12px;">[1] PhysGun [2] Gravity Gun [3] Crowbar [4] Pistol</div>
    </div>

    <div id="q-menu">
        <h2>SPAWN MENU (Q)</h2>
        <div class="grid" id="spawn-list"></div>
    </div>

    <div id="mode-menu">
        <h2>SELECT GAMEMODE (F1)</h2>
        <div class="grid">
            <div class="btn" onclick="setMode('Sandbox')">SANDBOX</div>
            <div class="btn" onclick="setMode('Combat')">COMBAT (PVP)</div>
            <div class="btn" onclick="setMode('Zombie')">ZOMBIE SURVIVAL</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <script>
    /**
     * GMOD WEB - FULL SOURCE SIMULATION
     */
    const Engine = (() => {
        let scene, camera, renderer, world, clock;
        let playerBody, playerMesh, controlsEnabled = false;
        let moveF = false, moveB = false, moveL = false, moveR = false, canJump = false;
        let physicsObjects = [], meshes = [];
        let gameMode = 'Sandbox';

        // Physics Gun
        let pickedObj = null, pickDist = 7;

        function init() {
            // 1. Escena y Cielo Azul (Gmod style)
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x71adff); // Cielo claro
            scene.fog = new THREE.Fog(0x71adff, 10, 200);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // 2. Físicas
            world = new CANNON.World();
            world.gravity.set(0, -15, 0); // Gravedad un poco más fuerte para que se sienta pesado

            setupPlayer();
            setupMap();
            setupInput();
            createSpawnList();
            animate();
        }

        function setupPlayer() {
            // Cuerpo físico del jugador (un cilindro o caja)
            const shape = new CANNON.Box(new CANNON.Vec3(0.5, 1.8, 0.5));
            playerBody = new CANNON.Body({ mass: 80, fixedRotation: true });
            playerBody.addShape(shape);
            playerBody.position.set(0, 5, 0);
            world.addBody(playerBody);

            // Colisión con el suelo para saltar
            playerBody.addEventListener("collide", (e) => {
                if(Math.abs(e.contact.ni.y) > 0.5) canJump = true;
            });
        }

        function setupMap() {
            // Suelo con grid
            const floorGeo = new THREE.PlaneGeometry(500, 500);
            const floorMat = new THREE.MeshPhongMaterial({ color: 0x444444 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI/2;
            floor.receiveShadow = true;
            scene.add(floor);

            const floorBody = new CANNON.Body({ mass: 0 });
            floorBody.addShape(new CANNON.Plane());
            floorBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2);
            world.addBody(floorBody);

            // Luz
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(20, 50, 10);
            light.castShadow = true;
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        }

        function spawn(type) {
            let shape, geo, mass = 10;
            if(type === 'Crate') {
                geo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
                shape = new CANNON.Box(new CANNON.Vec3(0.75, 0.75, 0.75));
            } else if(type === 'Barrel') {
                geo = new THREE.CylinderGeometry(0.5, 0.5, 1.5, 12);
                shape = new CANNON.Cylinder(0.5, 0.5, 1.5, 12);
            } else {
                geo = new THREE.SphereGeometry(1, 16, 16);
                shape = new CANNON.Sphere(1);
            }

            const mesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff }));
            mesh.castShadow = true;
            const body = new CANNON.Body({ mass: mass });
            body.addShape(shape);

            // Spawn frente al jugador
            const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            body.position.set(
                playerBody.position.x + forward.x * 5,
                playerBody.position.y + 2,
                playerBody.position.z + forward.z * 5
            );

            world.addBody(body);
            scene.add(mesh);
            physicsObjects.push(body);
            meshes.push(mesh);
            
            if(gameMode === 'Zombie') {
                // Si es modo zombie, los objetos rojos te atacan
                mesh.material.color.setHex(0xff0000);
            }
        }

        function setupInput() {
            document.addEventListener('keydown', e => {
                if(e.code === 'KeyQ') toggleUI('q-menu');
                if(e.code === 'F1') toggleUI('mode-menu');
                if(e.code === 'KeyW') moveF = true;
                if(e.code === 'KeyS') moveB = true;
                if(e.code === 'KeyA') moveL = true;
                if(e.code === 'KeyD') moveR = true;
                if(e.code === 'Space' && canJump) {
                    playerBody.velocity.y = 8;
                    canJump = false;
                }
            });
            document.addEventListener('keyup', e => {
                if(e.code === 'KeyW') moveF = false;
                if(e.code === 'KeyS') moveB = false;
                if(e.code === 'KeyA') moveL = false;
                if(e.code === 'KeyD') moveR = false;
            });
            
            renderer.domElement.addEventListener('mousedown', () => {
                if(!controlsEnabled) {
                    renderer.domElement.requestPointerLock();
                } else {
                    // Acción de arma (PhysGun)
                    pickedObj = raycast();
                }
            });
            document.addEventListener('mouseup', () => pickedObj = null);
            
            document.addEventListener('mousemove', (e) => {
                if(document.pointerLockElement === renderer.domElement) {
                    camera.rotation.y -= e.movementX * 0.002;
                    camera.rotation.x -= e.movementY * 0.002;
                    camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
                }
            });

            document.addEventListener('pointerlockchange', () => {
                controlsEnabled = document.pointerLockElement === renderer.domElement;
            });
        }

        function raycast() {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const intersects = ray.intersectObjects(meshes);
            if(intersects.length > 0) {
                return physicsObjects[meshes.indexOf(intersects[0].object)];
            }
            return null;
        }

        function toggleUI(id) {
            const el = document.getElementById(id);
            const isOpen = el.style.display === 'block';
            el.style.display = isOpen ? 'none' : 'block';
            if(!isOpen) document.exitPointerLock();
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            world.step(1/60);

            // 1. Movimiento del Jugador
            const speed = 15;
            const inputDir = new THREE.Vector3();
            if(moveF) inputDir.z -= 1;
            if(moveB) inputDir.z += 1;
            if(moveL) inputDir.x -= 1;
            if(moveR) inputDir.x += 1;
            inputDir.normalize();

            const vel = new THREE.Vector3(inputDir.x * speed, playerBody.velocity.y, inputDir.z * speed);
            vel.applyQuaternion(new THREE.Quaternion().setFromAxisAngle(new CANNON.Vec3(0,1,0), camera.rotation.y));
            playerBody.velocity.set(vel.x, vel.y, vel.z);

            // Sincronizar Cámara con Jugador
            camera.position.set(playerBody.position.x, playerBody.position.y + 0.8, playerBody.position.z);

            // 2. Physics Gun
            if(pickedObj) {
                const target = new THREE.Vector3(0,0, -pickDist).applyQuaternion(camera.quaternion).add(camera.position);
                pickedObj.position.lerp(new CANNON.Vec3(target.x, target.y, target.z), 0.2, pickedObj.position);
                pickedObj.velocity.set(0,0,0);
            }

            // 3. Sincronizar Objetos
            for(let i=0; i<physicsObjects.length; i++) {
                meshes[i].position.copy(physicsObjects[i].position);
                meshes[i].quaternion.copy(physicsObjects[i].quaternion);
            }

            renderer.render(scene, camera);
        }

        function createSpawnList() {
            const list = ['Crate', 'Barrel', 'Sphere', 'Npc_Zombie'];
            const container = document.getElementById('spawn-list');
            list.forEach(item => {
                const b = document.createElement('div');
                b.className = 'btn';
                b.innerText = item;
                b.onclick = () => { spawn(item); toggleUI('q-menu'); };
                container.appendChild(b);
            });
        }

        window.setMode = (m) => {
            gameMode = m;
            document.getElementById('mode-indicator').innerText = "MODE: " + m.toUpperCase();
            toggleUI('mode-menu');
            if(m === 'Zombie') alert("¡Cuidado! Los objetos ahora son hostiles.");
        };

        return { init, spawn };
    })();

    Engine.init();
    </script>
</body>
</html>
