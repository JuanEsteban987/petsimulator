<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GMod Web Sandbox</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; background:#000; }
#hud { position:absolute; top:10px; left:10px; color:#0f0; }
#menu {
  position:absolute; top:50px; left:10px;
  background:rgba(0,0,0,0.8);
  padding:10px; color:white;
}
.hidden { display:none; }
#toolbar {
  position:absolute; bottom:10px; left:50%;
  transform:translateX(-50%);
}
button { margin:3px; }
</style>
</head>

<body>

<div id="hud">FPS: <span id="fps">0</span></div>

<div id="menu" class="hidden">
  <h3>Spawn Menu</h3>
  <button onclick="spawn('box')">Caja</button>
  <button onclick="spawn('sphere')">Esfera</button>
  <button onclick="spawn('cylinder')">Cilindro</button>
</div>

<div id="toolbar">
  <button onclick="tool='move'">Mover</button>
  <button onclick="tool='rotate'">Rotar</button>
  <button onclick="tool='scale'">Escalar</button>
  <button onclick="tool='freeze'">Freeze</button>
  <button onclick="tool='physgun'">PhysGun</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

<script>
// ====== SCENE ======
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.set(0,2,5);

// luz
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444));

// suelo
let floor = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshStandardMaterial({color:0x555555})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// ====== PHYSICS ======
let world = new CANNON.World();
world.gravity.set(0,-9.82,0);

let groundBody = new CANNON.Body({ mass:0 });
groundBody.addShape(new CANNON.Plane());
groundBody.quaternion.setFromEuler(-Math.PI/2,0,0);
world.addBody(groundBody);

// ====== DATA ======
let objects = [];
let bodies = [];
let tool = "move";
let selected = null;
let physgunHold = false;

// ====== SPAWN ======
function spawn(type){
  let mesh, shape;

  if(type==="box"){
    mesh = new THREE.Mesh(
      new THREE.BoxGeometry(),
      new THREE.MeshStandardMaterial({color:Math.random()*0xffffff})
    );
    shape = new CANNON.Box(new CANNON.Vec3(0.5,0.5,0.5));
  }

  if(type==="sphere"){
    mesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.5),
      new THREE.MeshStandardMaterial({color:Math.random()*0xffffff})
    );
    shape = new CANNON.Sphere(0.5);
  }

  if(type==="cylinder"){
    mesh = new THREE.Mesh(
      new THREE.CylinderGeometry(0.5,0.5,1),
      new THREE.MeshStandardMaterial({color:Math.random()*0xffffff})
    );
    shape = new CANNON.Cylinder(0.5,0.5,1,8);
  }

  mesh.position.set(0,5,0);
  scene.add(mesh);

  let body = new CANNON.Body({ mass:1 });
  body.addShape(shape);
  body.position.copy(mesh.position);
  world.addBody(body);

  objects.push(mesh);
  bodies.push(body);
}

// ====== CONTROLES ======
let keys = {};
let velocity = new THREE.Vector3();

document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;

  if(e.key.toLowerCase()==="q")
    document.getElementById("menu").classList.toggle("hidden");
});

document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

// mouse look
document.body.addEventListener("click", ()=>{
  document.body.requestPointerLock();
});

document.addEventListener("mousemove", e=>{
  if(document.pointerLockElement === document.body){
    camera.rotation.y -= e.movementX*0.002;
    camera.rotation.x -= e.movementY*0.002;
  }
});

function movePlayer(){
  velocity.set(0,0,0);

  if(keys["w"]) velocity.z -= 0.15;
  if(keys["s"]) velocity.z += 0.15;
  if(keys["a"]) velocity.x -= 0.15;
  if(keys["d"]) velocity.x += 0.15;

  camera.translateX(velocity.x);
  camera.translateZ(velocity.z);
}

// ====== RAYCAST ======
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

document.addEventListener("mousedown", e=>{
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;

  raycaster.setFromCamera(mouse, camera);
  let hits = raycaster.intersectObjects(objects);

  if(hits.length){
    selected = hits[0].object;
    let i = objects.indexOf(selected);

    if(tool==="freeze"){
      bodies[i].mass = 0;
      bodies[i].updateMassProperties();
    }

    if(tool==="physgun"){
      physgunHold = true;
    }
  }
});

document.addEventListener("mouseup", ()=>{
  physgunHold = false;
});

// ====== PHYSGUN ======
function updatePhysgun(){
  if(!selected || !physgunHold) return;

  let i = objects.indexOf(selected);

  let dir = new THREE.Vector3();
  camera.getWorldDirection(dir);

  let target = camera.position.clone().add(dir.multiplyScalar(5));

  bodies[i].position.x += (target.x - bodies[i].position.x)*0.2;
  bodies[i].position.y += (target.y - bodies[i].position.y)*0.2;
  bodies[i].position.z += (target.z - bodies[i].position.z)*0.2;

  bodies[i].velocity.set(0,0,0);
}

// ====== FPS ======
let fpsEl = document.getElementById("fps");
let lastTime = performance.now();

// ====== LOOP ======
function animate(){
  requestAnimationFrame(animate);

  world.step(1/60);

  for(let i=0;i<objects.length;i++){
    objects[i].position.copy(bodies[i].position);
    objects[i].quaternion.copy(bodies[i].quaternion);
  }

  movePlayer();
  updatePhysgun();

  renderer.render(scene,camera);

  let now = performance.now();
  fpsEl.textContent = Math.round(1000/(now-lastTime));
  lastTime = now;
}

animate();
</script>

</body>
</html>
