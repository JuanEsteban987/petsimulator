<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totally Accurate Battle Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Roboto:wght@400;700&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Roboto', sans-serif;
        }
        
        #gameCanvas {
            display: block;
            border: 4px solid #333;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            cursor: crosshair;
        }
        
        .ui-panel {
            position: absolute;
            background: rgba(0,0,0,0.85);
            border: 3px solid #ffd700;
            border-radius: 15px;
            padding: 15px;
            color: white;
            font-family: 'Bangers', cursive;
            letter-spacing: 1px;
        }
        
        .unit-btn {
            width: 80px;
            height: 80px;
            margin: 5px;
            border: 3px solid #444;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            background: #2a2a2a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            position: relative;
            overflow: hidden;
        }
        
        .unit-btn:hover {
            transform: scale(1.1);
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        
        .unit-btn.selected {
            border-color: #00ff00;
            box-shadow: 0 0 20px rgba(0,255,0,0.5);
            background: #1a4a1a;
        }
        
        .unit-cost {
            position: absolute;
            bottom: 2px;
            right: 5px;
            font-size: 12px;
            color: #ffd700;
            font-family: 'Roboto', sans-serif;
            font-weight: bold;
        }
        
        #controls {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        #budget {
            top: 20px;
            left: 20px;
            font-size: 32px;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        .btn-action {
            padding: 15px 30px;
            font-size: 24px;
            font-family: 'Bangers', cursive;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        .btn-start {
            background: linear-gradient(45deg, #22c55e, #16a34a);
            color: white;
            box-shadow: 0 4px 0 #15803d;
        }
        
        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #15803d;
        }
        
        .btn-start:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #15803d;
        }
        
        .btn-clear {
            background: linear-gradient(45deg, #ef4444, #dc2626);
            color: white;
            box-shadow: 0 4px 0 #b91c1c;
        }
        
        #winner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-family: 'Bangers', cursive;
            text-align: center;
            display: none;
            text-shadow: 4px 4px 0 #000;
            z-index: 1000;
            animation: bounce 1s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
        }
        
        .instructions {
            top: 20px;
            right: 20px;
            max-width: 300px;
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .health-bar {
            position: absolute;
            width: 40px;
            height: 6px;
            background: red;
            border: 1px solid #000;
            transform: translateX(-50%);
        }
        
        .health-fill {
            height: 100%;
            background: #22c55e;
            transition: width 0.2s;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="budget" class="ui-panel">
        💰 <span id="money">1000</span>
    </div>
    
    <div class="ui-panel instructions">
        <h3 style="margin-top:0; color:#ffd700;">🎮 Cómo Jugar:</h3>
        <p>1. Selecciona una unidad</p>
        <p>2. Haz clic izquierdo en tu lado (izquierda) para colocarla</p>
        <p>3. Click derecho para eliminar</p>
        <p>4. Presiona INICIAR para ver la batalla caótica</p>
        <p style="color:#aaa; margin-top:10px;">Las tropas azules son tuyas, las rojas del enemigo</p>
    </div>
    
    <div id="controls" class="ui-panel">
        <div class="unit-btn selected" data-type="peasant" data-cost="10">
            👨‍🌾
            <span class="unit-cost">10$</span>
        </div>
        <div class="unit-btn" data-type="warrior" data-cost="50">
            ⚔️
            <span class="unit-cost">50$</span>
        </div>
        <div class="unit-btn" data-type="archer" data-cost="80">
            🏹
            <span class="unit-cost">80$</span>
        </div>
        <div class="unit-btn" data-type="knight" data-cost="150">
            🛡️
            <span class="unit-cost">150$</span>
        </div>
        <div class="unit-btn" data-type="giant" data-cost="300">
            👹
            <span class="unit-cost">300$</span>
        </div>
        <div class="unit-btn" data-type="mage" data-cost="200">
            🧙‍♂️
            <span class="unit-cost">200$</span>
        </div>
        
        <button class="btn-action btn-clear" onclick="clearUnits()">🗑️ Limpiar</button>
        <button class="btn-action btn-start" onclick="startBattle()">⚔️ ¡INICIAR!</button>
    </div>
    
    <div id="winner"></div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // Configuración
        let budget = 1000;
        let selectedUnit = 'peasant';
        let battleStarted = false;
        let units = [];
        let projectiles = [];
        let particles = [];
        let camera = { x: 0, y: 0, zoom: 1 };
        
        // Tipos de unidades
        const unitTypes = {
            peasant: { cost: 10, hp: 50, dmg: 10, speed: 2, range: 30, color: '#8B4513', size: 15, ragdoll: 'basic' },
            warrior: { cost: 50, hp: 150, dmg: 25, speed: 2.5, range: 35, color: '#4682B4', size: 20, ragdoll: 'basic' },
            archer: { cost: 80, hp: 80, dmg: 40, speed: 3, range: 250, color: '#228B22', size: 18, ragdoll: 'basic', ranged: true },
            knight: { cost: 150, hp: 300, dmg: 45, speed: 4, range: 40, color: '#FFD700', size: 22, ragdoll: 'heavy' },
            giant: { cost: 300, hp: 800, dmg: 100, speed: 1.5, range: 60, color: '#8B0000', size: 35, ragdoll: 'giant' },
            mage: { cost: 200, hp: 100, dmg: 60, speed: 2, range: 200, color: '#9932CC', size: 20, ragdoll: 'basic', ranged: true, splash: true }
        };
        
        // Clase Ragdoll
        class Ragdoll {
            constructor(x, y, team, type) {
                this.x = x;
                this.y = y;
                this.team = team; // 0 = jugador (azul), 1 = enemigo (rojo)
                this.type = type;
                this.stats = { ...unitTypes[type] };
                this.hp = this.stats.hp;
                this.maxHp = this.stats.hp;
                this.dead = false;
                this.vx = 0;
                this.vy = 0;
                this.target = null;
                this.attackCooldown = 0;
                this.facing = team === 0 ? 1 : -1;
                
                // Crear partes del cuerpo (física simple)
                this.parts = this.createRagdoll();
                this.limbs = [];
            }
            
            createRagdoll() {
                const size = this.stats.size;
                const parts = {
                    head: { x: this.x, y: this.y - size*1.5, r: size/2, angle: 0 },
                    torso: { x: this.x, y: this.y, w: size, h: size*1.5 },
                    armL: { x: this.x - size*0.8, y: this.y - size*0.2, w: size*0.3, h: size*1.2, angle: 0 },
                    armR: { x: this.x + size*0.8, y: this.y - size*0.2, w: size*0.3, h: size*1.2, angle: 0 },
                    legL: { x: this.x - size*0.3, y: this.y + size*1.2, w: size*0.4, h: size*1.5, angle: 0 },
                    legR: { x: this.x + size*0.3, y: this.y + size*1.2, w: size*0.4, h: size*1.5, angle: 0 }
                };
                return parts;
            }
            
            update() {
                if (this.dead) {
                    // Física de caída libre para ragdoll
                    this.vy += 0.5;
                    this.x += this.vx;
                    this.y += this.vy;
                    
                    // Rotar partes caóticamente
                    for (let part in this.parts) {
                        this.parts[part].angle += (Math.random() - 0.5) * 0.2;
                        this.parts[part].x += this.vx + (Math.random() - 0.5) * 2;
                        this.parts[part].y += this.vy + (Math.random() - 0.5) * 2;
                    }
                    
                    if (this.y > canvas.height + 100) this.cleanup = true;
                    return;
                }
                
                // IA básica
                if (!this.target || this.target.dead) {
                    this.findTarget();
                }
                
                if (this.target) {
                    const dx = this.target.x - this.x;
                    const dy = this.target.y - this.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if (dist > this.stats.range) {
                        // Mover hacia el objetivo
                        const speed = this.stats.speed * 0.5;
                        this.vx = (dx / dist) * speed;
                        this.vy = (dy / dist) * speed * 0.3; // Menos movimiento vertical
                        this.facing = this.vx > 0 ? 1 : -1;
                    } else {
                        // Atacar
                        this.vx *= 0.5;
                        this.vy *= 0.5;
                        if (this.attackCooldown <= 0) {
                            this.attack();
                            this.attackCooldown = 60;
                        }
                    }
                }
                
                // Aplicar velocidad
                this.x += this.vx;
                this.y += this.vy;
                
                // Gravedad suave
                if (this.y < canvas.height - 100) {
                    this.vy += 0.3;
                } else {
                    this.y = canvas.height - 100;
                    this.vy = 0;
                }
                
                // Fricción
                this.vx *= 0.95;
                
                // Actualizar partes del cuerpo (animación procedural)
                this.animateParts();
                
                if (this.attackCooldown > 0) this.attackCooldown--;
            }
            
            animateParts() {
                const time = Date.now() * 0.01;
                const walkCycle = Math.sin(time * this.stats.speed) * 0.3;
                
                this.parts.head.x = this.x;
                this.parts.head.y = this.y - this.stats.size * 1.5 + Math.abs(walkCycle) * 2;
                
                this.parts.torso.x = this.x;
                this.parts.torso.y = this.y;
                
                // Brazos balanceándose
                this.parts.armL.x = this.x - this.stats.size * 0.8 + walkCycle * 5;
                this.parts.armL.y = this.y - this.stats.size * 0.2;
                this.parts.armL.angle = walkCycle;
                
                this.parts.armR.x = this.x + this.stats.size * 0.8 - walkCycle * 5;
                this.parts.armR.y = this.y - this.stats.size * 0.2;
                this.parts.armR.angle = -walkCycle;
                
                // Piernas
                this.parts.legL.x = this.x - this.stats.size * 0.3 - walkCycle * 3;
                this.parts.legL.y = this.y + this.stats.size * 1.2;
                
                this.parts.legR.x = this.x + this.stats.size * 0.3 + walkCycle * 3;
                this.parts.legR.y = this.y + this.stats.size * 1.2;
            }
            
            findTarget() {
                let closest = null;
                let minDist = Infinity;
                
                for (let unit of units) {
                    if (unit.team !== this.team && !unit.dead) {
                        const dist = Math.hypot(unit.x - this.x, unit.y - this.y);
                        if (dist < minDist) {
                            minDist = dist;
                            closest = unit;
                        }
                    }
                }
                this.target = closest;
            }
            
            attack() {
                if (this.stats.ranged) {
                    // Disparar proyectil
                    projectiles.push(new Projectile(
                        this.x, 
                        this.y - this.stats.size, 
                        this.target, 
                        this.stats.dmg,
                        this.team,
                        this.stats.splash
                    ));
                } else {
                    // Ataque cuerpo a cuerpo
                    if (this.target && Math.hypot(this.target.x - this.x, this.target.y - this.y) <= this.stats.range) {
                        this.target.takeDamage(this.stats.dmg);
                        
                        // Empujón físico
                        const knockback = (this.target.x - this.x) / Math.abs(this.target.x - this.x) * 5;
                        this.target.vx += knockback;
                        this.target.vy -= 3;
                    }
                }
                
                // Efecto visual
                createParticles(this.x + this.stats.size * this.facing, this.y, 5, '#fff');
            }
            
            takeDamage(dmg) {
                this.hp -= dmg;
                
                // Sangre
                createParticles(this.x, this.y - this.stats.size, 10, '#ff0000');
                
                if (this.hp <= 0) {
                    this.die();
                }
            }
            
            die() {
                this.dead = true;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = -10;
                
                // Separar partes (efecto ragdoll)
                for (let part in this.parts) {
                    this.parts[part].vx = (Math.random() - 0.5) * 15;
                    this.parts[part].vy = -Math.random() * 10;
                }
            }
            
            draw() {
                ctx.save();
                
                // Dibujar partes
                const color = this.team === 0 ? '#4169E1' : '#DC143C';
                const baseColor = this.stats.color;
                
                // Piernas
                this.drawLimb(this.parts.legL, baseColor);
                this.drawLimb(this.parts.legR, baseColor);
                
                // Brazos
                this.drawLimb(this.parts.armL, '#ffdbac');
                this.drawLimb(this.parts.armR, '#ffdbac');
                
                // Torso
                ctx.fillStyle = this.dead ? '#666' : baseColor;
                ctx.fillRect(
                    this.parts.torso.x - this.parts.torso.w/2,
                    this.parts.torso.y - this.parts.torso.h/2,
                    this.parts.torso.w,
                    this.parts.torso.h
                );
                
                // Cabeza
                ctx.beginPath();
                ctx.arc(this.parts.head.x, this.parts.head.y, this.parts.head.r, 0, Math.PI * 2);
                ctx.fillStyle = this.dead ? '#999' : '#ffdbac';
                ctx.fill();
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // Ojos
                if (!this.dead) {
                    ctx.fillStyle = 'white';
                    ctx.fillRect(this.parts.head.x - 4 + this.facing * 2, this.parts.head.y - 2, 3, 3);
                    ctx.fillRect(this.parts.head.x + 1 + this.facing * 2, this.parts.head.y - 2, 3, 3);
                    ctx.fillStyle = 'black';
                    ctx.fillRect(this.parts.head.x - 3 + this.facing * 3, this.parts.head.y - 1, 1, 1);
                    ctx.fillRect(this.parts.head.x + 2 + this.facing * 3, this.parts.head.y - 1, 1, 1);
                }
                
                // Arma
                if (!this.dead && !this.stats.ranged) {
                    ctx.save();
                    ctx.translate(this.parts.armR.x, this.parts.armR.y);
                    ctx.rotate(this.parts.armR.angle + Math.PI/4);
                    ctx.fillStyle = '#silver';
                    ctx.fillRect(0, -5, 25, 6);
                    ctx.restore();
                }
                
                // Barra de vida
                if (!this.dead) {
                    const hpPercent = this.hp / this.maxHp;
                    ctx.fillStyle = 'red';
                    ctx.fillRect(this.x - 20, this.y - this.stats.size * 2.5, 40, 5);
                    ctx.fillStyle = '#0f0';
                    ctx.fillRect(this.x - 20, this.y - this.stats.size * 2.5, 40 * hpPercent, 5);
                }
                
                ctx.restore();
            }
            
            drawLimb(limb, color) {
                ctx.save();
                ctx.translate(limb.x, limb.y);
                ctx.rotate(limb.angle || 0);
                ctx.fillStyle = this.dead ? '#666' : color;
                ctx.fillRect(-limb.w/2, -limb.h/2, limb.w, limb.h);
                ctx.restore();
            }
        }
        
        // Proyectiles
        class Projectile {
            constructor(x, y, target, dmg, team, splash) {
                this.x = x;
                this.y = y;
                this.target = target;
                this.dmg = dmg;
                this.team = team;
                this.splash = splash;
                this.speed = 8;
                this.active = true;
                
                if (target) {
                    const dx = target.x - x;
                    const dy = target.y - y - 50;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    this.vx = (dx / dist) * this.speed;
                    this.vy = (dy / dist) * this.speed;
                } else {
                    this.vx = team === 0 ? this.speed : -this.speed;
                    this.vy = 0;
                }
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.1; // Gravedad
                
                // Colisión con unidades
                for (let unit of units) {
                    if (unit.team !== this.team && !unit.dead) {
                        const dist = Math.hypot(unit.x - this.x, unit.y - this.y);
                        if (dist < unit.stats.size + 10) {
                            this.hit(unit);
                            return;
                        }
                    }
                }
                
                // Fuera de pantalla
                if (this.x < 0 || this.x > canvas.width || this.y > canvas.height) {
                    this.active = false;
                }
            }
            
            hit(target) {
                this.active = false;
                
                if (this.splash) {
                    // Daño en área
                    createParticles(this.x, this.y, 20, '#9932CC');
                    for (let unit of units) {
                        if (unit.team !== this.team && !unit.dead) {
                            const dist = Math.hypot(unit.x - this.x, unit.y - this.y);
                            if (dist < 100) {
                                unit.takeDamage(this.dmg * (1 - dist/100));
                                unit.vx += (unit.x - this.x) * 0.1;
                                unit.vy -= 5;
                            }
                        }
                    }
                } else {
                    target.takeDamage(this.dmg);
                    target.vx += this.vx * 0.5;
                    target.vy -= 3;
                }
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = this.splash ? '#9932CC' : '#000';
                ctx.fill();
            }
        }
        
        // Partículas
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 30;
                this.color = color;
                this.size = Math.random() * 4 + 2;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.5;
                this.life--;
                this.size *= 0.95;
            }
            
            draw() {
                ctx.globalAlpha = this.life / 30;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.globalAlpha = 1;
            }
        }
        
        function createParticles(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }
        
        // Input
        document.querySelectorAll('.unit-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedUnit = btn.dataset.type;
            });
        });
        
        canvas.addEventListener('mousedown', (e) => {
            if (battleStarted) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            if (e.button === 2) {
                // Click derecho: eliminar unidad
                units = units.filter(u => {
                    if (u.team === 0 && Math.hypot(u.x - x, u.y - y) < u.stats.size) {
                        budget += u.stats.cost;
                        updateBudget();
                        return false;
                    }
                    return true;
                });
            } else {
                // Click izquierdo: colocar unidad (solo en lado izquierdo)
                if (x < canvas.width / 2 - 50) {
                    const typeData = unitTypes[selectedUnit];
                    if (budget >= typeData.cost) {
                        const unit = new Ragdoll(x, y, 0, selectedUnit);
                        units.push(unit);
                        budget -= typeData.cost;
                        updateBudget();
                        
                        // Efecto de spawn
                        createParticles(x, y, 10, '#4169E1');
                    }
                }
            }
        });
        
        canvas.addEventListener('contextmenu', e => e.preventDefault());
        
        function updateBudget() {
            document.getElementById('money').textContent = budget;
        }
        
        function clearUnits() {
            if (battleStarted) return;
            const playerUnits = units.filter(u => u.team === 0);
            playerUnits.forEach(u => {
                budget += u.stats.cost;
            });
            units = units.filter(u => u.team !== 0);
            updateBudget();
        }
        
        function startBattle() {
            if (battleStarted) return;
            battleStarted = true;
            
            // Generar ejército enemigo automáticamente (balanceado por presupuesto)
            const enemyBudget = 1000;
            let currentEnemyBudget = 0;
            const enemyTypes = Object.keys(unitTypes);
            
            while (currentEnemyBudget < enemyBudget) {
                const type = enemyTypes[Math.floor(Math.random() * enemyTypes.length)];
                const cost = unitTypes[type].cost;
                
                if (currentEnemyBudget + cost <= enemyBudget + 50) {
                    const x = canvas.width / 2 + 100 + Math.random() * (canvas.width / 2 - 150);
                    const y = 100 + Math.random() * (canvas.height - 200);
                    units.push(new Ragdoll(x, y, 1, type));
                    currentEnemyBudget += cost;
                }
            }
            
            document.getElementById('controls').style.display = 'none';
        }
        
        function checkWinner() {
            if (!battleStarted) return;
            
            const team0Alive = units.some(u => u.team === 0 && !u.dead);
            const team1Alive = units.some(u => u.team === 1 && !u.dead);
            
            if (!team0Alive || !team1Alive) {
                const winnerDiv = document.getElementById('winner');
                if (!team0Alive && !team1Alive) {
                    winnerDiv.innerHTML = '🤝 EMPATE 🤝<br><button onclick="location.reload()" style="font-size:30px; margin-top:20px; cursor:pointer;">Reintentar</button>';
                    winnerDiv.style.color = '#FFD700';
                } else if (team0Alive) {
                    winnerDiv.innerHTML = '🎉 VICTORIA 🎉<br><button onclick="location.reload()" style="font-size:30px; margin-top:20px; cursor:pointer;">Jugar de nuevo</button>';
                    winnerDiv.style.color = '#00ff00';
                } else {
                    winnerDiv.innerHTML = '💀 DERROTA 💀<br><button onclick="location.reload()" style="font-size:30px; margin-top:20px; cursor:pointer;">Reintentar</button>';
                    winnerDiv.style.color = '#ff0000';
                }
                winnerDiv.style.display = 'block';
                battleStarted = false;
            }
        }
        
        // Loop principal
        function gameLoop() {
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Suelo
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
            
            // Línea divisoria
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 4;
            ctx.setLineDash([20, 20]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Zonas
            ctx.fillStyle = 'rgba(65,105,225,0.1)';
            ctx.fillRect(0, 0, canvas.width / 2 - 50, canvas.height);
            ctx.fillStyle = 'rgba(220,20,60,0.1)';
            ctx.fillRect(canvas.width / 2 + 50, 0, canvas.width / 2 - 50, canvas.height);
            
            // Textos de zona
            if (!battleStarted) {
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('TU ZONA', canvas.width / 4, 100);
                ctx.fillText('ENEMIGO', canvas.width * 3 / 4, 100);
            }
            
            // Actualizar y dibujar unidades
            units = units.filter(u => !u.cleanup);
            units.forEach(unit => {
                unit.update();
                unit.draw();
            });
            
            // Proyectiles
            projectiles = projectiles.filter(p => p.active);
            projectiles.forEach(p => {
                p.update();
                p.draw();
            });
            
            // Partículas
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            checkWinner();
            
            requestAnimationFrame(gameLoop);
        }
        
        // Redimensionar
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        gameLoop();
    </script>
</body>
</html>
