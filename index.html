<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro RPG 2.5D - Prototype</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; background: #000; }
        #ui { position: absolute; bottom: 20px; left: 20px; color: white; pointer-events: none; }
        #hp-bar-container { width: 300px; height: 25px; background: #440000; border: 3px solid #fff; }
        #hp-bar-fill { width: 100%; height: 100%; background: #ff0000; transition: width 0.3s; }
        #instructions { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                        color: white; text-align: center; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="instructions">
        <h1>RETRO QUEST 2.5D</h1>
        <p>WASD: Mover | RATÓN: Girar Cámara | CLICK: Atacar</p>
        <p>Haz clic para empezar</p>
    </div>

    <div id="ui">
        <div>JUGADOR HP</div>
        <div id="hp-bar-container"><div id="hp-bar-fill"></div></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. GENERACIÓN DE TEXTURAS (PROCEDURAL) ---
        function createTexture(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');

            if (type === 'player') {
                // Pixel Art: Caballero Azul
                ctx.fillStyle = '#1a237e'; ctx.fillRect(16, 16, 32, 32); // Cuerpo
                ctx.fillStyle = '#90caf9'; ctx.fillRect(20, 20, 24, 8);  // Visor
                ctx.fillStyle = '#5c6bc0'; ctx.fillRect(12, 32, 40, 10); // Hombros
                ctx.fillStyle = '#000'; ctx.fillRect(24, 24, 4, 4); ctx.fillRect(36, 24, 4, 4); // Ojos
            } 
            else if (type === 'orc') {
                // Pixel Art: Orco Verde
                ctx.fillStyle = '#2e7d32'; ctx.fillRect(16, 16, 32, 32); // Cara
                ctx.fillStyle = '#fdd835'; ctx.fillRect(20, 24, 6, 6); ctx.fillRect(38, 24, 6, 6); // Ojos
                ctx.fillStyle = '#1b5e20'; ctx.fillRect(10, 20, 10, 20); ctx.fillRect(44, 20, 10, 20); // Orejas
                ctx.fillStyle = '#fff'; ctx.fillRect(24, 40, 4, 6); ctx.fillRect(36, 40, 4, 6); // Colmillos
            } 
            else if (type === 'grass') {
                // Patrón de césped
                ctx.fillStyle = '#2d5a27'; ctx.fillRect(0, 0, 64, 64);
                for(let i=0; i<40; i++) {
                    ctx.fillStyle = Math.random() > 0.5 ? '#388e3c' : '#1b5e20';
                    ctx.fillRect(Math.random()*64, Math.random()*64, 4, 4);
                }
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.NearestFilter; // Mantiene el look Pixel Art
            texture.minFilter = THREE.NearestFilter;
            return texture;
        }

        // --- 2. CONFIGURACIÓN DE LA ESCENA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Cielo azul
        scene.fog = new THREE.Fog(0x87ceeb, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 1);
        scene.add(ambientLight);

        // --- 3. CREACIÓN DEL MUNDO ---
        // Suelo
        const grassTex = createTexture('grass');
        grassTex.wrapS = grassTex.wrapT = THREE.RepeatWrapping;
        grassTex.repeat.set(20, 20);
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshBasicMaterial({ map: grassTex }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Jugador (Sprite)
        const playerMaterial = new THREE.SpriteMaterial({ map: createTexture('player') });
        const player = new THREE.Sprite(playerMaterial);
        player.scale.set(2, 2, 1);
        player.position.y = 1;
        scene.add(player);

        // Enemigos
        const enemies = [];
        const orcMaterial = new THREE.SpriteMaterial({ map: createTexture('orc') });
        for(let i=0; i<5; i++) {
            const orc = new THREE.Sprite(orcMaterial);
            orc.scale.set(2, 2, 1);
            orc.position.set(Math.random()*30 - 15, 1, Math.random()*30 - 15);
            orc.userData = { hp: 100, id: i };
            scene.add(orc);
            enemies.push(orc);
        }

        // --- 4. CONTROLES Y CÁMARA ---
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let yaw = 0, pitch = -0.5;
        const keys = {};

        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        // Pointer Lock
        renderer.domElement.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
            document.getElementById('instructions').style.display = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement) {
                yaw -= e.movementX * 0.003;
                pitch -= e.movementY * 0.003;
                pitch = Math.max(-Math.PI/3, Math.min(0, pitch)); // Limitar rotación vertical
            }
        });

        // --- 5. LÓGICA DE COMBATE ---
        window.addEventListener('mousedown', (e) => {
            if (e.button === 0 && document.pointerLockElement === renderer.domElement) {
                attack();
            }
        });

        function attack() {
            enemies.forEach((enemy, index) => {
                const dist = player.position.distanceTo(enemy.position);
                if (dist < 3) { // Rango de ataque
                    enemy.userData.hp -= 40;
                    enemy.material.color.set(0xff0000); // Feedback visual
                    setTimeout(() => enemy.material.color.set(0xffffff), 100);
                    
                    if (enemy.userData.hp <= 0) {
                        scene.remove(enemy);
                        enemies.splice(index, 1);
                    }
                }
            });
        }

        // --- 6. BUCLE DE ANIMACIÓN ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const speed = 10 * delta;

            // Movimiento basado en la rotación de la cámara
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), yaw));
            const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0, 1, 0), dir).negate();

            if (keys['KeyW']) player.position.addScaledVector(dir, speed);
            if (keys['KeyS']) player.position.addScaledVector(dir, -speed);
            if (keys['KeyA']) player.position.addScaledVector(side, -speed);
            if (keys['KeyD']) player.position.addScaledVector(side, speed);

            // La cámara sigue al jugador
            const camOffset = new THREE.Vector3(0, 0, 8).applyEuler(new THREE.Euler(pitch, yaw, 0));
            camera.position.copy(player.position).add(camOffset);
            camera.lookAt(player.position);

            renderer.render(scene, camera);
        }
        animate();

        // Ajuste de ventana
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
