<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mini Slime Rancher 3D</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px black; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Mini Slime Rancher</h1>
        <p>WASD para mover | Clic para Capturar | Esc para salir</p>
    </div>
    <div id="crosshair"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- Configuración Escena ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Cielo azul
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- Luces ---
        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
        scene.add(light);

        // --- Suelo (El Rancho) ---
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshLambertMaterial({ color: 0x7cfc00 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- El Slime (Pink Slime) ---
        const slimes = [];
        function createSlime(x, z) {
            const slimeGroup = new THREE.Group();
            
            // Cuerpo
            const bodyGeo = new THREE.SphereGeometry(0.5, 32, 32);
            const bodyMat = new THREE.MeshPhongMaterial({ color: 0xff69b4, transparent: true, opacity: 0.9 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            slimeGroup.add(body);

            // Ojos
            const eyeGeo = new THREE.SphereGeometry(0.05, 16, 16);
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const eyeL = eyeMat.clone();
            const eye1 = new THREE.Mesh(eyeGeo, eyeL);
            eye1.position.set(0.2, 0.2, 0.4);
            const eye2 = new THREE.Mesh(eyeGeo, eyeL);
            eye2.position.set(-0.2, 0.2, 0.4);
            slimeGroup.add(eye1, eye2);

            slimeGroup.position.set(x, 0.5, z);
            scene.add(slimeGroup);
            slimes.push(slimeGroup);
        }

        // Crear unos cuantos slimes
        for(let i=0; i<10; i++) {
            createSlime(Math.random()*20-10, Math.random()*20-10);
        }

        // --- Controles ---
        const controls = new PointerLockControls(camera, document.body);
        document.addEventListener('click', () => {
            if (!controls.isLocked) {
                controls.lock();
            } else {
                // Mecánica de succión
                checkVacPack();
            }
        });

        // Movimiento
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        const onKeyDown = (e) => {
            if(e.code === 'KeyW') moveForward = true;
            if(e.code === 'KeyS') moveBackward = true;
            if(e.code === 'KeyA') moveLeft = true;
            if(e.code === 'KeyD') moveRight = true;
        };
        const onKeyUp = (e) => {
            if(e.code === 'KeyW') moveForward = false;
            if(e.code === 'KeyS') moveBackward = false;
            if(e.code === 'KeyA') moveLeft = false;
            if(e.code === 'KeyD') moveRight = false;
        };
        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        // --- Lógica de Succión (Raycasting) ---
        const raycaster = new THREE.Raycaster();
        function checkVacPack() {
            // El rayo sale del centro de la pantalla
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const intersects = raycaster.intersectObjects(slimes, true);
            
            if (intersects.length > 0) {
                const target = intersects[0].object.parent; // El grupo del slime
                if(intersects[0].distance < 5) { // Solo si está cerca
                    scene.remove(target);
                    const index = slimes.indexOf(target);
                    if (index > -1) slimes.splice(index, 1);
                    console.log("¡Slime capturado!");
                }
            }
        }

        // --- Bucle de Animación ---
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                // Suavizado de movimiento
                velocity.x -= velocity.x * 10.0 * 0.016;
                velocity.z -= velocity.z * 10.0 * 0.016;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * 0.016;
                if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * 0.016;

                controls.moveRight(-velocity.x * 0.016);
                controls.moveForward(-velocity.z * 0.016);
            }

            // Animación simple de rebote para los slimes
            const time = Date.now() * 0.005;
            slimes.forEach(s => {
                s.position.y = 0.5 + Math.abs(Math.sin(time + s.position.x)) * 0.3;
                s.scale.y = 1 - Math.abs(Math.sin(time + s.position.x)) * 0.2;
            });

            renderer.render(scene, camera);
        }

        camera.position.y = 1.6; // Altura de los ojos
        animate();

        // Ajuste de ventana
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
