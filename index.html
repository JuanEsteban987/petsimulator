<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JS-CRAFT: ULTIMATE P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; }
        canvas { display: block; }
        
        /* UI HUD */
        #hud { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; background: rgba(0,0,0,0.5); padding: 5px; border: 3px solid #333; pointer-events: none; }
        .slot { width: 40px; height: 40px; border: 2px solid #555; background: #8b8b8b; display: flex; justify-content: center; align-items: center; color: white; position: relative; font-size: 20px; }
        .slot.active { border-color: #fff; box-shadow: 0 0 10px #fff; background: #aaa; }
        .count { position: absolute; bottom: 0; right: 2px; font-size: 10px; text-shadow: 1px 1px #000; }

        /* MULTIPLAYER */
        #mp-menu { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #0f0; padding: 10px; border: 2px solid #333; font-size: 12px; z-index: 100; }
        
        /* INVENTARIO / CRAFTEO */
        #inv-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #c6c6c6; border: 4px solid #333; padding: 20px; display: none; flex-direction: column; align-items: center; z-index: 200; }
        .craft-grid { display: grid; grid-template-columns: repeat(2, 45px); gap: 5px; margin-bottom: 10px; }

        /* MOBILE CONTROLS */
        #mobile-ui { position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; }
        #stick { width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; position: absolute; top: 35px; left: 35px; }
        #action-btns { position: absolute; bottom: 30px; right: 30px; display: none; gap: 10px; }
        .btn { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 12px; user-select: none; }

        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; pointer-events: none; opacity: 0.5; }
    </style>
</head>
<body>

<div id="mp-menu">
    ID: <span id="my-id">...</span><br>
    <input type="text" id="peer-id" placeholder="ID Amigo" style="width:100px; font-size:10px">
    <button onclick="connectToPeer()" style="font-size:10px">CONECTAR</button>
</div>

<div id="crosshair">+</div>

<div id="inv-overlay">
    <h3 style="margin:0 0 10px 0">INVENTARIO / CRAFTEO</h3>
    <div class="craft-grid">
        <div class="slot"></div><div class="slot"></div>
        <div class="slot"></div><div class="slot"></div>
    </div>
    <div id="full-inv" style="display:grid; grid-template-columns:repeat(9, 45px); gap:5px"></div>
</div>

<div id="hud"></div>

<div id="mobile-ui"><div id="stick"></div></div>
<div id="action-btns">
    <div class="btn" id="btn-jump">SALTAR</div>
    <div class="btn" id="btn-action">ACCION</div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js';

// --- CONFIG ---
const world = new Map();
const players = new Map();
const inventory = Array(9).fill(null).map((_, i) => ({ type: i === 0 ? 'grass' : (i===1 ? 'wood' : null), count: 64 }));
let selectedSlot = 0;
let isInvOpen = false;
const isMobile = 'ontouchstart' in window;

// --- MOTOR ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new PointerLockControls(camera, document.body);
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const sun = new THREE.DirectionalLight(0xffffff, 0.5);
sun.position.set(10, 20, 10);
scene.add(sun);

// Texturas Pixel-Art 8x8 Generativas
function createTex(c1, c2) {
    const canvas = document.createElement('canvas');
    canvas.width = 8; canvas.height = 8;
    const ctx = canvas.getContext('2d');
    for(let x=0; x<8; x++) for(let y=0; y<8; y++) {
        ctx.fillStyle = Math.random() > 0.5 ? c1 : c2;
        ctx.fillRect(x,y,1,1);
    }
    const t = new THREE.CanvasTexture(canvas);
    t.magFilter = THREE.NearestFilter;
    return new THREE.MeshLambertMaterial({ map: t });
}

const mats = {
    grass: createTex('#5d994d', '#4a7a3d'),
    dirt: createTex('#795548', '#60443a'),
    stone: createTex('#888', '#777'),
    wood: createTex('#5d4037', '#453028'),
    leaves: createTex('#3d6e35', '#2d5027')
};
const icons = { grass:'🌿', dirt:'🟫', stone:'🧱', wood:'🪵', leaves:'🍃' };

// --- LOGICA DE BLOQUES ---
const geo = new THREE.BoxGeometry(1, 1, 1);
function setBlock(x, y, z, type, send = true) {
    const key = `${x},${y},${z}`;
    if (world.has(key)) return;
    const m = new THREE.Mesh(geo, mats[type]);
    m.position.set(x, y, z);
    m.name = type;
    scene.add(m);
    world.set(key, m);
    if (send && peerConn) peerConn.send({ t: 'b_place', x, y, z, type });
}

// Generar terreno
for(let x=-12; x<12; x++) for(let z=-12; z<12; z++) {
    const h = Math.floor(Math.sin(x/5)*2 + Math.cos(z/5)*2);
    for(let y=-3; y<=h; y++) {
        setBlock(x, y, z, y === h ? 'grass' : 'dirt', false);
    }
}

// --- FISICA Y COLISIONES ---
let vel = new THREE.Vector3(), canJump = false;
let move = { f:0, b:0, l:0, r:0 };

function checkCol(pos) {
    return world.has(`${Math.round(pos.x)},${Math.round(pos.y)},${Math.round(pos.z)}`);
}

function updatePhysics(dt) {
    if (!controls.isLocked && !isMobile) return;

    vel.y -= 20 * dt; // Gravedad
    const nextY = camera.position.clone().add(new THREE.Vector3(0, vel.y * dt, 0));
    
    // Colisión Vertical
    if (checkCol({x: nextY.x, y: nextY.y - 1.6, z: nextY.z})) {
        vel.y = 0; canJump = true;
    } else {
        camera.position.y = nextY.y;
    }

    // Movimiento Horizontal
    const dir = new THREE.Vector3();
    dir.z = move.f - move.b;
    dir.x = move.r - move.l;
    dir.normalize();

    const speed = 5 * dt;
    const oldP = camera.position.clone();
    
    controls.moveRight(dir.x * speed);
    if (checkCol({x: camera.position.x, y: camera.position.y - 1, z: camera.position.z})) camera.position.x = oldP.x;
    
    controls.moveForward(dir.z * speed);
    if (checkCol({x: camera.position.x, y: camera.position.y - 1, z: camera.position.z})) camera.position.z = oldP.z;
}

// --- MULTIPLAYER (PEERJS) ---
const peer = new Peer();
let peerConn;
peer.on('open', id => document.getElementById('my-id').innerText = id);
peer.on('connection', c => setupPeer(c));

window.connectToPeer = () => setupPeer(peer.connect(document.getElementById('peer-id').value));

function setupPeer(c) {
    peerConn = c;
    c.on('data', data => {
        if (data.t === 'm') {
            if(!players.has(data.id)) {
                const m = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.8, 0.6), mats.stone);
                scene.add(m); players.set(data.id, m);
            }
            players.get(data.id).position.set(data.x, data.y - 0.8, data.z);
        }
        if (data.t === 'b_place') setBlock(data.x, data.y, data.z, data.type, false);
        if (data.t === 'b_break') {
            const k = `${data.x},${data.y},${data.z}`;
            if(world.has(k)) { scene.remove(world.get(k)); world.delete(k); }
        }
    });
}

// --- INTERACCION ---
function interact(isBreak) {
    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(0,0), camera);
    const intersects = ray.intersectObjects(scene.children);

    if (intersects.length > 0) {
        const obj = intersects[0].object;
        const p = obj.position;
        if (isBreak) {
            scene.remove(obj); world.delete(`${p.x},${p.y},${p.z}`);
            if(peerConn) peerConn.send({ t:'b_break', x:p.x, y:p.y, z:p.z });
        } else {
            const n = obj.position.clone().add(intersects[0].face.normal);
            // Evitar poner bloque dentro del jugador
            const pX = Math.round(camera.position.x), pZ = Math.round(camera.position.z);
            if(n.x === pX && n.z === pZ && (n.y === Math.round(camera.position.y) || n.y === Math.round(camera.position.y-1))) return;
            
            const slot = inventory[selectedSlot];
            if(slot.type && slot.count > 0) {
                setBlock(n.x, n.y, n.z, slot.type);
                slot.count--; if(slot.count <= 0) slot.type = null;
                updateUI();
            }
        }
    }
}

// --- UI / INPUTS ---
const hud = document.getElementById('hud');
function updateUI() {
    hud.innerHTML = inventory.map((s, i) => `
        <div class="slot ${i === selectedSlot ? 'active' : ''}">
            ${s.type ? icons[s.type] : ''}
            <span class="count">${s.count || ''}</span>
        </div>`).join('');
}

window.onkeydown = (e) => {
    if(e.code === 'KeyE') {
        isInvOpen = !isInvOpen;
        document.getElementById('inv-overlay').style.display = isInvOpen ? 'flex' : 'none';
        if(isInvOpen) controls.unlock(); else controls.lock();
    }
    if(isInvOpen) return;
    if(e.code === 'KeyW') move.f = 1; if(e.code === 'KeyS') move.b = 1;
    if(e.code === 'KeyA') move.l = 1; if(e.code === 'KeyD') move.r = 1;
    if(e.code === 'Space' && canJump) { vel.y = 7; canJump = false; }
    if(e.key >= 1 && e.key <= 9) { selectedSlot = e.key - 1; updateUI(); }
};
window.onkeyup = (e) => {
    if(e.code === 'KeyW') move.f = 0; if(e.code === 'KeyS') move.b = 0;
    if(e.code === 'KeyA') move.l = 0; if(e.code === 'KeyD') move.r = 0;
};
window.onmousedown = (e) => { if(controls.isLocked) interact(e.button === 0); };
window.onwheel = (e) => { selectedSlot = (selectedSlot + (e.deltaY > 0 ? 1 : -1) + 9) % 9; updateUI(); };

// --- MOBILE LOGIC ---
if(isMobile) {
    document.getElementById('mobile-ui').style.display = 'block';
    document.getElementById('action-btns').style.display = 'flex';
    document.getElementById('btn-jump').ontouchstart = () => { if(canJump) vel.y = 7; canJump = false; };
    document.getElementById('btn-action').ontouchstart = () => interact(false);
    
    let touchStart = null;
    window.ontouchstart = (e) => touchStart = { x: e.touches[0].pageX, y: e.touches[0].pageY };
    window.ontouchmove = (e) => {
        if(!touchStart) return;
        const dx = e.touches[0].pageX - touchStart.x;
        const dy = e.touches[0].pageY - touchStart.y;
        camera.rotation.y -= dx * 0.005;
        camera.rotation.x -= dy * 0.005;
        touchStart = { x: e.touches[0].pageX, y: e.touches[0].pageY };
    };
}

// --- LOOP ---
let last = performance.now();
function loop() {
    requestAnimationFrame(loop);
    const now = performance.now();
    const dt = Math.min((now - last) / 1000, 0.1);
    updatePhysics(dt);
    
    if(peerConn && now % 100 < 20) {
        peerConn.send({ t:'m', id:peer.id, x:camera.position.x, y:camera.position.y, z:camera.position.z });
    }
    
    renderer.render(scene, camera);
    last = now;
}

document.body.onclick = () => { if(!isInvOpen && !isMobile) controls.lock(); };
updateUI();
camera.position.set(0, 10, 0);
loop();
</script>
</body>
</html>
