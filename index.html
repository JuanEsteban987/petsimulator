<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebPhys Sandbox - GMod Clone</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; border: 2px solid white;
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; mix-blend-mode: difference;
        }
        #ui-overlay {
            position: absolute; bottom: 20px; left: 20px;
            color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;
        }
        #q-menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 600px; height: 400px; background: rgba(20, 20, 20, 0.9);
            border: 2px solid #555; display: none; color: white; padding: 20px;
            grid-template-columns: 1fr 3fr; gap: 15px;
        }
        .spawn-item {
            background: #444; padding: 10px; text-align: center; cursor: pointer; border-radius: 4px;
        }
        .spawn-item:hover { background: #666; }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="ui-overlay">WASD: Mover | Espacio: Salto | Clic: Physics Gun | Q: Menu</div>
    
    <div id="q-menu">
        <div id="categories">
            <h3>Categorías</h3>
            <div style="color: cyan;">Props</div>
            <div>NPCs</div>
            <div>Herramientas</div>
        </div>
        <div id="items" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
            <div class="spawn-item" onclick="spawnProp('box')">Caja</div>
            <div class="spawn-item" onclick="spawnProp('sphere')">Esfera</div>
            <div class="spawn-item" onclick="spawnProp('wall')">Pared</div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/+esm"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import * as CANNON from 'cannon-es';

        // --- 1. CONFIGURACIÓN DEL MOTOR DE FÍSICAS ---
        class PhysicsEngine {
            constructor() {
                this.world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.82, 0) });
                this.world.allowSleep = true; // Optimización de rendimiento
                this.meshes = [];
                this.bodies = [];
            }

            update() {
                this.world.fixedStep();
                for (let i = 0; i < this.meshes.length; i++) {
                    this.meshes[i].position.copy(this.bodies[i].position);
                    this.meshes[i].quaternion.copy(this.bodies[i].quaternion);
                }
            }
        }

        // --- 2. CONFIGURACIÓN DE LA ESCENA ---
        class SceneSetup {
            constructor() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x87ceeb); // Cielo básico
                
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                document.body.appendChild(this.renderer.domElement);

                const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
                this.scene.add(ambientLight);

                const sun = new THREE.DirectionalLight(0xffffff, 1);
                sun.position.set(10, 20, 10);
                sun.castShadow = true;
                this.scene.add(sun);

                // Flatgrass Floor
                const grid = new THREE.GridHelper(100, 100, 0x000000, 0x000000);
                grid.material.opacity = 0.2;
                grid.material.transparent = true;
                this.scene.add(grid);
            }
        }

        // --- 3. CONTROLADOR DEL JUGADOR ---
        class PlayerController {
            constructor(scene, camera, physics) {
                this.controls = new PointerLockControls(camera, document.body);
                this.physics = physics;
                this.velocity = new THREE.Vector3();
                this.direction = new THREE.Vector3();
                this.canJump = false;

                // Hitbox del jugador (Cilindro/Caja invisible)
                this.body = new CANNON.Body({
                    mass: 70,
                    shape: new CANNON.Sphere(1.5),
                    position: new CANNON.Vec3(0, 2, 0),
                    fixedRotation: true
                });
                physics.world.addBody(this.body);

                document.addEventListener('click', () => {
                    if (!this.controls.isLocked && qMenu.style.display !== 'grid') this.controls.lock();
                });
            }

            update(delta, keys) {
                if (!this.controls.isLocked) return;

                // Sincronizar cámara con cuerpo físico
                const pos = this.body.position;
                this.controls.getObject().position.set(pos.x, pos.y + 1, pos.z);

                this.direction.z = Number(keys.w) - Number(keys.s);
                this.direction.x = Number(keys.d) - Number(keys.a);
                this.direction.normalize();

                const speed = 150.0;
                if (keys.w || keys.s) this.body.velocity.z = -this.direction.z * speed * delta * Math.cos(this.controls.getObject().rotation.y);
                if (keys.a || keys.d) this.body.velocity.x = this.direction.x * speed * delta * Math.cos(this.controls.getObject().rotation.y);
            }
        }

        // --- 4. PHYSICS GUN (EL CORAZÓN) ---
        class PhysicsGun {
            constructor(scene, camera, physics) {
                this.scene = scene;
                this.camera = camera;
                this.physics = physics;
                this.raycaster = new THREE.Raycaster();
                this.pickedObject = null;
                this.distance = 5;
                
                // Visual del láser
                const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
                this.laser = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x00ffff }));
                this.laser.visible = false;
                this.scene.add(this.laser);
            }

            pick() {
                this.raycaster.setFromCamera(new THREE.Vector2(0,0), this.camera);
                const intersects = this.raycaster.intersectObjects(this.physics.meshes);
                
                if (intersects.length > 0) {
                    this.pickedObject = intersects[0].object;
                    const index = this.physics.meshes.indexOf(this.pickedObject);
                    this.pickedBody = this.physics.bodies[index];
                    this.pickedBody.mass = 0; // "Congelar" mientras se levanta
                    this.pickedBody.updateMassProperties();
                    this.laser.visible = true;
                }
            }

            release() {
                if (this.pickedBody) {
                    this.pickedBody.mass = 5;
                    this.pickedBody.updateMassProperties();
                }
                this.pickedObject = null;
                this.pickedBody = null;
                this.laser.visible = false;
            }

            update() {
                if (this.pickedObject && this.pickedBody) {
                    const targetPos = new THREE.Vector3();
                    this.camera.getWorldDirection(targetPos);
                    targetPos.multiplyScalar(this.distance).add(this.camera.position);
                    
                    this.pickedBody.position.copy(targetPos);
                    this.pickedBody.velocity.set(0,0,0);

                    // Actualizar láser
                    const positions = this.laser.geometry.attributes.position.array;
                    positions[0] = this.camera.position.x; positions[1] = this.camera.position.y - 0.5; positions[2] = this.camera.position.z;
                    positions[3] = targetPos.x; positions[4] = targetPos.y; positions[5] = targetPos.z;
                    this.laser.geometry.attributes.position.needsUpdate = true;
                }
            }
        }

        // --- INICIALIZACIÓN ---
        const game = new SceneSetup();
        const physics = new PhysicsEngine();
        const player = new PlayerController(game.scene, game.camera, physics);
        const physGun = new PhysicsGun(game.scene, game.camera, physics);

        // Suelo físico
        const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
        groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
        physics.world.addBody(groundBody);

        // Input
        const keys = { w: false, a: false, s: false, d: false };
        const qMenu = document.getElementById('q-menu');

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true;
            if (e.key.toLowerCase() === 'q') {
                qMenu.style.display = 'grid';
                player.controls.unlock();
            }
        });
        window.addEventListener('keyup', (e) => {
            if (e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false;
            if (e.key.toLowerCase() === 'q') qMenu.style.display = 'none';
        });

        window.addEventListener('mousedown', () => physGun.pick());
        window.addEventListener('mouseup', () => physGun.release());

        // Función global para spawn (conectada al UI)
        window.spawnProp = (type) => {
            let shape, mesh;
            const pos = new THREE.Vector3();
            game.camera.getWorldDirection(pos);
            pos.multiplyScalar(5).add(game.camera.position);

            if (type === 'box' || type === 'wall') {
                const size = type === 'box' ? [1,1,1] : [3,3,0.5];
                shape = new CANNON.Box(new CANNON.Vec3(size[0]/2, size[1]/2, size[2]/2));
                mesh = new THREE.Mesh(new THREE.BoxGeometry(...size), new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff }));
            } else {
                shape = new CANNON.Sphere(0.7);
                mesh = new THREE.Mesh(new THREE.SphereGeometry(0.7), new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff }));
            }

            const body = new CANNON.Body({ mass: 5, shape: shape, position: new CANNON.Vec3(pos.x, pos.y, pos.z) });
            mesh.castShadow = true;
            
            physics.world.addBody(body);
            game.scene.add(mesh);
            physics.meshes.push(mesh);
            physics.bodies.push(body);
        };

        // Loop principal
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            physics.update();
            player.update(delta, keys);
            physGun.update();
            game.renderer.render(game.scene, game.camera);
        }
        animate();
    </script>
</body>
</html>
