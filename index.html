<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JS-Craft: Multiplayer P2P & Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; }
        canvas { display: block; }

        /* UI HUD */
        #hud { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: rgba(0,0,0,0.7); padding: 10px; border: 4px solid #333; pointer-events: none; z-index: 10; }
        .slot { width: 45px; height: 45px; border: 3px solid #555; background: #8b8b8b; display: flex; justify-content: center; align-items: center; color: white; position: relative; }
        .slot.active { border-color: #fff; box-shadow: 0 0 10px #fff; }
        .count { position: absolute; bottom: 2px; right: 5px; font-size: 12px; }
        
        /* MULTIPLAYER UI */
        #multiplayer-ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); color: #0f0; padding: 10px; border: 2px solid #333; font-size: 12px; z-index: 20; }
        input { background: #222; border: 1px solid #555; color: white; padding: 5px; width: 120px; }
        button { cursor: pointer; background: #444; color: white; border: 1px solid #777; padding: 5px; }

        /* MOBILE CONTROLS */
        #mobile-controls { position: absolute; bottom: 20px; left: 20px; width: 150px; height: 150px; display: none; z-index: 30; }
        #joystick { width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; position: relative; }
        #stick { width: 40px; height: 40px; background: white; border-radius: 50%; position: absolute; top: 30px; left: 30px; }
        #action-buttons { position: absolute; bottom: 20px; right: 20px; display: none; flex-direction: column; gap: 10px; z-index: 30; }
        .btn-mobile { width: 60px; height: 60px; background: rgba(255,255,255,0.3); border-radius: 50%; color: white; font-weight: bold; display: flex; justify-content: center; align-items: center; user-select: none; }

        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 20px; pointer-events: none; }
    </style>
</head>
<body>

<div id="multiplayer-ui">
    Mi ID: <span id="my-id">...</span><br>
    <input type="text" id="peer-id-input" placeholder="ID del amigo">
    <button id="connect-btn">Conectar</button>
</div>

<div id="crosshair">+</div>

<div id="hud"></div>

<div id="mobile-controls">
    <div id="joystick"><div id="stick"></div></div>
</div>

<div id="action-buttons">
    <div class="btn-mobile" id="btn-jump">JUMP</div>
    <div class="btn-mobile" id="btn-place">ADD</div>
</div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "peerjs": "https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"
    } }
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js';
import Peer from 'peerjs';

// --- CONFIG & ESTADO ---
const world = new Map();
const players = new Map(); // Otros jugadores en P2P
let myPeer, conn;
const inventory = Array(9).fill(null).map((_, i) => ({ type: i === 0 ? 'grass' : null, count: i === 0 ? 64 : 0 }));
let selectedSlot = 0;
const isMobile = /Android|iPhone/i.test(navigator.userAgent);

// --- MOTOR GRÁFICO ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new PointerLockControls(camera, document.body);
scene.add(new THREE.AmbientLight(0xffffff, 0.8));

// Texturas Pixeladas
function getMat(color) {
    const canvas = document.createElement('canvas');
    canvas.width = 8; canvas.height = 8;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = color; ctx.fillRect(0,0,8,8);
    for(let i=0; i<10; i++) { ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.2})`; ctx.fillRect(Math.random()*8, Math.random()*8, 1, 1); }
    const tex = new THREE.CanvasTexture(canvas);
    tex.magFilter = THREE.NearestFilter;
    return new THREE.MeshLambertMaterial({ map: tex });
}

const mats = { grass: getMat('#5d994d'), dirt: getMat('#795548'), stone: getMat('#888'), wood: getMat('#5d4037') };
const boxGeo = new THREE.BoxGeometry(1, 1, 1);

function setBlock(x, y, z, type, broadcast = true) {
    const key = `${Math.round(x)},${Math.round(y)},${Math.round(z)}`;
    if (world.has(key)) return;
    const mesh = new THREE.Mesh(boxGeo, mats[type]);
    mesh.position.set(Math.round(x), Math.round(y), Math.round(z));
    mesh.name = type;
    scene.add(mesh);
    world.set(key, mesh);
    if (broadcast && conn) conn.send({ action: 'place', x, y, z, type });
}

// Generar Terreno inicial
for(let x=-10; x<10; x++) {
    for(let z=-10; z<10; z++) {
        setBlock(x, 0, z, 'grass', false);
        setBlock(x, -1, z, 'dirt', false);
    }
}

// --- COLISIONES SÓLIDAS ---
function isSolid(x, y, z) {
    return world.has(`${Math.round(x)},${Math.round(y)},${Math.round(z)}`);
}

function checkCollisions(pos, vel, delta) {
    const nextPos = pos.clone().add(vel.clone().multiplyScalar(delta));
    // Colisión en X
    if (isSolid(nextPos.x + (vel.x > 0 ? 0.3 : -0.3), pos.y - 1.5, pos.z)) vel.x = 0;
    // Colisión en Z
    if (isSolid(pos.x, pos.y - 1.5, nextPos.z + (vel.z > 0 ? 0.3 : -0.3))) vel.z = 0;
    // Colisión en Y (Suelo/Techo)
    if (isSolid(pos.x, nextPos.y - 1.6, pos.z)) { vel.y = 0; canJump = true; } 
    else { vel.y -= 15 * delta; } // Gravedad
}

// --- MULTIPLAYER P2P (PeerJS) ---
myPeer = new Peer();
myPeer.on('open', id => document.getElementById('my-id').innerText = id);
myPeer.on('connection', c => setupConn(c));

document.getElementById('connect-btn').onclick = () => {
    const id = document.getElementById('peer-id-input').value;
    setupConn(myPeer.connect(id));
};

function setupConn(c) {
    conn = c;
    conn.on('data', data => {
        if (data.action === 'move') updateRemotePlayer(data);
        if (data.action === 'place') setBlock(data.x, data.y, data.z, data.type, false);
        if (data.action === 'break') {
            const key = `${data.x},${data.y},${data.z}`;
            if(world.has(key)) { scene.remove(world.get(key)); world.delete(key); }
        }
    });
}

function updateRemotePlayer(data) {
    if (!players.has(data.id)) {
        const p = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.8, 0.6), getMat('#f00'));
        scene.add(p);
        players.set(data.id, p);
    }
    players.get(data.id).position.set(data.x, data.y - 0.9, data.z);
}

// --- INPUTS & MOBILE ---
let keys = {}, canJump = false, velocity = new THREE.Vector3();
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

if (isMobile) {
    document.getElementById('mobile-controls').style.display = 'block';
    document.getElementById('action-buttons').style.display = 'flex';
    // Lógica básica de Touch para rotación omitida por brevedad, usa touchmove
}

// --- INTERACCIÓN ---
function performAction(type) {
    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(0,0), camera);
    const intersects = ray.intersectObjects(scene.children);
    if (intersects.length > 0) {
        const obj = intersects[0].object;
        if (type === 'break') {
            const p = obj.position;
            if (conn) conn.send({ action: 'break', x: p.x, y: p.y, z: p.z });
            scene.remove(obj);
            world.delete(`${p.x},${p.y},${p.z}`);
        } else {
            const pos = obj.position.clone().add(intersects[0].face.normal);
            // VALIDACIÓN: No poner bloque sobre el jugador
            const pX = Math.round(camera.position.x), pZ = Math.round(camera.position.z);
            if (pos.x === pX && pos.z === pZ && (pos.y === Math.round(camera.position.y) || pos.y === Math.round(camera.position.y-1))) return;
            setBlock(pos.x, pos.y, pos.z, inventory[selectedSlot].type);
        }
    }
}

document.addEventListener('mousedown', (e) => {
    if (!controls.isLocked && !isMobile) return;
    performAction(e.button === 0 ? 'break' : 'place');
});

// --- LOOP PRINCIPAL ---
let lastTime = performance.now();
function animate() {
    requestAnimationFrame(animate);
    const time = performance.now();
    const delta = Math.min((time - lastTime) / 1000, 0.1);

    if (controls.isLocked || isMobile) {
        const moveVel = new THREE.Vector3();
        if (keys['KeyW']) moveVel.z += 5;
        if (keys['KeyS']) moveVel.z -= 5;
        if (keys['KeyA']) moveVel.x -= 5;
        if (keys['KeyD']) moveVel.x += 5;

        checkCollisions(camera.position, velocity, delta);
        
        controls.moveRight(moveVel.x * delta);
        controls.moveForward(moveVel.z * delta);
        camera.position.y += velocity.y * delta;

        if (keys['Space'] && canJump) { velocity.y = 6; canJump = false; }

        if (conn && time % 100 < 20) { // Sync cada 100ms aprox
            conn.send({ action: 'move', id: myPeer.id, x: camera.position.x, y: camera.position.y, z: camera.position.z });
        }
    }
    
    renderer.render(scene, camera);
    lastTime = time;
}

// UI Inventory
const hud = document.getElementById('hud');
function drawInv() {
    hud.innerHTML = inventory.map((s, i) => `
        <div class="slot ${i === selectedSlot ? 'active' : ''}">
            ${s.type ? (s.type === 'grass' ? '🌿' : '🟫') : ''}
            <span class="count">${s.count || ''}</span>
        </div>`).join('');
}

drawInv();
camera.position.set(0, 5, 0);
document.body.onclick = () => { if(!isMobile) controls.lock(); };
animate();

</script>
</body>
</html>
