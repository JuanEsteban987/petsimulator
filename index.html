<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korblox: Slime Rancher Ultimate</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif; background-color: #050505; }
        canvas { display: block; }
        
        /* --- UI PRINCIPAL --- */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            user-select: none;
        }

        .money-display {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: #ffd700;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 28px;
            border: 3px solid #ffd700;
            pointer-events: auto;
        }

        /* --- SISTEMA DE INVENTARIO (4 SLOTS) --- */
        #hotbar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            pointer-events: auto;
        }

        .slot {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border: 4px solid #555;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
            transition: all 0.2s;
        }

        .slot.active {
            border-color: #00fbff;
            background: rgba(0, 251, 255, 0.2);
            transform: scale(1.1);
            box-shadow: 0 0 15px #00fbff;
        }

        .slot-count {
            position: absolute;
            bottom: 5px;
            right: 8px;
            font-size: 18px;
            font-weight: bold;
        }

        .slot-icon { font-size: 24px; }
        .slot-label { font-size: 10px; text-transform: uppercase; margin-top: 5px; }

        /* --- MENÚ DE CONSTRUCCIÓN --- */
        #build-menu {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1e90ff, #00bfff);
            padding: 30px;
            border-radius: 20px;
            border: 6px solid white;
            display: none;
            pointer-events: auto;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            z-index: 200;
        }

        .btn-build {
            background: white;
            color: #1e90ff;
            border: none;
            padding: 15px 30px;
            margin: 10px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            transition: 0.2s;
        }
        .btn-build:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 30px; height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* OVERLAY INICIAL SOLAMENTE */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000; cursor: pointer;
            color: white;
        }
    </style>
</head>
<body>

    <div id="start-screen" onclick="initGame()">
        <h1 style="font-size: 60px; color: #ff69b4; margin-bottom: 10px;">KORBLOX</h1>
        <h2 style="font-size: 24px;">SLIME RANCHER PROTOTYPE</h2>
        <p>Haz clic para comenzar</p>
    </div>

    <div id="ui-layer">
        <div class="money-display">$<span id="money-val">250</span></div>
        
        <div id="crosshair"></div>

        <div id="hotbar">
            <div class="slot active" id="slot-0">
                <span class="slot-icon">🌀</span>
                <span class="slot-label">Vacio</span>
                <span class="slot-count" id="cnt-0">0</span>
            </div>
            <div class="slot" id="slot-1">
                <span class="slot-icon">🌀</span>
                <span class="slot-label">Vacio</span>
                <span class="slot-count" id="cnt-1">0</span>
            </div>
            <div class="slot" id="slot-2">
                <span class="slot-icon">🌀</span>
                <span class="slot-label">Vacio</span>
                <span class="slot-count" id="cnt-2">0</span>
            </div>
            <div class="slot" id="slot-3">
                <span class="slot-icon">🌀</span>
                <span class="slot-label">Vacio</span>
                <span class="slot-count" id="cnt-3">0</span>
            </div>
        </div>

        <div id="build-menu">
            <h2 style="color: white; margin-bottom: 20px;">¿Qué quieres construir?</h2>
            <button class="btn-build" onclick="handleBuild('corral')">CORRAL ($100)</button>
            <button class="btn-build" onclick="handleBuild('farm')">GRANJA ($50)</button>
            <br>
            <button class="btn-build" style="background:#ff4757; color:white; font-size: 14px;" onclick="closeBuildMenu()">CANCELAR</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- CONFIGURACIÓN DE ESCENA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x74b9ff);
        scene.fog = new THREE.Fog(0x74b9ff, 30, 120);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- LUCES ---
        const ambient = new THREE.HemisphereLight(0xffffff, 0x080820, 1.2);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(10, 20, 10);
        sun.castShadow = true;
        scene.add(sun);

        // --- MUNDO Y MAPA ---
        const floorGeo = new THREE.PlaneGeometry(300, 300);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x55efc4 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Paredes Decorativas
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x636e72 });
        function createMound(x, z, s) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(s, s*2, s), wallMat);
            m.position.set(x, -s/2, z);
            scene.add(m);
        }
        for(let i=0; i<20; i++) createMound((Math.random()-0.5)*150, (Math.random()-0.5)*150, 10+Math.random()*20);

        // --- SISTEMA DE INVENTARIO LOGICO ---
        let money = 250;
        let activeSlotIndex = 0;
        const inventory = [
            { type: null, count: 0, icon: "🌀" },
            { type: null, count: 0, icon: "🌀" },
            { type: null, count: 0, icon: "🌀" },
            { type: null, count: 0, icon: "🌀" }
        ];

        const itemData = {
            "slime": { icon: "😊", label: "Pink Slime" },
            "food": { icon: "🥕", label: "Zanahoria" },
            "plort": { icon: "💎", label: "Plort" }
        };

        function addToInventory(type) {
            // Intentar sumar a un slot existente del mismo tipo
            for (let i = 0; i < 4; i++) {
                if (inventory[i].type === type && inventory[i].count < 20) {
                    inventory[i].count++;
                    updateUI();
                    return true;
                }
            }
            // Si no, buscar slot vacío
            for (let i = 0; i < 4; i++) {
                if (inventory[i].type === null) {
                    inventory[i].type = type;
                    inventory[i].count = 1;
                    inventory[i].icon = itemData[type].icon;
                    updateUI();
                    return true;
                }
            }
            return false;
        }

        function updateUI() {
            document.getElementById('money-val').innerText = money;
            for (let i = 0; i < 4; i++) {
                const slotEl = document.getElementById(`slot-${i}`);
                const countEl = document.getElementById(`cnt-${i}`);
                const iconEl = slotEl.querySelector('.slot-icon');
                const labelEl = slotEl.querySelector('.slot-label');

                slotEl.classList.toggle('active', i === activeSlotIndex);
                countEl.innerText = inventory[i].count > 0 ? inventory[i].count : "";
                iconEl.innerText = inventory[i].count > 0 ? inventory[i].icon : "🌀";
                labelEl.innerText = inventory[i].count > 0 ? itemData[inventory[i].type].label : "Vacio";
            }
        }

        // --- PARCELAS Y CONSTRUCCIÓN ---
        const plots = [];
        const plotPos = [
            {x: 15, z: 15}, {x: -15, z: 15}, {x: 15, z: -15}, {x: -15, z: -15},
            {x: 30, z: 0}, {x: -30, z: 0}, {x: 0, z: 30}, {x: 0, z: -30}
        ];

        plotPos.forEach(p => {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(10, 0.5, 10), new THREE.MeshStandardMaterial({color: 0x2d3436}));
            mesh.position.set(p.x, 0.25, p.z);
            scene.add(mesh);
            plots.push({ mesh, type: 'empty', structure: null });
        });

        let currentPlotInRange = null;

        // --- CLASES ---
        class Slime {
            constructor(pos, color = 0xff748c) {
                this.group = new THREE.Group();
                const body = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 16), new THREE.MeshStandardMaterial({color}));
                body.castShadow = true;
                this.group.add(body);
                this.group.position.copy(pos);
                this.group.position.y = 0.6;
                scene.add(this.group);
                this.vel = new THREE.Vector3();
                this.nextJump = 0;
                this.inCorral = null;
            }
            update(delta) {
                if (this.group.position.y > 0.6) this.vel.y -= 18 * delta;
                else {
                    this.group.position.y = 0.6;
                    this.vel.y = 0;
                    this.vel.x *= 0.9; this.vel.z *= 0.9;
                }
                if (this.group.position.y <= 0.6 && Date.now() > this.nextJump) {
                    this.vel.y = 6;
                    this.vel.x = (Math.random()-0.5)*10;
                    this.vel.z = (Math.random()-0.5)*10;
                    this.nextJump = Date.now() + 2000 + Math.random()*3000;
                }
                // Limite corral
                if (this.inCorral) {
                    const dX = this.group.position.x - this.inCorral.mesh.position.x;
                    const dZ = this.group.position.z - this.inCorral.mesh.position.z;
                    if(Math.abs(dX) > 4.5) { this.vel.x *= -1; this.group.position.x = this.inCorral.mesh.position.x + Math.sign(dX)*4.4; }
                    if(Math.abs(dZ) > 4.5) { this.vel.z *= -1; this.group.position.z = this.inCorral.mesh.position.z + Math.sign(dZ)*4.4; }
                }
                this.group.position.add(this.vel.clone().multiplyScalar(delta));
            }
        }

        class Carrot {
            constructor(pos) {
                this.mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0, 0.6), new THREE.MeshStandardMaterial({color: 0xff7f50}));
                this.mesh.position.copy(pos);
                this.mesh.position.y = 0.3;
                this.type = "food";
                scene.add(this.mesh);
            }
        }

        class Plort {
            constructor(pos) {
                this.mesh = new THREE.Mesh(new THREE.OctahedronGeometry(0.25), new THREE.MeshStandardMaterial({color: 0xff748c, emissive: 0xff748c}));
                this.mesh.position.copy(pos);
                this.mesh.position.y = 0.5;
                this.type = "plort";
                scene.add(this.mesh);
            }
        }

        const slimes = [];
        const items = [];

        // --- CONTROLES ---
        const controls = new PointerLockControls(camera, document.body);
        const keys = {};

        window.initGame = () => {
            controls.lock();
            document.getElementById('start-screen').style.display = 'none';
        };

        // Arreglo del error: Solo se abre el menú si hay una parcela cerca, no al azar al desbloquear
        controls.addEventListener('unlock', () => {
            if (!currentPlotInRange) {
                // Si se desbloqueó por ESC, no hacemos nada especial, el start-screen no vuelve.
            }
        });

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.key >= 1 && e.key <= 4) {
                activeSlotIndex = parseInt(e.key) - 1;
                updateUI();
            }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        let isSucking = false;
        window.addEventListener('mousedown', (e) => {
            if (!controls.isLocked) return;
            if (e.button === 0) isSucking = true;
            if (e.button === 2) fireVacpack();
        });
        window.addEventListener('mouseup', () => isSucking = false);

        function fireVacpack() {
            const slot = inventory[activeSlotIndex];
            if (slot.count <= 0) return;

            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            const p = camera.position.clone().add(dir.clone().multiplyScalar(2));

            if (slot.type === "slime") {
                const s = new Slime(p);
                s.vel.copy(dir.multiplyScalar(20));
                slimes.push(s);
            } else if (slot.type === "food") {
                const c = new Carrot(p);
                items.push(c);
            } else if (slot.type === "plort") {
                money += 30; // Venta rápida
            }

            slot.count--;
            if (slot.count <= 0) { slot.type = null; slot.icon = "🌀"; }
            updateUI();
        }

        // --- LÓGICA DE CONSTRUCCIÓN ---
        window.handleBuild = (type) => {
            if (!currentPlotInRange) return;
            const cost = type === 'corral' ? 100 : 50;
            if (money < cost) return alert("¡No tienes suficiente dinero!");

            money -= cost;
            currentPlotInRange.type = type;
            
            const visualGeo = type === 'corral' ? new THREE.BoxGeometry(10, 5, 10) : new THREE.PlaneGeometry(9, 9);
            const visualMat = new THREE.MeshStandardMaterial({
                color: type === 'corral' ? 0x00d2ff : 0x78e08f, 
                wireframe: type === 'corral',
                transparent: true, opacity: 0.5
            });
            const mesh = new THREE.Mesh(visualGeo, visualMat);
            mesh.position.set(currentPlotInRange.mesh.position.x, type==='corral' ? 2.5 : 0.3, currentPlotInRange.mesh.position.z);
            if(type==='farm') {
                mesh.rotation.x = -Math.PI/2;
                setInterval(() => {
                    const c = new Carrot(mesh.position.clone().add(new THREE.Vector3((Math.random()-0.5)*6, 0, (Math.random()-0.5)*6)));
                    items.push(c);
                }, 8000);
            }
            scene.add(mesh);
            currentPlotInRange.structure = mesh;
            
            closeBuildMenu();
        };

        window.closeBuildMenu = () => {
            document.getElementById('build-menu').style.display = 'none';
            currentPlotInRange = null;
            controls.lock();
        };

        // --- BUCLE ---
        for(let i=0; i<8; i++) slimes.push(new Slime(new THREE.Vector3((Math.random()-0.5)*40, 1, (Math.random()-0.5)*40)));
        const clock = new THREE.Clock();
        camera.position.set(0, 2, 5);

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (controls.isLocked) {
                const moveSpeed = 12 * delta;
                if(keys['KeyW']) controls.moveForward(moveSpeed);
                if(keys['KeyS']) controls.moveForward(-moveSpeed);
                if(keys['KeyA']) controls.moveRight(-moveSpeed);
                if(keys['KeyD']) controls.moveRight(moveSpeed);

                // Detección de parcelas
                plots.forEach(p => {
                    if (p.type === 'empty' && camera.position.distanceTo(p.mesh.position) < 6) {
                        currentPlotInRange = p;
                        controls.unlock();
                        document.getElementById('build-menu').style.display = 'block';
                    }
                });
            }

            // Slimes
            slimes.forEach((s, idx) => {
                s.update(delta);
                // Detección de corral
                plots.forEach(p => {
                    if (p.type === 'corral' && s.group.position.distanceTo(p.mesh.position) < 5) s.inCorral = p;
                });

                if (isSucking && s.group.position.distanceTo(camera.position) < 10) {
                    s.group.position.lerp(camera.position, 0.1);
                    if (s.group.position.distanceTo(camera.position) < 1.5) {
                        if (addToInventory("slime")) {
                            scene.remove(s.group);
                            slimes.splice(idx, 1);
                        }
                    }
                }

                // Comer
                items.forEach((it, iIdx) => {
                    if (it.type === "food" && s.group.position.distanceTo(it.mesh.position) < 1.5) {
                        scene.remove(it.mesh);
                        items.splice(iIdx, 1);
                        items.push(new Plort(s.group.position.clone()));
                    }
                });
            });

            // Items (Comida / Plorts)
            items.forEach((it, idx) => {
                if (isSucking && it.mesh.position.distanceTo(camera.position) < 10) {
                    it.mesh.position.lerp(camera.position, 0.1);
                    if (it.mesh.position.distanceTo(camera.position) < 1.5) {
                        if (addToInventory(it.type)) {
                            scene.remove(it.mesh);
                            items.splice(idx, 1);
                        }
                    }
                }
            });

            renderer.render(scene, camera);
        }
        animate();
        updateUI();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
