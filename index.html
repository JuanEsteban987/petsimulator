<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RPG 3D - Estilo WoW</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }

        /* UI de Pantalla */
        #gui {
            position: absolute; top: 10px; left: 10px;
            color: white; background: rgba(0,0,0,0.6);
            padding: 15px; border-radius: 5px; pointer-events: none;
        }

        /* Inventario */
        #inventory {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px; background: rgba(40, 40, 40, 0.9);
            border: 3px solid #8b5a2b; border-radius: 10px;
            display: none; padding: 20px; color: white;
            box-shadow: 0 0 20px black;
        }
        .inv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .slot { 
            width: 80px; height: 80px; background: #222; 
            border: 1px solid #555; display: flex; 
            align-items: center; justify-content: center; font-size: 12px;
            cursor: pointer;
        }
        .slot:hover { background: #444; border-color: gold; }

        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 4px; height: 4px; background: white;
            border-radius: 50%; transform: translate(-50%, -50%);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="crosshair"></div>
    
    <div id="gui">
        <b>Acciones:</b> WASD para mover | Click Derecho: Girar Cámara<br>
        <b>E:</b> Abrir Mochila | <b>ID P2P:</b> <span id="my-id">Generando...</span>
    </div>

    <div id="inventory">
        <h3 style="text-align:center; margin-top:0;">Mochila</h3>
        <div class="inv-grid">
            <div class="slot" onclick="selectItem('Espada')">⚔️ Espada</div>
            <div class="slot" onclick="selectItem('Arco')">🏹 Arco</div>
            <div class="slot" onclick="selectItem('Poción Roja')">🧪 P. Vida</div>
            <div class="slot" onclick="selectItem('Poción Azul')">🧪 P. Maná</div>
            <div class="slot">Vacio</div>
            <div class="slot">Vacio</div>
        </div>
        <p id="inv-msg" style="font-size: 12px; color: gold; text-align: center;"></p>
    </div>

    <script>
        // --- CONFIGURACIÓN ESCENA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa0d8ef);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040, 1.5));

        // --- TERRENO ---
        const floorGeo = new THREE.PlaneGeometry(500, 500, 20, 20);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x3d6e3d, wireframe: false });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- CASTILLO (Simple) ---
        function createCastle() {
            const castleGroup = new THREE.Group();
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x808080 });
            
            // Murallas
            const box = new THREE.Mesh(new THREE.BoxGeometry(20, 8, 20), wallMat);
            box.position.y = 4;
            castleGroup.add(box);

            // Torres
            const towerGeo = new THREE.CylinderGeometry(2, 2, 12, 8);
            const corners = [[10,10], [-10,10], [10,-10], [-10,-10]];
            corners.forEach(p => {
                const tower = new THREE.Mesh(towerGeo, wallMat);
                tower.position.set(p[0], 6, p[1]);
                castleGroup.add(tower);
            });

            castleGroup.position.set(0, 0, -50);
            scene.add(castleGroup);
        }
        createCastle();

        // --- JUGADOR ---
        const player = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0x2222ff}));
        body.position.y = 1;
        player.add(body);
        scene.add(player);

        // --- LÓGICA DE CÁMARA Y CONTROLES ---
        let isRightClick = false;
        let camAzimuth = 0; // Rotación horizontal
        let camElevation = 0.5; // Rotación vertical
        let camDistance = 8;

        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'KeyE') toggleInventory();
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        // Bloquear menú contextual para usar click derecho
        window.addEventListener('contextmenu', e => e.preventDefault());

        window.addEventListener('mousedown', (e) => { if(e.button === 2) isRightClick = true; });
        window.addEventListener('mouseup', (e) => { if(e.button === 2) isRightClick = false; });
        
        window.addEventListener('mousemove', (e) => {
            if (isRightClick) {
                camAzimuth -= e.movementX * 0.005;
                camElevation += e.movementY * 0.005;
                camElevation = Math.max(0.1, Math.min(Math.PI/2 - 0.1, camElevation));
            }
        });

        // --- INVENTARIO ---
        const invPanel = document.getElementById('inventory');
        function toggleInventory() {
            const isVisible = invPanel.style.display === 'block';
            invPanel.style.display = isVisible ? 'none' : 'block';
        }

        function selectItem(item) {
            document.getElementById('inv-msg').innerText = "Has equipado: " + item;
            if(item === 'Arco') body.material.color.set(0xffaa00);
            if(item === 'Espada') body.material.color.set(0xff0000);
        }

        // --- LOOP DE ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);

            // Movimiento basado en la cámara
            const speed = 0.2;
            if (keys['KeyW']) {
                player.position.x -= Math.sin(camAzimuth) * speed;
                player.position.z -= Math.cos(camAzimuth) * speed;
                player.rotation.y = camAzimuth; // El jugador mira hacia donde corre
            }
            if (keys['KeyS']) {
                player.position.x += Math.sin(camAzimuth) * speed;
                player.position.z += Math.cos(camAzimuth) * speed;
            }

            // Actualizar posición de cámara (Orbital)
            camera.position.x = player.position.x + camDistance * Math.sin(camAzimuth) * Math.cos(camElevation);
            camera.position.z = player.position.z + camDistance * Math.cos(camAzimuth) * Math.cos(camElevation);
            camera.position.y = player.position.y + camDistance * Math.sin(camElevation);
            
            camera.lookAt(player.position.x, player.position.y + 1, player.position.z);

            renderer.render(scene, camera);
        }

        animate();

        // Ajuste de ventana
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
