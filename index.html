<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-Craft Pro MVP</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }

        /* UI HUD */
        #ui-hud {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 24px; font-weight: bold;
        }
        #hotbar {
            align-self: center; margin-bottom: 20px; display: flex;
            background: rgba(0,0,0,0.6); padding: 5px; border: 3px solid #333;
        }
        .slot {
            width: 50px; height: 50px; border: 2px solid #555; margin: 2px;
            background-size: cover; image-rendering: pixelated;
        }
        .slot.active { border-color: white; box-shadow: inset 0 0 10px #fff; }

        /* MENU INVENTARIO */
        #inventory-menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #c6c6c6; border: 4px solid #333; display: none; padding: 20px;
            grid-template-columns: repeat(9, 50px); gap: 5px; z-index: 100;
        }
        #instructions {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            color: white; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; cursor: pointer; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="instructions">
        <h1>JS-CRAFT EXPERT</h1>
        <p>CLIC PARA EMPEZAR</p>
        <p>(W,A,S,D: Mover | Espacio: Saltar | E: Inventario | Clic: Romper/Poner)</p>
    </div>

    <div id="ui-hud">
        <div id="crosshair">+</div>
        <div id="hotbar">
            <div class="slot active" data-id="1"></div>
            <div class="slot" data-id="2"></div>
            <div class="slot" data-id="3"></div>
        </div>
    </div>

    <div id="inventory-menu">
        </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js';

        // --- CONFIGURACIÓN Y ESTADO ---
        const worldSize = 32; // Tamaño del "chunk" inicial
        const blocks = new Map();
        let inventoryOpen = false;

        // --- ESCENA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x7fbfff);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- ILUMINACIÓN ---
        const light = new THREE.HemisphereLight(0xeeeeff, 0x777788, 1.5);
        scene.add(light);

        // --- MOTOR FÍSICO Y CONTROLES ---
        const controls = new PointerLockControls(camera, document.body);
        const instructions = document.getElementById('instructions');
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        let velocity = new THREE.Vector3();

        instructions.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => instructions.style.display = 'none');
        controls.addEventListener('unlock', () => { if(!inventoryOpen) instructions.style.display = 'flex'; });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyE') toggleInventory();
            if (inventoryOpen) return;
            switch(e.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyD': moveRight = true; break;
                case 'Space': if(canJump) velocity.y += 5; canJump = false; break;
            }
        });

        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyD': moveRight = false; break;
            }
        });

        // --- GENERACIÓN DE MUNDO (Optimizado) ---
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        const grassMat = new THREE.MeshLambertMaterial({ color: 0x4caf50 });
        const dirtMat = new THREE.MeshLambertMaterial({ color: 0x8b4513 });

        function addBlock(x, y, z, type = 'grass') {
            const mesh = new THREE.Mesh(boxGeo, type === 'grass' ? grassMat : dirtMat);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            blocks.set(`${x},${y},${z}`, mesh);
        }

        // Generar terreno con pseudo-ruido
        for(let x = -worldSize/2; x < worldSize/2; x++) {
            for(let z = -worldSize/2; z < worldSize/2; z++) {
                const h = Math.floor(Math.sin(x * 0.1) * 2 + Math.cos(z * 0.1) * 2);
                addBlock(x, h, z, 'grass');
                addBlock(x, h-1, z, 'dirt');
            }
        }

        // --- INTERACCIÓN ---
        const raycaster = new THREE.Raycaster();
        document.addEventListener('mousedown', (e) => {
            if (!controls.isLocked || inventoryOpen) return;
            
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(scene.children);

            if (intersects.length > 0) {
                const intersect = intersects[0];
                if (e.button === 0) { // Romper
                    scene.remove(intersect.object);
                    const p = intersect.object.position;
                    blocks.delete(`${p.x},${p.y},${p.z}`);
                } else if (e.button === 2) { // Poner
                    const pos = intersect.object.position.clone().add(intersect.face.normal);
                    addBlock(pos.x, pos.y, pos.z, 'dirt');
                }
            }
        });

        // --- SISTEMA DE INVENTARIO ---
        function toggleInventory() {
            inventoryOpen = !inventoryOpen;
            const menu = document.getElementById('inventory-menu');
            if (inventoryOpen) {
                menu.style.display = 'grid';
                controls.unlock();
                renderInventory();
            } else {
                menu.style.display = 'none';
                controls.lock();
            }
        }

        function renderInventory() {
            const menu = document.getElementById('inventory-menu');
            menu.innerHTML = '';
            for(let i=0; i<27; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.style.background = '#888';
                menu.appendChild(slot);
            }
        }

        // --- Mobs (Simple IA Zombie) ---
        const zombieGeo = new THREE.BoxGeometry(0.6, 1.8, 0.6);
        const zombieMat = new THREE.MeshLambertMaterial({ color: 0x2e4d2e });
        const zombie = new THREE.Mesh(zombieGeo, zombieMat);
        zombie.position.set(5, 5, 5);
        scene.add(zombie);

        function updateMobs(delta) {
            zombie.position.x += Math.sin(Date.now() * 0.001) * delta * 2;
            zombie.position.z += Math.cos(Date.now() * 0.001) * delta * 2;
        }

        // --- LOOP PRINCIPAL ---
        let prevTime = performance.now();
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if (controls.isLocked) {
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 2.5 * delta;

                const dir = new THREE.Vector3();
                dir.z = Number(moveForward) - Number(moveBackward);
                dir.x = Number(moveRight) - Number(moveLeft);
                dir.normalize();

                if (moveForward || moveBackward) velocity.z -= dir.z * 100.0 * delta;
                if (moveLeft || moveRight) velocity.x -= dir.x * 100.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                controls.getObject().position.y += (velocity.y * delta);

                if (controls.getObject().position.y < 2.5) {
                    velocity.y = 0;
                    controls.getObject().position.y = 2.5;
                    canJump = true;
                }
                updateMobs(delta);
            }
            renderer.render(scene, camera);
            prevTime = time;
        }
        animate();

        // Ajuste de ventana
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
