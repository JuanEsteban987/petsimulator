<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CrunchyNode Engine | Core</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #1a1a1a;
            --accent: #00ff66;
            --text: #e0e0e0;
            --font-chunky: 'Courier New', Courier, monospace;
        }

        body, html { 
            margin: 0; padding: 0; overflow: hidden; 
            background: var(--bg); color: var(--text);
            font-family: var(--font-chunky);
        }

        /* UI Estilo Super Crunchy */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: grid; grid-template-columns: 250px 1fr 300px;
            pointer-events: none;
        }

        .panel {
            background: var(--panel); border: 4px solid #333;
            pointer-events: all; padding: 10px;
            image-rendering: pixelated;
        }

        .node-canvas {
            background: #111; background-image: radial-gradient(#222 1px, transparent 1px);
            background-size: 20px 20px; cursor: crosshair;
        }

        h2 { font-size: 14px; text-transform: uppercase; color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* Efecto CRT Scanlines */
        #crt-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 100;
        }
    </style>
</head>
<body>

<div id="crt-overlay"></div>

<div id="ui-layer">
    <aside class="panel">
        <h2>Assets</h2>
        <div id="sprite-list">Sprite_Player [16x16]</div>
        <h2>Nodes</h2>
        <ul style="list-style: none; padding: 0; font-size: 12px;">
            <li>🟢 On Start</li>
            <li>🟡 Move Object</li>
            <li>🔴 Collision Event</li>
            <li>🔵 P2P Send</li>
        </ul>
    </aside>
    
    <main id="node-editor" class="node-canvas"></main>

    <aside class="panel">
        <h2>Inspector</h2>
        <div id="props">No node selected.</div>
    </aside>
</div>

<canvas id="game-viewport" style="display:none;"></canvas>

<script type="module">
    // --- CORE ENGINE CONFIG ---
    const CONFIG = {
        resolution: { w: 320, h: 240 },
        palette: ['#000000', '#ffffff', '#ff004d', '#00e436', '#29adff', '#ffec27']
    };

    class CrunchyNode {
        constructor(id, type, x, y) {
            this.id = id;
            this.type = type;
            this.x = x;
            this.y = y;
            this.inputs = [];
            this.outputs = [];
        }
    }

    // --- RENDERER (WEBGL SHADER PARA EFECTO CRUNCHY) ---
    const vertexShaderSource = `
        attribute vec2 position;
        void main() { gl_Position = vec4(position, 0.0, 1.0); }
    `;

    const fragmentShaderSource = `
        precision mediump float;
        uniform vec2 u_resolution;
        uniform float u_time;

        void main() {
            vec2 uv = gl_FragCoord.xy / u_resolution.xy;
            // Simulación de color limitado y dithering básico
            float dither = mod(gl_FragCoord.x + gl_FragCoord.y, 2.0);
            vec3 color = vec3(uv.x, uv.y, abs(sin(u_time)));
            gl_FragColor = vec4(floor(color * 4.0) / 4.0, 1.0);
        }
    `;

    // --- INITIALIZATION ---
    function init() {
        console.log("%c CRUNCHY NODE ENGINE v0.1 LOADED ", "background: #00ff66; color: #000; font-weight: bold;");
        
        const canvas = document.createElement('canvas');
        const editor = document.getElementById('node-editor');
        
        // Simulación de nodos visuales
        createNodeUI(editor, "On Start", 50, 100, "green");
        createNodeUI(editor, "Set Velocity", 200, 150, "orange");
    }

    function createNodeUI(parent, name, x, y, color) {
        const el = document.createElement('div');
        el.style.cssText = `
            position: absolute; left: ${x}px; top: ${y}px;
            width: 120px; background: #333; border: 2px solid ${color};
            padding: 5px; font-size: 10px; pointer-events: all;
            box-shadow: 4px 4px 0px #000;
        `;
        el.innerHTML = `<strong>${name}</strong><br><br>○ Input<br><span style="float:right">Output ●</span>`;
        parent.appendChild(el);
    }

    // Ejecutar inicio
    window.onload = init;

    // --- P2P HANDLER (SKELETON) ---
    async function setupP2P() {
        // Aquí se integraría PeerJS
        console.log("P2P: Inicializando handshake WebRTC...");
    }
</script>

</body>
</html>
