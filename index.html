<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMOD: Korblox Physical Sandbox & Combat</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Tahoma', sans-serif; background-color: #000; color: white; user-select: none; }
        canvas { display: block; }

        /* --- UI PRINCIPAL --- */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }

        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 12px; height: 12px;
            border: 2px solid rgba(0, 255, 0, 0.8);
            border-radius: 2px;
            transform: translate(-50%, -50%);
        }

        /* --- MENÚ Q (CONSTRUCCIÓN) --- */
        #q-menu {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 2000;
        }

        .menu-content {
            background: #2c3e50;
            padding: 30px;
            border-radius: 15px;
            border: 4px solid #3498db;
            display: grid;
            grid-template-columns: repeat(3, 120px);
            gap: 15px;
            text-align: center;
        }

        .spawn-item {
            background: #34495e;
            border: 2px solid #5d6d7e;
            color: white;
            padding: 15px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
        }

        .spawn-item:hover { background: #3498db; transform: scale(1.05); }
        .spawn-item span { display: block; font-size: 24px; margin-bottom: 5px; }

        /* --- INFO PANEL --- */
        #info-panel {
            position: absolute;
            bottom: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid #f1c40f;
        }

        #weapon-info {
            position: absolute;
            bottom: 20px; right: 20px;
            text-align: right;
            font-size: 32px;
            color: #f1c40f;
            text-shadow: 2px 2px #000;
        }

        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 3000; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="start-screen" onclick="initKMod()">
        <h1 style="color: #3498db; font-size: 80px; margin: 0;">KMOD</h1>
        <p style="font-size: 20px; letter-spacing: 5px;">SANDBOX & COMBAT</p>
        <p style="margin-top: 30px; color: #888;">HAZ CLIC PARA ENTRAR</p>
    </div>

    <div id="q-menu">
        <div class="menu-content">
            <div class="spawn-item" onclick="spawnProp('cube')"><span>📦</span>Cubo</div>
            <div class="spawn-item" onclick="spawnProp('sphere')"><span>🏀</span>Esfera</div>
            <div class="spawn-item" onclick="spawnProp('wall')"><span>🧱</span>Muro</div>
            <div class="spawn-item" onclick="spawnProp('zombie')" style="border-color: #e74c3c;"><span>🧟</span>Zombie</div>
            <div class="spawn-item" onclick="closeQMenu()" style="grid-column: span 3; background: #c0392b;">CERRAR</div>
        </div>
    </div>

    <div id="ui-layer">
        <div id="crosshair"></div>
        
        <div id="info-panel">
            <b>CONTROLES:</b><br>
            [WASD] Mover | [Espacio] Saltar<br>
            [Q] Menú de Spawn | [1, 2, 3] Armas<br>
            [R] Descongelar / Recargar
        </div>

        <div id="weapon-info">
            <div id="cur-weapon-name">PHYSICS GUN</div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- CONFIGURACIÓN ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        scene.fog = new THREE.Fog(0x222222, 10, 150);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- LUCES ---
        const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
        scene.add(hemi);
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(10, 50, 10);
        sun.castShadow = true;
        scene.add(sun);

        // --- MUNDO ---
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 200),
            new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- VARIABLES DE ESTADO ---
        let props = [];
        let enemies = [];
        let heldEntity = null;
        let heldDist = 5;
        let currentWeapon = "physgun"; // physgun, smg, toolgun
        const controls = new PointerLockControls(camera, document.body);
        const keys = {};
        const raycaster = new THREE.Raycaster();
        
        // --- ARMA VISUAL (VIEWMODEL) ---
        const gunGroup = new THREE.Group();
        const gunBody = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.3, 0.8), new THREE.MeshStandardMaterial({color: 0x111111}));
        gunBody.position.set(0.3, -0.4, -0.6);
        gunGroup.add(gunBody);
        camera.add(gunGroup);
        scene.add(camera);

        // --- CLASE PROP (CON COLISIONES ENTRE SÍ) ---
        class Prop {
            constructor(type, pos) {
                this.type = type;
                let geo;
                if(type === 'cube') geo = new THREE.BoxGeometry(2, 2, 2);
                else if(type === 'sphere') geo = new THREE.SphereGeometry(1.2, 16, 16);
                else if(type === 'wall') geo = new THREE.BoxGeometry(0.5, 5, 8);
                
                this.mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color: Math.random() * 0xffffff}));
                this.mesh.position.copy(pos);
                this.mesh.castShadow = true;
                this.mesh.receiveShadow = true;
                this.mesh.userData.isProp = true;
                this.mesh.userData.parent = this;

                this.vel = new THREE.Vector3(0,0,0);
                this.mass = type === 'wall' ? 5 : 1;
                this.radius = 1.2; 
                this.isFrozen = false;
                this.isHeld = false;

                scene.add(this.mesh);
                props.push(this);
            }

            update(delta) {
                if (this.isFrozen || this.isHeld) return;

                // Gravedad
                if (this.mesh.position.y > this.radius) {
                    this.vel.y -= 20 * delta;
                } else {
                    this.mesh.position.y = this.radius;
                    this.vel.y *= -0.3; // Rebote
                    this.vel.x *= 0.9; this.vel.z *= 0.9; // Fricción
                }

                // --- COLISIONES ENTRE PROPS ---
                props.forEach(other => {
                    if (other === this || other.isHeld) return;
                    
                    const dist = this.mesh.position.distanceTo(other.mesh.position);
                    const minDist = this.radius + other.radius;

                    if (dist < minDist) {
                        // Resolver penetración
                        const collisionNormal = this.mesh.position.clone().sub(other.mesh.position).normalize();
                        const overlap = minDist - dist;
                        this.mesh.position.add(collisionNormal.clone().multiplyScalar(overlap * 0.5));
                        
                        // Reacción de impulso simple
                        const relativeVelocity = this.vel.clone().sub(other.vel);
                        const velocityAlongNormal = relativeVelocity.dot(collisionNormal);

                        if (velocityAlongNormal < 0) {
                            const restitution = 0.5;
                            let j = -(1 + restitution) * velocityAlongNormal;
                            j /= (1 / this.mass + 1 / other.mass);

                            const impulse = collisionNormal.multiplyScalar(j);
                            this.vel.add(impulse.clone().multiplyScalar(1 / this.mass));
                            other.vel.sub(impulse.clone().multiplyScalar(1 / other.mass));
                        }
                    }
                });

                this.mesh.position.add(this.vel.clone().multiplyScalar(delta));
            }
        }

        // --- CLASE ZOMBIE HEADCRAB ---
        class Zombie {
            constructor(pos) {
                this.group = new THREE.Group();
                // Cuerpo
                const body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0x4a5d23}));
                // Headcrab (cabeza roja)
                const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.5, 0.8), new THREE.MeshStandardMaterial({color: 0x8b0000}));
                head.position.y = 1.2;
                this.group.add(body, head);
                this.group.position.copy(pos);
                this.group.position.y = 1;
                scene.add(this.group);
                
                this.vel = new THREE.Vector3();
                this.hp = 100;
                this.nextJump = 0;
                enemies.push(this);
            }

            update(delta) {
                // IA: Seguir jugador y saltar
                const dirToPlayer = camera.position.clone().sub(this.group.position);
                dirToPlayer.y = 0;
                dirToPlayer.normalize();

                if (this.group.position.y > 1) {
                    this.vel.y -= 15 * delta;
                } else {
                    this.group.position.y = 1;
                    this.vel.y = 0;
                    if (Date.now() > this.nextJump) {
                        this.vel.y = 7; // Salto hacia el jugador
                        this.vel.add(dirToPlayer.multiplyScalar(5));
                        this.nextJump = Date.now() + 3000;
                    }
                }
                this.group.position.add(this.vel.clone().multiplyScalar(delta));
                this.group.lookAt(camera.position.x, 1, camera.position.z);
            }
        }

        // --- FUNCIONES DE JUEGO ---
        window.initKMod = () => {
            controls.lock();
            document.getElementById('start-screen').style.display = 'none';
        };

        window.spawnProp = (type) => {
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            const pos = camera.position.clone().add(dir.multiplyScalar(5));
            if(type === 'zombie') new Zombie(pos);
            else new Prop(type, pos);
            closeQMenu();
        };

        window.closeQMenu = () => {
            document.getElementById('q-menu').style.display = 'none';
            controls.lock();
        };

        // --- CONTROLES DE ENTRADA ---
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'KeyQ') {
                if(document.getElementById('q-menu').style.display === 'flex') {
                    closeQMenu();
                } else {
                    document.getElementById('q-menu').style.display = 'flex';
                    controls.unlock();
                }
            }
            if (e.key === '1') setWeapon('physgun');
            if (e.key === '2') setWeapon('smg');
            if (e.key === '3') setWeapon('toolgun');
            if (e.code === 'Space' && controls.isLocked && camera.position.y <= 1.7) {
                playerVel.y = 8; // Salto
            }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function setWeapon(type) {
            currentWeapon = type;
            document.getElementById('cur-weapon-name').innerText = type.toUpperCase();
            gunBody.material.color.setHex(type === 'physgun' ? 0x3498db : (type === 'smg' ? 0x222222 : 0x27ae60));
        }

        // --- DISPARO Y ACCIONES ---
        let isFiring = false;
        window.addEventListener('mousedown', (e) => {
            if(!controls.isLocked) return;
            if(e.button === 0) {
                isFiring = true;
                if(currentWeapon === 'physgun') grabProp();
                if(currentWeapon === 'smg') shootBullet();
                if(currentWeapon === 'toolgun') deleteObject();
            }
            if(e.button === 2 && currentWeapon === 'physgun') freezeProp();
        });
        window.addEventListener('mouseup', () => {
            isFiring = false;
            if(heldEntity) {
                heldEntity.isHeld = false;
                heldEntity = null;
            }
        });

        function grabProp() {
            raycaster.setFromCamera({x:0, y:0}, camera);
            const hits = raycaster.intersectObjects(scene.children);
            for(let h of hits) {
                if(h.object.userData.isProp) {
                    heldEntity = h.object.userData.parent;
                    heldEntity.isHeld = true;
                    heldEntity.isFrozen = false;
                    heldDist = h.distance;
                    break;
                }
            }
        }

        function freezeProp() {
            if(heldEntity) {
                heldEntity.isFrozen = true;
                heldEntity.isHeld = false;
                heldEntity = null;
            }
        }

        function shootBullet() {
            // Animación retroceso
            gunGroup.position.z += 0.1;
            raycaster.setFromCamera({x:0, y:0}, camera);
            const hits = raycaster.intersectObjects(scene.children, true);
            for(let h of hits) {
                // Buscar si golpeamos zombie
                enemies.forEach((z, idx) => {
                    if(z.group.contains(h.object)) {
                        z.hp -= 34;
                        if(z.hp <= 0) {
                            scene.remove(z.group);
                            enemies.splice(idx, 1);
                        }
                    }
                });
                // Impacto en props
                if(h.object.userData.isProp) {
                    const p = h.object.userData.parent;
                    const dir = new THREE.Vector3();
                    camera.getWorldDirection(dir);
                    p.vel.add(dir.multiplyScalar(10));
                }
                break;
            }
        }

        function deleteObject() {
            raycaster.setFromCamera({x:0, y:0}, camera);
            const hits = raycaster.intersectObjects(scene.children);
            for(let h of hits) {
                if(h.object.userData.isProp) {
                    scene.remove(h.object);
                    props = props.filter(p => p.mesh !== h.object);
                }
            }
        }

        // --- BUCLE PRINCIPAL ---
        const clock = new THREE.Clock();
        let playerVel = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (controls.isLocked) {
                // Movimiento jugador con gravedad
                const speed = 15 * delta;
                if(keys['KeyW']) controls.moveForward(speed);
                if(keys['KeyS']) controls.moveForward(-speed);
                if(keys['KeyA']) controls.moveRight(-speed);
                if(keys['KeyD']) controls.moveRight(speed);

                if(camera.position.y > 1.6) playerVel.y -= 25 * delta;
                else { camera.position.y = 1.6; playerVel.y = 0; }
                camera.position.y += playerVel.y * delta;
            }

            // Physgun logic
            if(heldEntity) {
                const target = camera.position.clone();
                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir);
                target.add(dir.multiplyScalar(heldDist));
                heldEntity.mesh.position.lerp(target, 0.2);
                heldEntity.vel.set(0,0,0);
            }

            // Gun lerp back
            gunGroup.position.z = THREE.MathUtils.lerp(gunGroup.position.z, 0, 0.1);

            // Update Props y Zombies
            props.forEach(p => p.update(delta));
            enemies.forEach(z => z.update(delta));

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
