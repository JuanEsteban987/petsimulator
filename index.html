<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Custom Programming Language IDE</title>
    <style>
        body { background: #0c0c0c; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; }
        #left-panel { width: 40%; border-right: 2px solid #00ff41; display: flex; flex-direction: column; }
        #right-panel { width: 60%; background: #000; position: relative; }
        
        textarea { flex-grow: 1; background: #000; color: #00ff41; border: none; padding: 20px; font-size: 16px; outline: none; resize: none; }
        .btn-run { background: #00ff41; color: #000; border: none; padding: 10px; font-weight: bold; cursor: pointer; text-align: center; }
        .btn-run:hover { background: #008f11; }
        
        canvas { width: 100%; height: 70%; image-rendering: pixelated; }
        #console { height: 30%; background: #050505; border-top: 1px solid #333; padding: 10px; font-size: 12px; color: #888; overflow-y: auto; }
        
        .label { background: #333; padding: 5px; font-size: 10px; color: #ccc; }
    </style>
</head>
<body>

<div id="left-panel">
    <div class="label">EDITOR DE CÓDIGO PERSONALIZADO</div>
    <textarea id="code-input" spellcheck="false">
scene:
	OOOOO
	O+O-O
	O O O
	O E O
	OOOOO

asset:
	O = entity/player/object/tileset

asset.edit:E
	life:100
	damage:20
	atacktype:melee/range
	speed:1

asset.edit:O
	texture:
	########
	##R##R##
	#RYRRYR#
	#RRRRRR#
	###RR###
	###RR###
	##R##R##
	########
    </textarea>
    <button class="btn-run" onclick="compileAndRun()">EJECUTAR CÓDIGO (COMPILAR)</button>
</div>

<div id="right-panel">
    <div class="label">RENDERIZADO DOOM 3D</div>
    <canvas id="view" width="320" height="200"></canvas>
    <div id="console">Sistema listo. Esperando compilación...</div>
</div>

<script>
const log = (msg) => document.getElementById('console').innerHTML += `> ${msg}<br>`;
const canvas = document.getElementById('view');
const ctx = canvas.getContext('2d');

function compileAndRun() {
    const rawCode = document.getElementById('code-input').value;
    log("Iniciando análisis sintáctico...");

    // 1. PARSER DE TU LENGUAJE
    const lines = rawCode.split('\n').map(l => l.trim());
    let currentMap = [];
    let currentTexture = [];
    let isReadingScene = false;
    let isReadingTexture = false;

    lines.forEach(line => {
        if (line.startsWith('scene:')) { isReadingScene = true; return; }
        if (line.startsWith('asset:')) { isReadingScene = false; return; }
        if (line.startsWith('texture:')) { isReadingTexture = true; return; }
        
        if (isReadingScene && line.length > 0) {
            currentMap.push(line.split(''));
        }
        if (isReadingTexture && line.length === 8) {
            currentTexture.push(line);
        }
    });

    if(currentTexture.length > 8) currentTexture = currentTexture.slice(0,8);

    log("Escena detectada: " + currentMap.length + " líneas.");
    log("Textura 'O' cargada correctamente.");
    
    startDoomEngine(currentMap, currentTexture);
}

function startDoomEngine(map, texture) {
    let px = 2.5, py = 2.5, pa = 0; // Jugador
    const colors = { 'R': '#ff0000', 'Y': '#ffff00', '#': 'transparent', 'G': '#00ff00', 'A': '#0000ff', 'N': '#000', 'B': '#fff' };

    function render() {
        // Limpiar pantalla (Cielo y Suelo)
        ctx.fillStyle = "#111"; ctx.fillRect(0,0,320,100); 
        ctx.fillStyle = "#222"; ctx.fillRect(0,100,320,100);

        // Raycasting
        for(let x = 0; x < 320; x++) {
            let rayAngle = (pa - 0.6) + (x / 320) * 1.2;
            let distance = 0;
            let hit = false;
            let hitX = 0;

            while(!hit && distance < 15) {
                distance += 0.05;
                let tx = Math.floor(px + Math.cos(rayAngle) * distance);
                let ty = Math.floor(py + Math.sin(rayAngle) * distance);

                if(map[ty] && map[ty][tx] === 'O') {
                    hit = true;
                    // Calcular posición exacta del impacto para la textura
                    let exactX = px + Math.cos(rayAngle) * distance;
                    let exactY = py + Math.sin(rayAngle) * distance;
                    hitX = Math.floor(((exactX % 1) + (exactY % 1)) * 8) % 8;
                }
            }

            let wallHeight = 200 / distance;
            
            // Dibujar columna de la textura "O" definida en tu código
            for(let ty = 0; ty < 8; ty++) {
                let pixel = texture[ty] ? texture[ty][hitX] : '#';
                let color = colors[pixel];
                if(color !== 'transparent') {
                    ctx.fillStyle = color;
                    let segH = wallHeight / 8;
                    ctx.fillRect(x, (100 - wallHeight/2) + (ty * segH), 1, segH + 1);
                }
            }
        }
        pa += 0.02; // Rotación de cámara
        requestAnimationFrame(render);
    }
    render();
}
</script>
</body>
</html>
