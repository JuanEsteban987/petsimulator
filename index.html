<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korblox Mod (KMod) - Physics Sandbox</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; user-select: none; }
        canvas { display: block; }

        /* --- UI PRINCIPAL --- */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }

        /* Crosshair estilo Source */
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 8px; height: 8px;
            background-color: transparent;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* Panel de Herramientas (Derecha) */
        #tool-panel {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #555;
            padding: 15px;
            border-radius: 8px;
            width: 200px;
            pointer-events: auto;
        }

        .tool-category { font-weight: bold; color: #aaa; margin-top: 10px; font-size: 12px; text-transform: uppercase; }
        .tool-item {
            background: #333;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            margin-top: 5px;
            cursor: pointer;
            width: 100%;
            text-align: left;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .tool-item:hover { background: #444; }
        .tool-item.active { background: #2980b9; border-color: #3498db; }

        /* Indicador de Arma (Abajo Derecha) */
        #weapon-display {
            position: absolute;
            bottom: 20px; right: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #f1c40f;
            text-shadow: 2px 2px 0 #000;
        }

        /* Pantalla de Inicio */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #2c3e50 0%, #000 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000; cursor: pointer;
            text-align: center;
        }
        #start-screen h1 { font-size: 64px; margin: 0; color: #3498db; }
        #start-screen p { font-size: 18px; color: #bdc3c7; }
    </style>
</head>
<body>

    <div id="start-screen" onclick="initSandbox()">
        <h1>KMOD</h1>
        <p>Korblox Physics Sandbox</p>
        <p style="font-size: 14px; margin-top: 20px;">Haz clic para jugar</p>
    </div>

    <div id="ui-layer">
        <div id="crosshair"></div>
        
        <div id="weapon-display">PHYSICS GUN</div>

        <div id="tool-panel">
            <div style="font-size: 18px; font-weight: bold; color: #3498db; margin-bottom: 10px;"> Herramientas</div>
            
            <div class="tool-category">Armas (Teclas 1-2)</div>
            <button class="tool-item active" id="btn-physgun" onclick="selectWeapon('physgun')">1. Physics Gun</button>
            <button class="tool-item" id="btn-toolgun" onclick="selectWeapon('toolgun')">2. Tool Gun</button>

            <div class="tool-category">Spawn Props (ToolGun)</div>
            <button class="tool-item" onclick="selectProp('cube')">Cubo</button>
            <button class="tool-item" onclick="selectProp('sphere')">Esfera</button>
            <button class="tool-item" onclick="selectProp('wall')">Muro</button>

            <div class="tool-category">Sandbox</div>
            <button class="tool-item" style="background: #c0392b;" onclick="clearProps()">Limpiar Todo</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- ESTADO DEL JUEGO ---
        const gameState = {
            currentWeapon: 'physgun', // 'physgun', 'toolgun'
            currentPropType: 'cube',
            heldEntity: null,         // Objeto que sostiene la physgun
            heldDistance: 0,
            props: []
        };

        // --- CONFIGURACIÓN DE TRES.JS ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x7f8c8d); // Gris industrial
        scene.fog = new THREE.Fog(0x7f8c8d, 20, 150);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- ILUMINACIÓN (Estilo Garrys Mod) ---
        const ambient = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(50, 50, 20);
        sun.castShadow = true;
        sun.shadow.camera.left = -50; sun.shadow.camera.right = 50;
        sun.shadow.camera.top = 50; sun.shadow.camera.bottom = -50;
        sun.shadow.mapSize.width = 2048; sun.shadow.mapSize.height = 2048;
        scene.add(sun);

        // --- ESCENARIO DE PRUEBAS ---
        // Suelo texturizado simple
        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x95a5a6, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Paredes de límite
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x34495e });
        function createBoundWall(x, z, w, d) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, 10, d), wallMat);
            m.position.set(x, 5, z);
            m.castShadow = true; m.receiveShadow = true;
            scene.add(m);
        }
        createBoundWall(0, 100, 200, 2);  createBoundWall(0, -100, 200, 2);
        createBoundWall(100, 0, 2, 200);  createBoundWall(-100, 0, 2, 200);

        // --- RAYCASTER (Para selección de objetos) ---
        const raycaster = new THREE.Raycaster();
        const centerPoint = new THREE.Vector2(0, 0); // Centro de la pantalla

        // --- CLASE PROP (Objeto con física ultra-ligera) ---
        class Prop {
            constructor(type, position) {
                this.type = type;
                let geometry, material;

                const mats = {
                    cube: { color: 0xe67e22 }, // Naranja Prop
                    sphere: { color: 0x3498db },
                    wall: { color: 0x2c3e50 }
                };

                material = new THREE.MeshStandardMaterial({ 
                    color: mats[type].color, 
                    roughness: 0.7, 
                    metalness: 0.2 
                });

                if (type === 'cube') {
                    geometry = new THREE.BoxGeometry(2, 2, 2);
                    this.radius = 1; // Para colisiones simples
                } else if (type === 'sphere') {
                    geometry = new THREE.SphereGeometry(1.2, 16, 16);
                    this.radius = 1.2;
                } else if (type === 'wall') {
                    geometry = new THREE.BoxGeometry(0.5, 4, 6);
                    this.radius = 2; // Aproximación
                }

                this.mesh = new THREE.Mesh(geometry, material);
                this.mesh.position.copy(position);
                this.mesh.castShadow = true;
                this.mesh.receiveShadow = true;
                
                // Propiedades físicas
                this.mesh.userData.isProp = true;
                this.mesh.userData.parentProp = this;
                
                this.velocity = new THREE.Vector3(0, 0, 0);
                this.isFrozen = false;
                this.isHeld = false;

                scene.add(this.mesh);
                gameState.props.push(this);
            }

            update(delta) {
                if (this.isFrozen || this.isHeld) {
                    this.velocity.set(0,0,0);
                    return;
                }

                // Gravedad simple
                if (this.mesh.position.y > this.radius) {
                    this.velocity.y -= 25 * delta;
                } else {
                    // Colisión con el suelo
                    this.mesh.position.y = this.radius;
                    this.velocity.y *= -0.2; // Rebote suave
                    this.velocity.x *= 0.95; // Fricción
                    this.velocity.z *= 0.95;
                }

                // Aplicar movimiento
                this.mesh.position.add(this.velocity.clone().multiplyScalar(delta));
            }
        }

        // --- CONTROLES Y ARMAS ---
        const controls = new PointerLockControls(camera, document.body);
        const keys = {};

        // Inicialización
        window.initSandbox = () => {
            controls.lock();
            document.getElementById('start-screen').style.display = 'none';
            spawnInitialProps();
        };

        controls.addEventListener('unlock', () => {
            // No mostramos nada, solo permitimos que el ratón sea libre para la UI
        });

        // Eventos de teclado
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.key === '1') selectWeapon('physgun');
            if (e.key === '2') selectWeapon('toolgun');
            if (e.key === 'r' || e.key === 'R') reloadAction();
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // Eventos de ratón (Fuego)
        let isFiring = false;
        let isSecondaryFiring = false;

        window.addEventListener('mousedown', (e) => {
            if (!controls.isLocked) return;
            if (e.button === 0) { isFiring = true; handlePrimaryFire(); }
            if (e.button === 2) { isSecondaryFiring = true; handleSecondaryFire(); }
        });
        window.addEventListener('mouseup', (e) => {
            if (e.button === 0) { isFiring = false; handlePrimaryUp(); }
            if (e.button === 2) isSecondaryFiring = false;
        });
        window.addEventListener('contextmenu', e => e.preventDefault());

        // Rueda del ratón para acercar/alejar objetos con PhysGun
        window.addEventListener('wheel', (e) => {
            if (!controls.isLocked || !gameState.heldEntity) return;
            gameState.heldDistance -= e.deltaY * 0.01;
            gameState.heldDistance = Math.max(3, Math.min(gameState.heldDistance, 20));
        });

        // --- LÓGICA DE HERRAMIENTAS ---

        function handlePrimaryFire() {
            if (gameState.currentWeapon === 'physgun') {
                // Intentar agarrar un objeto
                raycaster.setFromCamera(centerPoint, camera);
                const intersects = raycaster.intersectObjects(scene.children);
                
                for (let i = 0; i < intersects.length; i++) {
                    if (intersects[i].object.userData.isProp) {
                        const propMesh = intersects[i].object;
                        gameState.heldEntity = propMesh.userData.parentProp;
                        gameState.heldEntity.isHeld = true;
                        gameState.heldEntity.isFrozen = false; // Descongelar al agarrar
                        gameState.heldDistance = intersects[i].distance;
                        
                        // Efecto visual (cambio ligero de color)
                        propMesh.material.emissive.setHex(0x2980b9);
                        break;
                    }
                }
            } else if (gameState.currentWeapon === 'toolgun') {
                // Spawnear objeto
                raycaster.setFromCamera(centerPoint, camera);
                const intersects = raycaster.intersectObjects([floor, ...scene.children.filter(o => o.userData.isProp)]);
                
                if (intersects.length > 0) {
                    const hitPoint = intersects[0].point;
                    const spawnPos = hitPoint.clone().add(new THREE.Vector3(0, 1.5, 0)); // Un poco por encima del impacto
                    new Prop(gameState.currentPropType, spawnPos);
                }
            }
        }

        function handlePrimaryUp() {
            if (gameState.currentWeapon === 'physgun' && gameState.heldEntity) {
                // Soltar objeto
                gameState.heldEntity.isHeld = false;
                gameState.heldEntity.mesh.material.emissive.setHex(0x000000); // Quitar efecto
                gameState.heldEntity = null;
            }
        }

        function handleSecondaryFire() {
            if (gameState.currentWeapon === 'physgun' && gameState.heldEntity) {
                // Congelar objeto en el aire
                gameState.heldEntity.isFrozen = true;
                gameState.heldEntity.isHeld = false;
                gameState.heldEntity.mesh.material.emissive.setHex(0x1a1a1a); // Efecto congelado
                gameState.heldEntity = null;
            } else if (gameState.currentWeapon === 'toolgun') {
                // Herramienta secundaria (eliminar objeto apuntado)
                raycaster.setFromCamera(centerPoint, camera);
                const intersects = raycaster.intersectObjects(scene.children);
                for (let i = 0; i < intersects.length; i++) {
                    if (intersects[i].object.userData.isProp) {
                        removeProp(intersects[i].object.userData.parentProp);
                        break;
                    }
                }
            }
        }

        function reloadAction() {
            // 'R' en GMod congela/descongela todo o suelda. Aquí descongelará el objeto apuntado.
            raycaster.setFromCamera(centerPoint, camera);
            const intersects = raycaster.intersectObjects(scene.children);
            for (let i = 0; i < intersects.length; i++) {
                if (intersects[i].object.userData.isProp) {
                    const prop = intersects[i].object.userData.parentProp;
                    prop.isFrozen = !prop.isFrozen;
                    prop.mesh.material.emissive.setHex(prop.isFrozen ? 0x1a1a1a : 0x000000);
                    break;
                }
            }
        }

        // --- UI INTERACTIVA ---
        window.selectWeapon = (weapon) => {
            gameState.currentWeapon = weapon;
            document.getElementById('weapon-display').innerText = weapon.toUpperCase();
            document.getElementById('weapon-display').style.color = weapon === 'physgun' ? '#f1c40f' : '#3498db';
            
            // Actualizar botones UI
            document.querySelectorAll('.tool-item').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${weapon}`).classList.add('active');
            
            // Si cambiamos de arma, soltamos lo que tengamos
            handlePrimaryUp();
        };

        window.selectProp = (type) => {
            gameState.currentPropType = type;
            selectWeapon('toolgun'); // Cambiar automáticamente a ToolGun
        };

        window.clearProps = () => {
            [...gameState.props].forEach(p => removeProp(p));
        };

        function removeProp(prop) {
            scene.remove(prop.mesh);
            const idx = gameState.props.indexOf(prop);
            if (idx > -1) gameState.props.splice(idx, 1);
        }

        function spawnInitialProps() {
            new Prop('cube', new THREE.Vector3(0, 2, -10));
            new Prop('sphere', new THREE.Vector3(5, 2, -10));
            new Prop('cube', new THREE.Vector3(-5, 2, -10));
        }

        // --- BUCLE PRINCIPAL (Game Loop) ---
        const clock = new THREE.Clock();
        camera.position.set(0, 3, 15); // Posición inicial cámara

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Movimiento del Jugador
            if (controls.isLocked) {
                const moveSpeed = 15 * delta;
                if (keys['KeyW']) controls.moveForward(moveSpeed);
                if (keys['KeyS']) controls.moveForward(-moveSpeed);
                if (keys['KeyA']) controls.moveRight(-moveSpeed);
                if (keys['KeyD']) controls.moveRight(moveSpeed);
            }

            // Lógica de PhysGun (Mover objeto sostenido)
            if (gameState.heldEntity) {
                const targetPos = camera.position.clone();
                const camDir = new THREE.Vector3();
                camera.getWorldDirection(camDir);
                
                // Calcular la posición objetivo frente a la cámara
                targetPos.add(camDir.multiplyScalar(gameState.heldDistance));
                
                // Suavizado de movimiento (lerp)
                gameState.heldEntity.mesh.position.lerp(targetPos, 0.2);
            }

            // Actualizar Física de los Props
            gameState.props.forEach(prop => {
                prop.update(delta);
            });

            renderer.render(scene, camera);
        }

        animate();

        // Responsive
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
