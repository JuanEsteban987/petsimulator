<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Emoji Pet Simulator</title>
    <style>
        :root { --p: #ffdf00; --bg: #1a1d24; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* CONTENEDOR PRINCIPAL */
        #game-container { width: 500px; border: 5px solid #333; border-radius: 15px; overflow: hidden; background: #000; position: relative; }

        /* ESCENARIO (CAMBIA DE COLOR) */
        #world { width: 100%; height: 300px; background-color: #4CAF50; /* Verde inicial */ position: relative; transition: background 0.5s; overflow: hidden; }
        
        /* UI SUPERIOR */
        #hud { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; font-weight: bold; }

        /* MONEDAS */
        .coin { position: absolute; font-size: 20px; cursor: pointer; user-select: none; z-index: 5; transition: transform 0.1s; }
        .coin:hover { transform: scale(1.2); }

        /* MASCOTAS (EMOJIS) */
        .pet { position: absolute; font-size: 24px; transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 6; pointer-events: none; }

        /* PANEL INFERIOR (TIENDA E INV) */
        #ui-bottom { background: #222; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        #inventory { display: flex; gap: 5px; }
        .slot { width: 35px; height: 35px; background: #333; border: 2px solid #555; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        button { background: #4a90e2; border: none; color: white; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; }
        button:hover { background: #357abd; }
        button:disabled { background: #555; }

        /* MENÚ DE ZONAS */
        #zone-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #333; padding: 20px; border-radius: 10px; display: none; z-index: 20; border: 2px solid #fff; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">💰 <span id="coin-count">0</span> | 📍 <span id="zone-name">Pradera</span></div>

        <div id="world" id="world-bg">
            </div>

        <div id="ui-bottom">
            <div id="inventory">
                <div class="slot" id="s0"></div>
                <div class="slot" id="s1"></div>
                <div class="slot" id="s2"></div>
                <div class="slot" id="s3"></div>
                <div class="slot" id="s4"></div>
            </div>
            <div style="display: flex; gap: 5px;">
                <button onclick="document.getElementById('zone-menu').style.display='block'">Zonas</button>
                <button id="btn-buy" onclick="buyEgg()">Huevo (50 💰)</button>
            </div>
        </div>

        <div id="zone-menu">
            <h3>Viajar a:</h3>
            <div id="zone-options"></div>
            <br>
            <button onclick="this.parentElement.style.display='none'">Cerrar</button>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        let coins = 0;
        let myPets = [];
        let currentZoneIdx = 0;

        const zones = [
            { n: 'Pradera', color: '#7cfc00', cost: 0, mult: 1 },
            { n: 'Océano', color: '#00bfff', cost: 500, mult: 5 },
            { n: 'Infierno', color: '#ff4500', cost: 2500, mult: 20 },
            { n: 'Cielo', color: '#e0ffff', cost: 10000, mult: 100 }
        ];

        const petPool = [
            { e: '🐶', p: 1, prob: 0.5 },
            { e: '🐱', p: 3, prob: 0.3 },
            { e: '🦊', p: 8, prob: 0.15 },
            { e: '🦄', p: 50, prob: 0.05 }
        ];

        const world = document.getElementById('world');

        // --- LÓGICA DE MONEDAS ---
        function spawnCoin() {
            if (document.querySelectorAll('.coin').length >= 15) return;
            
            const c = document.createElement('div');
            c.className = 'coin';
            c.innerHTML = '🪙';
            c.style.left = Math.random() * 90 + '%';
            c.style.top = Math.random() * 80 + '%';
            
            c.onclick = () => {
                attackCoin(c);
            };
            world.appendChild(c);
        }

        function attackCoin(coinEl) {
            const rect = coinEl.getBoundingClientRect();
            const worldRect = world.getBoundingClientRect();
            
            // Mover mascotas al objetivo
            const petElements = document.querySelectorAll('.pet');
            petElements.forEach(pet => {
                pet.style.left = (rect.left - worldRect.left) + 'px';
                pet.style.top = (rect.top - worldRect.top) + 'px';
            });

            // Dar recompensa tras "ataque"
            setTimeout(() => {
                let power = 1;
                myPets.forEach(p => power += p.p);
                coins += power * zones[currentZoneIdx].mult;
                
                coinEl.remove();
                updateUI();
                spawnCoin();
                
                // Volver a posición original
                petElements.forEach((pet, i) => {
                    pet.style.left = (10 + (i * 35)) + 'px';
                    pet.style.top = '260px';
                });
            }, 500);
        }

        // --- SISTEMA DE MASCOTAS ---
        function buyEgg() {
            if (coins >= 50 && myPets.length < 5) {
                coins -= 50;
                const roll = Math.random();
                let acc = 0;
                let selected = petPool[0];
                for(let p of petPool) {
                    acc += p.prob;
                    if(roll <= acc) { selected = p; break; }
                }
                myPets.push(selected);
                renderPets();
                updateUI();
            } else if (myPets.length >= 5) {
                alert("¡Equipo lleno!");
            }
        }

        function renderPets() {
            // Limpiar visuales
            document.querySelectorAll('.pet').forEach(p => p.remove());
            myPets.forEach((p, i) => {
                // Crear en el mundo
                const petEl = document.createElement('div');
                petEl.className = 'pet';
                petEl.innerHTML = p.e;
                petEl.style.left = (10 + (i * 35)) + 'px';
                petEl.style.top = '260px';
                world.appendChild(petEl);
                
                // Actualizar inventario inferior
                document.getElementById('s' + i).innerHTML = p.e;
            });
        }

        // --- SISTEMA DE ZONAS ---
        function travel(idx) {
            const zone = zones[idx];
            if (coins >= zone.cost) {
                if(idx !== currentZoneIdx) coins -= zone.cost;
                currentZoneIdx = idx;
                world.style.backgroundColor = zone.color;
                document.getElementById('zone-name').innerText = zone.n;
                document.getElementById('zone-menu').style.display = 'none';
                updateUI();
            } else {
                alert("No tienes suficiente dinero");
            }
        }

        function setupZones() {
            const container = document.getElementById('zone-options');
            zones.forEach((z, i) => {
                const b = document.createElement('button');
                b.style.display = 'block';
                b.style.margin = '5px 0';
                b.style.width = '100%';
                b.innerHTML = `${z.n} <br> <small>Coste: ${z.cost}</small>`;
                b.onclick = () => travel(i);
                container.appendChild(b);
            });
        }

        function updateUI() {
            document.getElementById('coin-count').innerText = Math.floor(coins);
            document.getElementById('btn-buy').disabled = (coins < 50 || myPets.length >= 5);
        }

        // --- INICIO ---
        setupZones();
        for(let i=0; i<15; i++) spawnCoin();
        updateUI();

    </script>
</body>
</html>
