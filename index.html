<!DOCTYPE html>
<html>
<head>
    <title>Custom Dev Environment</title>
    <style>
        body { background: #0f0f0f; color: #e0e0e0; font-family: 'Consolas', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #editor-container { width: 45%; border-right: 2px solid #333; display: flex; flex-direction: column; }
        #code-editor { flex-grow: 1; background: #1a1a1a; color: #d4d4d4; padding: 15px; border: none; resize: none; font-size: 14px; outline: none; }
        #preview-container { width: 55%; background: #000; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        canvas { background: #050505; border: 2px solid #444; width: 90%; image-rendering: pixelated; }
        .toolbar { background: #252526; padding: 10px; display: flex; gap: 10px; }
        button { background: #0e639c; color: white; border: none; padding: 5px 15px; cursor: pointer; }
        button:hover { background: #1177bb; }
        .autocomplete { position: absolute; background: #2d2d2d; border: 1px solid #444; display: none; z-index: 100; }
        .autocomplete div { padding: 5px 10px; cursor: pointer; }
        .autocomplete div:hover { background: #094771; }
    </style>
</head>
<body>

<div id="editor-container">
    <div class="toolbar">
        <button onclick="runCode()">▶ COMPILAR Y CORRER</button>
        <span style="font-size: 12px; color: #888;">Tips: scene:, asset:, asset.edit:</span>
    </div>
    <textarea id="code-editor" spellcheck="false">
scene:
	OOOOO
	O+O-O
	O O O
	O E O
	OOOOO

asset:
	"O" = "entity/player/object/tileset"

asset.edit:"E"
	life:100
	damage:20
	atacktype:"melee"
	speed:1.0

asset.edit:"O"
	texture:
	########
	##R##R##
	#RYRRYR#
	#RRRRRR#
	###RR###
	###RR###
	##R##R##
	########
    </textarea>
</div>

<div id="preview-container">
    <canvas id="doomCanvas" width="320" height="200"></canvas>
    <div id="hud" style="color: #00ff00; margin-top: 10px;">STATUS: STANDBY</div>
    <div id="ac-menu" class="autocomplete"></div>
</div>

<script>
const editor = document.getElementById('code-editor');
const acMenu = document.getElementById('ac-menu');
const canvas = document.getElementById('doomCanvas');
const ctx = canvas.getContext('2d');

// --- AUTOCOMPLETADO ---
const keywords = ["scene:", "asset:", "asset.edit:", "life:", "damage:", "atacktype:", "texture:", "speed:"];

editor.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.code === 'Space') {
        e.preventDefault();
        const { offsetLeft, offsetTop } = editor;
        acMenu.style.left = `50px`;
        acMenu.style.top = `100px`;
        acMenu.style.display = 'block';
        acMenu.innerHTML = '';
        keywords.forEach(kw => {
            let div = document.createElement('div');
            div.innerText = kw;
            div.onclick = () => {
                editor.setRangeText(kw);
                acMenu.style.display = 'none';
            };
            acMenu.appendChild(div);
        });
    } else {
        acMenu.style.display = 'none';
    }
});

// --- MOTOR DE RENDERIZADO (RAYCASTING) ---
let gameData = { map: [], texture: [] };

function runCode() {
    const code = editor.value;
    // Parser simple para extraer la escena y textura
    try {
        const scenePart = code.split('scene:')[1].split('asset:')[0].trim().split('\n');
        gameData.map = scenePart.map(line => line.trim().split(''));
        
        const texturePart = code.split('texture:')[1].trim().split('\n').slice(0,8);
        gameData.texture = texturePart.map(line => line.trim());
        
        startEngine();
    } catch(e) {
        alert("Error en la sintaxis de tu código personalizado");
    }
}

function startEngine() {
    let pX = 2.5, pY = 2.5, pA = 0;
    const colors = { 'R': '#ff0000', 'Y': '#ffff00', '#': '#111' };

    function draw() {
        ctx.fillStyle = "#111"; ctx.fillRect(0,0,320,100); // Techo
        ctx.fillStyle = "#333"; ctx.fillRect(0,100,320,100); // Suelo

        for(let x=0; x<320; x++) {
            let rayA = (pA - 0.6) + (x/320)*1.2;
            let dist = 0;
            let hit = false;
            let tX = 0;

            while(!hit && dist < 10) {
                dist += 0.05;
                let testX = Math.floor(pX + Math.cos(rayA)*dist);
                let testY = Math.floor(pY + Math.sin(rayA)*dist);
                
                if(gameData.map[testY] && gameData.map[testY][testX] === 'O') {
                    hit = true;
                    tX = Math.floor(((pX + Math.cos(rayA)*dist)%1 + (pY + Math.sin(rayA)*dist)%1) * 8) % 8;
                }
            }

            let h = 200/dist;
            // Dibujar textura personalizada píxel a píxel
            for(let py=0; py<8; py++){
                let char = gameData.texture[py][tX];
                ctx.fillStyle = colors[char] || '#000';
                ctx.fillRect(x, 100-h/2 + (py*(h/8)), 1, h/8 + 1);
            }
        }
        pA += 0.01;
        requestAnimationFrame(draw);
    }
    draw();
}
</script>
</body>
</html>
