<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Retro OS - Gaming Portal</title>
    <script src="https://js-dos.com/v7/build/releases/latest/js-dos.js"></script>
    <style>
        body {
            margin: 0;
            background: #245edb url('https://wallpapercave.com/wp/wp4320953.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Tahoma', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .window {
            width: 820px;
            background: #ebeadb;
            border: 3px solid #245edb;
            border-radius: 8px 8px 0 0;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
        }

        .window-header {
            background: linear-gradient(to right, #245edb 0%, #3f8cf3 100%);
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            color: white;
            font-weight: bold;
        }

        #game-view {
            width: 800px;
            height: 600px;
            background: #000;
            margin: 10px;
            position: relative;
        }

        /* El botón de Play estilo YT */
        .play-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7) url('https://images.stopgame.ru/games/logos/259/doom-23.jpg') no-repeat center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 50;
        }

        .play-btn {
            width: 90px;
            height: 60px;
            background: red;
            border-radius: 15px;
            position: relative;
        }

        .play-btn::after {
            content: '';
            position: absolute;
            top: 15px; left: 35px;
            border-style: solid;
            border-width: 15px 0 15px 25px;
            border-color: transparent transparent transparent white;
        }
    </style>
</head>
<body>

    <div class="window">
        <div class="window-header">
            <span>Doom Player XP</span>
            <span>[ X ]</span>
        </div>
        
        <div id="game-view">
            <div id="launcher" class="play-overlay" onclick="startEmulator()">
                <div class="play-btn"></div>
            </div>
            <div id="dos-container" style="width:100%; height:100%;"></div>
        </div>
    </div>

    <script>
        function startEmulator() {
            const container = document.getElementById("dos-container");
            const launcher = document.getElementById("launcher");

            // 1. Ocultar el botón
            launcher.style.display = "none";

            // 2. URL del juego (Doom Shareware)
            const gameUrl = "https://doszone-uploads.s3.dualstack.eu-central-1.amazonaws.com/original/2X/2/24b00b14f11dec35557837452790af57485b0d01.jsdos";

            // 3. Ejecutar con manejo de errores
            try {
                Dos(container).run(gameUrl).then((ci) => {
                    console.log("Juego cargado correctamente");
                }).catch((err) => {
                    console.error("Error al cargar:", err);
                    alert("Error: El navegador bloqueó el juego. Prueba abriendo este archivo con 'Live Server' o súbelo a un hosting.");
                });
            } catch (e) {
                alert("Error de librería: " + e.message);
            }
        }
    </script>
</body>
</html>
